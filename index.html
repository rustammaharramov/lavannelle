  if (S.bfResult) wrap.appendChild(mkBlendResult());
  return wrap;

function mkAtirTovPage() {
  const T = S.atirTov || {};
  const page = ce('div', 'page');

  const hdr = ce('div', 'topbar');
  const back = ce('button', 'sec-btn'); back.textContent = '← Geri';
  back.style.cssText = 'padding:8px 14px;font-size:13px';
  back.onclick = () => set({ atirSub: 'fabrika' });
  const title = ce('span', 'topbar-title'); title.textContent = '💡 Ətir Tövsiyəsi';
  hdr.appendChild(back); hdr.appendChild(title);
  page.appendChild(hdr);

  const desc = ce('p');
  desc.style.cssText = 'font-size:12px;color:#ababab;margin-bottom:16px;line-height:1.5';
  desc.textContent = XLSX_BLENDLER.length + ' hazır blend arasından — sizə uyğun olanı tapın. Hissinizi yazın və ya filtr seçin.';
  page.appendChild(desc);

  // ── Mode tabs ──
  const modeTabs = ce('div');
  modeTabs.style.cssText = 'display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap';
  [['hiss','✍️ Hiss ilə'],['ozal','🌿 Ətir ilə'],['movzu','🎯 Mövzu ilə'],['filtr','🔍 Filtr ilə']].forEach(([m, lbl]) => {
    const btn = ce('button');
    const sel = (T.mode||'hiss') === m;
    btn.style.cssText = `flex:1;padding:9px;border-radius:10px;border:1.5px solid ${sel?'#a78bfa':'#333'};background:${sel?'rgba(167,139,250,.15)':'transparent'};color:${sel?'#a78bfa':'#888'};font-size:13px;cursor:pointer;font-weight:${sel?'700':'400'}`;
    btn.textContent = lbl;
    btn.onclick = () => { S.atirTov = {...(S.atirTov||{}), mode: m, result: null}; render(); };
    modeTabs.appendChild(btn);
  });
  page.appendChild(modeTabs);

  if ((T.mode||'hiss') === 'hiss') {
    // ── HİSS MOD: istifadəçi hissi yazır, AI blend tövsiyə edir ──
    const card = ce('div', 'kal-card');
    const body = ce('div', 'kal-body');

    const lbl = ce('div', 'form-label'); lbl.style.marginBottom = '8px';
    lbl.textContent = 'Hissinizi, istədiyiniz atmosferi, məkanı təsvir edin:';
    body.appendChild(lbl);

    const examples = ce('div');
    examples.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px';
    ['Soyuq qış gecəsi ☃️','Bahar bağçası 🌸','Dəniz sahili 🌊','Qəhvəxana 🍂','Romantik axşam 🕯️','Uşaqlıq xatirəsi 🍬'].forEach(ex => {
      const chip = ce('button');
      chip.style.cssText = 'padding:4px 10px;border-radius:12px;border:1px solid #333;background:transparent;color:#777;font-size:11px;cursor:pointer';
      chip.textContent = ex;
      chip.onclick = () => { S.atirTov = {...(S.atirTov||{}), hiss: ex}; render(); };
      examples.appendChild(chip);
    });
    body.appendChild(examples);

    const ta = ce('textarea');
    ta.style.cssText = 'width:100%;min-height:80px;background:#1a1a2e;border:1.5px solid #333;border-radius:10px;color:#e0e0e0;padding:10px;font-size:13px;resize:vertical;box-sizing:border-box;font-family:inherit;-webkit-appearance:none;';
    ta.placeholder = 'Məs: "Qışın soyuq gecəsində kitab oxuyarkən içilən isti kakaonun qoxusu"';
    ta.value = T.hiss || '';
    ta.setAttribute('lang','az'); ta.setAttribute('spellcheck','false');
    ta.oninput = () => { S.atirTov = {...(S.atirTov||{}), hiss: ta.value}; };
    body.appendChild(ta);

    // Məhsul tipi
    const tLbl = ce('div', 'form-label'); tLbl.style.cssText = 'margin:12px 0 7px';
    tLbl.textContent = 'Hansı məhsul üçün?';
    body.appendChild(tLbl);
    const tipRow = ce('div'); tipRow.style.cssText = 'display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap';
    ['Hamısı','Sabun','Əriyən Mum','Tablet'].forEach(tip => {
      const btn = ce('button');
      const sel = (T.tip||'Hamısı') === tip;
      btn.style.cssText = `padding:6px 12px;border-radius:12px;border:1.5px solid ${sel?'#a78bfa':'#333'};background:${sel?'rgba(167,139,250,.12)':'transparent'};color:${sel?'#a78bfa':'#888'};font-size:12px;cursor:pointer`;
      btn.textContent = tip;
      btn.onclick = () => { S.atirTov = {...(S.atirTov||{}), tip}; render(); };
      tipRow.appendChild(btn);
    });
    body.appendChild(tipRow);

    // Cins
    const cLbl = ce('div', 'form-label'); cLbl.style.cssText = 'margin-bottom:7px';
    cLbl.textContent = 'Hədəf auditoriya:';
    body.appendChild(cLbl);
    const cinsRow = ce('div'); cinsRow.style.cssText = 'display:flex;gap:5px;margin-bottom:16px';
    ['Hamısı','Qadın','Kişi','Unisex','Uşaq'].forEach(cin => {
      const btn = ce('button');
      const sel = (T.cins||'Hamısı') === cin;
      btn.style.cssText = `padding:6px 12px;border-radius:12px;border:1.5px solid ${sel?'#a78bfa':'#333'};background:${sel?'rgba(167,139,250,.12)':'transparent'};color:${sel?'#a78bfa':'#888'};font-size:12px;cursor:pointer`;
      btn.textContent = cin;
      btn.onclick = () => { S.atirTov = {...(S.atirTov||{}), cins: cin}; render(); };
      cinsRow.appendChild(btn);
    });
    body.appendChild(cinsRow);

    const aiBtn = ce('button', 'pri-btn');
    aiBtn.style.cssText = 'width:100%;padding:14px;font-size:15px';
    aiBtn.textContent = T.loading ? '⏳ Axtarılır...' : '💡 Tövsiyə Et';
    aiBtn.disabled = !!T.loading;
    aiBtn.onclick = runAtirTovAI;
    body.appendChild(aiBtn);

    card.appendChild(body);
    page.appendChild(card);

    if (T.loading) {
      const load = ce('div');
      load.style.cssText = 'text-align:center;padding:24px;color:#c8c8c8;font-size:13px';
      load.innerHTML = '<div class="spinner" style="margin:0 auto 10px"></div>Blendlər arasında axtarılır...';
      page.appendChild(load);
    }

    if (T.result && !T.loading) {
      page.appendChild(mkAtirTovResult(T.result));
    }

  } else if ((T.mode||'hiss') === 'ozal') {
    // ── ÖZƏL ƏTİR: bir ətir seç, AI tamamlayıcı blend yaratır ──
    page.appendChild(mkOzalAtirInline());
  } else if ((T.mode||'hiss') === 'movzu') {
    // ── ÖZƏL MÖVZU: mövzu ver, AI blend yaradır ──
    page.appendChild(mkMovzuInline());
  } else {
    // ── FİLTR MOD: tip + cins + profil seçib birbaşa blendlər ──
    const tipRow = ce('div'); tipRow.style.cssText = 'display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap';
    ['Hamısı','Sabun','Əriyən Mum','Tablet'].forEach(tip => {
      const btn = ce('button');
      const sel = (T.tip||'Hamısı') === tip;
      btn.style.cssText = `padding:6px 12px;border-radius:12px;border:1.5px solid ${sel?'#a78bfa':'#333'};background:${sel?'rgba(167,139,250,.12)':'transparent'};color:${sel?'#a78bfa':'#888'};font-size:12px;cursor:pointer`;
      btn.textContent = tip;
      btn.onclick = () => { S.atirTov = {...(S.atirTov||{}), tip, profiller:[]}; render(); };
      tipRow.appendChild(btn);
    });
    page.appendChild(tipRow);

    const cinsRow = ce('div'); cinsRow.style.cssText = 'display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap';
    ['Hamısı','Qadın','Kişi','Unisex','Uşaq'].forEach(cin => {
      const btn = ce('button');
      const sel = (T.cins||'Hamısı') === cin;
      btn.style.cssText = `padding:5px 10px;border-radius:12px;border:1.5px solid ${sel?'#a78bfa':'#333'};background:${sel?'rgba(167,139,250,.12)':'transparent'};color:${sel?'#a78bfa':'#888'};font-size:11px;cursor:pointer`;
      btn.textContent = cin;
      btn.onclick = () => { S.atirTov = {...(S.atirTov||{}), cins: cin, profiller:[]}; render(); };
      cinsRow.appendChild(btn);
    });
    page.appendChild(cinsRow);

    // Profile chips — filtered by current tip+cins
    const filtered = XLSX_BLENDLER.filter(b => {
      if ((T.tip||'Hamısı') !== 'Hamısı' && b.tip !== T.tip) return false;
      if ((T.cins||'Hamısı') !== 'Hamısı' && b.cins !== T.cins) return false;
      return true;
    });
    const uniqueProfs = [...new Set(filtered.map(b => b.profil))].sort();

    const pLbl = ce('div'); pLbl.style.cssText = 'font-size:11px;color:#888;margin-bottom:6px';
    pLbl.textContent = `Ətir profili (${uniqueProfs.length} növ, ${filtered.length} blend):`;
    page.appendChild(pLbl);

    const profWrap = ce('div'); profWrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px';
    uniqueProfs.forEach(prof => {
      const sel = (T.profiller||[]).includes(prof);
      const chip = ce('button');
      chip.style.cssText = `padding:5px 10px;border-radius:12px;border:1.5px solid ${sel?'#a78bfa':'#333'};background:${sel?'rgba(167,139,250,.12)':'transparent'};color:${sel?'#a78bfa':'#777'};font-size:11px;cursor:pointer`;
      chip.textContent = prof;
      chip.onclick = () => {
        const cur = S.atirTov.profiller||[];
        S.atirTov = {...S.atirTov, profiller: sel ? cur.filter(p=>p!==prof) : [...cur, prof]};
        render();
      };
      profWrap.appendChild(chip);
    });
    page.appendChild(profWrap);

    // Results — filtered
    const results = filtered.filter(b => !(T.profiller||[]).length || (T.profiller||[]).includes(b.profil));
    const rLbl = ce('div'); rLbl.style.cssText = 'font-size:11px;font-weight:700;color:#b5b5b5;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px';
    rLbl.textContent = `${results.length} Blend Tapıldı`;
    page.appendChild(rLbl);

    results.forEach(b => {
      const card = ce('div', 'result-box'); card.style.marginBottom = '8px';
      const topRow = ce('div'); topRow.style.cssText = 'display:flex;align-items:flex-start;gap:8px;margin-bottom:6px';
      const meta = ce('div'); meta.style.flex = '1';
      const adEl = ce('div'); adEl.style.cssText = 'font-size:13px;font-weight:700;color:#fff'; adEl.textContent = b.ad;
      const subEl = ce('div'); subEl.style.cssText = 'font-size:11px;color:#6c7a99;margin-top:2px';
      subEl.textContent = b.tip + ' · ' + b.cins + ' · ' + b.profil;
      meta.appendChild(adEl); meta.appendChild(subEl);
      topRow.appendChild(meta);
      card.appendChild(topRow);

      const ac = ce('div'); ac.style.cssText = 'font-size:11px;color:#8090b0;margin-bottom:8px;line-height:1.5';
      ac.textContent = b.acıqlama;
      card.appendChild(ac);

      const at = ce('div'); at.style.cssText = 'font-size:11px;color:#c8c8d8;margin-bottom:8px;line-height:1.6;font-family:monospace';
      at.textContent = b.atirlər;
      card.appendChild(at);

      const useBtn = ce('button', 'sec-btn'); useBtn.style.cssText = 'width:100%;font-size:12px;padding:7px';
      useBtn.textContent = '🧪 Blend Hesablayıcıya köçür';
      useBtn.onclick = () => { S.aBlend = b.atirlər; set({ atirSub: 'blend' }); };
      card.appendChild(useBtn);
      page.appendChild(card);
    });

    if (!results.length) {
      const empty = ce('div'); empty.style.cssText = 'text-align:center;padding:40px;color:#555;font-size:13px';
      empty.textContent = 'Bu filtrə uyğun blend tapılmadı.';
      page.appendChild(empty);
    }
  }

  return page;
}

async function runAtirTovAI() {
  if (!isAdmin()) { showToast('⛔ AI yalnız Admin üçündür'); return; }
  const T = S.atirTov || {};
  const hiss = (T.hiss || '').trim();
  if (!hiss) { showToast('Zəhmət olmasa hissinizi yazın'); return; }

  S.atirTov = {...(S.atirTov||{}), loading: true, result: null};
  render();

  // Filter candidate blends
  const candidates = XLSX_BLENDLER.filter(b => {
    if ((T.tip||'Hamısı') !== 'Hamısı' && b.tip !== T.tip) return false;
    if ((T.cins||'Hamısı') !== 'Hamısı' && b.cins !== T.cins) return false;
    return true;
  });

  // Send compact blend list to AI
  const blendList = candidates.map((b, i) =>
    `${i+1}. [${b.tip}|${b.cins}|${b.profil}] ${b.ad} — ${b.acıqlama}`
  ).join('\n');

  const systemPromptTov = `Sən Lavannelle brendinin ətir tövsiyəçisisən. İstifadəçinin hissini/atmosferini oxuyub ən uyğun hazır blendləri tövsiyə edirsən. Yalnız JSON cavab ver.\n\n⚠️ SABUN QAYDASI: Sabun blendlərini tövsiyə edərkən yalnız "FO USA" ətirləri olan blendlər tövsiyə et.\n\nHazır blendlər kataloqu:\n${blendList}`;

  const prompt = `İstifadəçi bu hissi/atmosferi təsvir etdi: "${hiss}"

Yuxarıdakı blend kataloqunda ən uyğun 3-5 blendi tap. Hər biri üçün niyə uyğun olduğunu Azərbaycanca izah et.

YALNIZ JSON ver:
{"tovsiyeler":[{"nomre":1,"ad":"Blend adı","tip":"Sabun/Əriyən Mum/Tablet","profil":"profil","uygunluq":"niyə bu blend bu hissə uyğundur — 1-2 cümlə","atirlər":"ətir resepti"}]}`;

  try {
    const resp = await fetch(GS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'ai_blend', prompt, systemPrompt: systemPromptTov })
    });
    const data = await resp.json();
    if (data.error) { S.atirTov = {...S.atirTov, loading:false}; render(); showToast('API xətası'); return; }
    const text = data.content.map(i => i.text||'').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    S.atirTov = {...S.atirTov, loading: false, result: parsed};
    render();
  } catch(e) {
    S.atirTov = {...S.atirTov, loading: false};
    render();
    showToast('Xəta baş verdi');
  }
}

function mkAtirTovResult(result) {
  const wrap = ce('div');
  const sec = ce('div'); sec.style.cssText = 'font-size:11px;font-weight:700;color:#b5b5b5;letter-spacing:.8px;text-transform:uppercase;margin:16px 0 10px';
  sec.textContent = 'AI Tövsiyələri';
  wrap.appendChild(sec);

  (result.tovsiyeler || []).forEach((t, i) => {
    const card = ce('div', 'result-box'); card.style.marginBottom = '10px';

    const badge = ce('div'); badge.style.cssText = 'display:inline-block;padding:2px 8px;border-radius:8px;background:rgba(167,139,250,.2);color:#a78bfa;font-size:10px;font-weight:700;margin-bottom:6px';
    badge.textContent = '#' + (i+1) + ' · ' + (t.tip||'') + ' · ' + (t.profil||'');
    card.appendChild(badge);

    const adEl = ce('div'); adEl.style.cssText = 'font-size:14px;font-weight:700;color:#fff;margin-bottom:5px';
    adEl.textContent = t.ad || '';
    card.appendChild(adEl);

    const uyEl = ce('div'); uyEl.style.cssText = 'font-size:12px;color:#8090b0;margin-bottom:8px;line-height:1.5;font-style:italic';
    uyEl.textContent = t.uygunluq || '';
    card.appendChild(uyEl);

    const atEl = ce('div'); atEl.style.cssText = 'font-size:11px;color:#c0c8d8;margin-bottom:10px;line-height:1.6;font-family:monospace;background:rgba(0,0,0,.2);padding:8px;border-radius:6px';
    atEl.textContent = t.atirlər || '';
    card.appendChild(atEl);

    const useBtn = ce('button', 'sec-btn'); useBtn.style.cssText = 'width:100%;font-size:12px;padding:7px';
    useBtn.textContent = '🧪 Blend Hesablayıcıya köçür';
    useBtn.onclick = () => { S.aBlend = t.atirlər; set({ atirSub: 'blend' }); };
    card.appendChild(useBtn);

    wrap.appendChild(card);
  });

  return wrap;
}
