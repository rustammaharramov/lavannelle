<body>

<script>
const GS_URL = "https://script.google.com/macros/s/AKfycbwRBlwxa5QWiPLIi01snlYxq9oszd2LS4e57jdDIH4xFEZtR9DHlyAXARHNYJfsSi9P/exec";

  {id:55,name:"Su",qty:1,unit:"L",price:1,note:""}
];

let nextId = 400;

// ── UTILS ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function ce(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

async function gsLoad() {
  const r = await fetch(GS_URL + '?t=' + Date.now());
  if (!r.ok) throw new Error('fail');
  const d = await r.json();
  return Array.isArray(d) && d.length > 0 ? d : null;
}

async function gsSave(items) {
  const r = await fetch(GS_URL, { method: 'POST', body: JSON.stringify(items) });
  if (!r.ok) throw new Error('fail');
}

function pricePerUnit(item) {
  const v = parseFloat(item.qty) || 0;
  const u = (item.unit || '').toLowerCase();
  let grams = v;
  if (u === 'kg') grams = v * 1000;
  if (u === 'l') grams = v * 1000;
  if (!grams || !item.price) return null;
  return parseFloat(item.price) / grams;
}

function similarity(a, b) {
  const A = a.toLowerCase().trim();
  const B = b.toLowerCase().trim();
  if (A === B) return 1;
  if (A.length > 4 && B.includes(A)) return 0.95;
  if (B.length > 4 && A.includes(B)) return 0.95;
  const wA = A.split(' ').filter(w => w.length > 2);
  const wB = B.split(' ').filter(w => w.length > 2);
  if (!wA.length) return 0;
  let m = 0;
  for (const w of wA) {
    if (wB.some(wb => wb === w || (w.length > 4 && wb.includes(w)) || (wb.length > 4 && w.includes(wb)))) m++;
  }
  const ratio = m / wA.length;
  return ratio >= 0.75 ? ratio * 0.85 : 0;
}

function bestMatch(name, anbar) {
  let best = null, bs = 0;
  for (const i of anbar) {
    const s = similarity(name, i.name);
    if (s > bs) { bs = s; best = i; }
  }
  return bs >= 0.75 ? best : null;
}

function parseRecipe(text) {
  const results = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const c = line.trim().replace(/^[•\-\*\d\.]+\s*/, '').trim();
    const m = c.match(/^(.*?)\s+([\d.,]+)\s*%\s*$/);
    if (!m) continue;
    const name = m[1].trim();
    const pct = parseFloat(m[2].replace(',', '.'));
    if (!name || isNaN(pct)) continue;
    results.push({ id: Math.random().toString(36), parsedName: name, percent: pct, materialId: '' });
  }
  return results;
}

// ── STATE ─────────────────────────────────────────────────────
const S = {
  page: 'home', anbar: [], loading: true,
  search: '', editId: null, editBuf: {}, syncSt: '',
  kStep: 1, kText: '', kWeight: '', kUnit: 'ml', kRows: [], kName: ''
};

function set(patch) {
  Object.assign(S, patch);
  render();
}

// ── PERSIST ───────────────────────────────────────────────────
async function persist(items) {
  set({ anbar: items, syncSt: 'saving' });
  try {
    await gsSave(items);
    try { localStorage.setItem('lav', JSON.stringify(items)); } catch(e) {}
    set({ syncSt: 'sync' });
    showToast('✓ Saxlanıldı');
  } catch(e) {
    try { localStorage.setItem('lav', JSON.stringify(items)); } catch(e2) {}
    set({ syncSt: 'local' });
    showToast('⚠ Yalnız bu cihazda saxlanıldı');
  }
  setTimeout(() => set({ syncSt: '' }), 3000);
}

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  // Əvvəlcə loading olmadan INIT-i göstər ki, ağ ekran olmasın
  let data = null;

  // 1. localStorage-dan oxu (sürətli)
  try {
    const s = localStorage.getItem('lav');
    if (s) data = JSON.parse(s);
  } catch(e) {}

  // Əgər local data varsa dərhal göstər
  if (data && data.length) {
    set({ anbar: data, loading: false });
  } else {
    // Local yoxdur — INIT-i göstər
    set({ anbar: INIT, loading: false });
    try { localStorage.setItem('lav', JSON.stringify(INIT)); } catch(e) {}
  }

  // Sonra arxa planda Google Sheets-dən yüklə
  try {
    const gsData = await gsLoad();
    if (gsData && gsData.length) {
      set({ anbar: gsData });
      try { localStorage.setItem('lav', JSON.stringify(gsData)); } catch(e) {}
    } else if (!data || !data.length) {
      // GS boşdur, INIT-i yaz
      try { await gsSave(INIT); } catch(e) {}
    }
  } catch(e) {
    // GS işləmir — problem yoxdur, local ilə davam et
  }
}

// ── ANBAR ─────────────────────────────────────────────────────
function startEdit(item) {
  set({ editId: item.id, editBuf: { name: item.name, qty: String(item.qty), unit: item.unit, price: String(item.price), note: item.note || '' } });
}

function addItem() {
  const n = { id: nextId++, name: '', qty: '', unit: 'ml', price: '', note: '' };
  S.anbar.push(n);
  set({ anbar: S.anbar });
  startEdit(n);
}

async function saveItem() {
  const b = S.editBuf;
  const items = S.anbar.map(i => i.id === S.editId
    ? { ...i, name: b.name, qty: parseFloat(b.qty) || b.qty, unit: b.unit, price: parseFloat(b.price) || b.price, note: b.note }
    : i
  );
  set({ editId: null, editBuf: {} });
  await persist(items);
}

function cancelEdit() {
  const i = S.anbar.find(x => x.id === S.editId);
  if (i && !i.name && !i.qty && !i.price) {
    set({ anbar: S.anbar.filter(x => x.id !== S.editId) });
  }
  set({ editId: null, editBuf: {} });
}

async function delItem(id) {
  await persist(S.anbar.filter(i => i.id !== id));
}

// ── KALKULATOR ────────────────────────────────────────────────
function kParse() {
  const rows = parseRecipe(S.kText).map(r => {
    const m = bestMatch(r.parsedName, S.anbar);
    return { ...r, materialId: m ? String(m.id) : '' };
  });
  set({ kRows: rows, kStep: 2 });
}

function kUpdRow(id, f, v) {
  set({ kRows: S.kRows.map(r => r.id === id ? { ...r, [f]: v } : r) });
}

function kDelRow(id) {
  set({ kRows: S.kRows.filter(r => r.id !== id) });
}

function kReset() {
  set({ kStep: 1, kText: '', kWeight: '', kUnit: 'ml', kRows: [], kName: '' });
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';

  if (S.loading) {
    const d = ce('div', 'loading');
    d.innerHTML = '<div class="spinner"></div><p>Yüklənir...</p>';
    root.appendChild(d);
    return;
  }

  if (S.page === 'home') {
    root.appendChild(mkHome());
    return;
  }

  root.appendChild(mkNav());
  if (S.page === 'anbar') root.appendChild(mkAnbar());
  if (S.page === 'kalkulyator') root.appendChild(mkKalkulyator());
}

function mkHome() {
  const d = ce('div', 'home');

  const logo = ce('div');
  logo.style.fontSize = '54px';
  logo.style.marginBottom = '10px';
  logo.textContent = '🌿';

  const h1 = ce('h1');
  h1.textContent = 'Lavannelle';

  const sub = ce('p');
  sub.textContent = 'Xammal anbarı və kalkulyator';

  const c1 = ce('button', 'home-card');
  c1.innerHTML = '<div class="hc-icon">📦</div><div class="hc-body"><div class="hc-title">Anbar</div><div class="hc-desc">Xammal və materialların qiymət reyestri</div></div><div class="hc-arrow">→</div>';
  c1.onclick = () => set({ page: 'anbar' });

  const c2 = ce('button', 'home-card');
  c2.innerHTML = '<div class="hc-icon">🧪</div><div class="hc-body"><div class="hc-title">Kalkulyator</div><div class="hc-desc">Resept əsasında xərc hesabla</div></div><div class="hc-arrow">→</div>';
  c2.onclick = () => set({ page: 'kalkulyator' });

  d.appendChild(logo);
  d.appendChild(h1);
  d.appendChild(sub);
  d.appendChild(c1);
  d.appendChild(c2);
  return d;
}

function mkNav() {
  const nav = ce('nav', 'nav');

  const brand = ce('button', 'nav-brand');
  brand.innerHTML = '🌿 <span>Lavannelle</span>';
  brand.onclick = () => set({ page: 'home' });

  const tabs = ce('div', 'nav-tabs');
  [['anbar', '📦 Anbar'], ['kalkulyator', '🧪 Kalkul.']].forEach(([k, l]) => {
    const b = ce('button', 'nav-tab' + (S.page === k ? ' active' : ''));
    b.textContent = l;
    b.onclick = () => set({ page: k });
    tabs.appendChild(b);
  });

  nav.appendChild(brand);
  nav.appendChild(tabs);
  return nav;
}

function mkAnbar() {
  const page = ce('div', 'page');
  const filtered = S.anbar.filter(i => (i.name || '').toLowerCase().includes(S.search.toLowerCase()));
  const total = S.anbar.reduce((s, i) => s + (parseFloat(i.price) || 0), 0);

  // topbar
  const tb = ce('div', 'topbar');
  const si = ce('input', 'search-inp');
  si.type = 'text';
  si.placeholder = '🔍 Axtar...';
  si.value = S.search;
  si.oninput = e => { S.search = e.target.value; render(); };
  const ab = ce('button', 'add-btn');
  ab.textContent = '+ Əlavə';
  ab.onclick = addItem;
  tb.appendChild(si);
  tb.appendChild(ab);

  // statusbar
  const sb = ce('div', 'statusbar');
  const info = ce('span', 'st-info');
  info.textContent = S.anbar.length + ' material · ₼' + total.toFixed(2);
  sb.appendChild(info);
  if (S.syncSt === 'sync') {
    const b = ce('span', 'st-badge st-sync');
    b.textContent = '✓ Sinxron';
    sb.appendChild(b);
  } else if (S.syncSt === 'local' || S.syncSt === 'saving') {
    const b = ce('span', 'st-badge st-local');
    b.textContent = S.syncSt === 'saving' ? '...' : '⚠ Bu cihaz';
    sb.appendChild(b);
  }

  const list = ce('div', 'mat-list');

  if (!filtered.length) {
    const em = ce('div', 'empty-msg');
    em.textContent = S.search ? 'Nəticə tapılmadı.' : 'Anbar boşdur.';
    list.appendChild(em);
  }

  filtered.forEach((item, idx) => {
    const card = ce('div', 'mat-card');

    const row = ce('div', 'mat-row');
    const num = ce('span', 'mat-num');
    num.textContent = String(idx + 1);
    const info2 = ce('div', 'mat-info');
    const nm = ce('div', 'mat-name');
    nm.textContent = item.name || '—';
    const meta = ce('div', 'mat-meta');
    meta.textContent = (item.qty || '') + ' ' + (item.unit || '');
    info2.appendChild(nm);
    info2.appendChild(meta);
    if (item.note) {
      const nt = ce('div', 'mat-note');
      nt.textContent = item.note;
      info2.appendChild(nt);
    }
    const price = ce('span', 'mat-price');
    price.textContent = item.price ? '₼' + parseFloat(item.price).toFixed(2) : '—';
    const chev = ce('span', 'mat-chevron');
    chev.textContent = S.editId === item.id ? '▲' : '▼';

    row.appendChild(num);
    row.appendChild(info2);
    row.appendChild(price);
    row.appendChild(chev);
    row.onclick = () => { if (S.editId === item.id) cancelEdit(); else startEdit(item); };

    card.appendChild(row);
    if (S.editId === item.id) card.appendChild(mkEditForm());
    list.appendChild(card);
  });

  page.appendChild(tb);
  page.appendChild(sb);
  page.appendChild(list);
  return page;
}

function mkEditForm() {
  const b = S.editBuf;
  const form = ce('div', 'edit-form');

  // Name
  const ng = ce('div', 'form-full form-group');
  const nl = ce('label', 'form-label'); nl.textContent = 'Ad';
  const ni = ce('input', 'form-inp');
  ni.type = 'text'; ni.value = b.name || ''; ni.placeholder = 'Material adı';
  ni.oninput = e => { S.editBuf.name = e.target.value; };
  ng.appendChild(nl); ng.appendChild(ni);

  // Qty + Unit
  const grid = ce('div', 'form-grid');
  const qg = ce('div', 'form-group');
  const ql = ce('label', 'form-label'); ql.textContent = 'Miqdar';
  const qi = ce('input', 'form-inp');
  qi.type = 'number'; qi.value = b.qty || ''; qi.placeholder = '100'; qi.min = '0'; qi.step = '0.01';
  qi.oninput = e => { S.editBuf.qty = e.target.value; };
  qg.appendChild(ql); qg.appendChild(qi);

  const ug = ce('div', 'form-group');
  const ul = ce('label', 'form-label'); ul.textContent = 'Ölçü';
  const us = ce('select', 'form-inp');
  ['ml', 'qr', 'g', 'kg', 'L'].forEach(u => {
    const o = ce('option'); o.value = u; o.textContent = u;
    if (b.unit === u) o.selected = true;
    us.appendChild(o);
  });
  us.onchange = e => { S.editBuf.unit = e.target.value; };
  ug.appendChild(ul); ug.appendChild(us);
  grid.appendChild(qg); grid.appendChild(ug);

  // Price
  const pg = ce('div', 'form-full form-group');
  const pl = ce('label', 'form-label'); pl.textContent = 'Qiymət (₼)';
  const pi = ce('input', 'form-inp');
  pi.type = 'number'; pi.value = b.price || ''; pi.placeholder = '0.00'; pi.min = '0'; pi.step = '0.01';
  pi.oninput = e => { S.editBuf.price = e.target.value; };
  pg.appendChild(pl); pg.appendChild(pi);

  // Note
  const nog = ce('div', 'form-full form-group');
  const nol = ce('label', 'form-label'); nol.textContent = 'Qeyd';
  const noi = ce('input', 'form-inp');
  noi.type = 'text'; noi.value = b.note || ''; noi.placeholder = 'İxtiyari';
  noi.oninput = e => { S.editBuf.note = e.target.value; };
  nog.appendChild(nol); nog.appendChild(noi);

  // Buttons
  const btns = ce('div', 'form-btns');
  const sv = ce('button', 'btn-save'); sv.textContent = '✓ Saxla'; sv.onclick = saveItem;
  const cc = ce('button', 'btn-cancel'); cc.textContent = 'Ləğv'; cc.onclick = cancelEdit;
  btns.appendChild(sv); btns.appendChild(cc);

  const del = ce('button', 'btn-delete'); del.textContent = '🗑 Sil'; del.onclick = () => delItem(S.editId);

  form.appendChild(ng);
  form.appendChild(grid);
  form.appendChild(pg);
  form.appendChild(nog);
  form.appendChild(btns);
  form.appendChild(del);

  setTimeout(() => { if (!b.name) ni.focus(); }, 50);
  return form;
}

function mkKalkulyator() {
  const page = ce('div', 'page');

  const hdr = ce('div', 'topbar');
  const title = ce('span', 'topbar-title');
  title.textContent = '🧪 Kalkulyator';
  hdr.appendChild(title);
  if (S.kStep > 1) {
    const nb = ce('button', 'sec-btn');
    nb.textContent = '← Yeni';
    nb.onclick = kReset;
    hdr.appendChild(nb);
  }

  page.appendChild(hdr);
  page.appendChild(mkSteps());

  if (S.kStep === 1) page.appendChild(mkKStep1());
  if (S.kStep === 2) page.appendChild(mkKStep2());
  if (S.kStep === 3) page.appendChild(mkKStep3());
  return page;
}

function mkSteps() {
  const wrap = ce('div', 'steps');
  const defs = ['Resept', 'Həcm', 'Nəticə'];
  defs.forEach((label, i) => {
    const n = i + 1;
    const act = S.kStep === n, done = S.kStep > n;
    const pill = ce('div', 'step-pill');
    if (act) pill.style.cssText = 'background:#1a1a2e;color:#fff;border:1.5px solid #1a1a2e';
    else if (done) pill.style.cssText = 'background:#ebfbee;color:#2b8a3e;border:1.5px solid #b2f2bb';
    else pill.style.cssText = 'background:#e8e4dc;color:#aaa;border:1.5px solid #d5cec6';

    const num = ce('div', 'step-num');
    if (act) num.style.cssText = 'background:#fff;color:#1a1a2e';
    else if (done) num.style.cssText = 'background:#2b8a3e;color:#fff';
    else num.style.cssText = 'background:#c8c0b4;color:#fff';
    num.textContent = done ? '✓' : String(n);

    pill.appendChild(num);
    pill.appendChild(document.createTextNode(label));
    wrap.appendChild(pill);

    if (i < 2) {
      const line = ce('div', 'step-line');
      line.style.background = done ? '#b2f2bb' : '#d5cec6';
      wrap.appendChild(line);
    }
  });
  return wrap;
}

function mkKStep1() {
  const card = ce('div', 'kal-card');
  const ta = ce('textarea', 'recipe-ta');
  ta.placeholder = 'Resepti bura yapışdırın:\n\n• Jojoba yağı 55%\n• Şirin Badam yağı 43.5%\n• Vitamin E (33% Tocopherol) 1.5%';
  ta.value = S.kText;
  ta.oninput = e => { S.kText = e.target.value; };

  const foot = ce('div', 'kal-footer');
  const hint = ce('span');
  hint.style.cssText = 'font-size:12px;color:#aaa';
  hint.textContent = 'Hər sətirdə ad və faiz';
  const btn = ce('button', 'pri-btn');
  btn.textContent = 'Növbəti →';
  btn.onclick = kParse;
  foot.appendChild(hint);
  foot.appendChild(btn);

  card.appendChild(ta);
  card.appendChild(foot);
  return card;
}

function mkKStep2() {
  const card = ce('div', 'kal-card');
  const body = ce('div', 'kal-body');

  const h2 = ce('h2');
  h2.style.cssText = 'font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:6px';
  h2.textContent = 'Həcm / Ağırlıq';
  const p2 = ce('p');
  p2.style.cssText = 'font-size:13px;color:#666;margin-bottom:16px';
  p2.textContent = 'Bu resept neçə ml / g üçündür?';

  const row = ce('div');
  row.style.cssText = 'display:flex;gap:10px;align-items:center;margin-bottom:14px';
  const wi = ce('input', 'form-inp');
  wi.type = 'number'; wi.value = S.kWeight; wi.placeholder = '30'; wi.min = '0'; wi.step = '.1';
  wi.style.cssText = 'width:110px;font-size:22px;font-weight:700';
  wi.oninput = e => { S.kWeight = e.target.value; };
  const us = ce('select', 'form-inp');
  us.style.cssText = 'width:80px;font-size:18px;font-weight:600';
  ['ml', 'g'].forEach(u => {
    const o = ce('option'); o.value = u; o.textContent = u;
    if (S.kUnit === u) o.selected = true;
    us.appendChild(o);
  });
  us.onchange = e => { S.kUnit = e.target.value; };
  row.appendChild(wi); row.appendChild(us);

  const info = ce('div');
  info.style.cssText = 'font-size:12px;color:#999;background:#f7f4ef;border-radius:8px;padding:10px 13px';
  info.textContent = S.kRows.length + ' ingredient · ' + S.kRows.reduce((s, r) => s + (parseFloat(r.percent) || 0), 0).toFixed(2) + '%';

  body.appendChild(h2); body.appendChild(p2); body.appendChild(row); body.appendChild(info);

  const foot = ce('div', 'kal-footer');
  const bb = ce('button', 'sec-btn'); bb.textContent = '← Geri'; bb.onclick = () => set({ kStep: 1 });
  const nb = ce('button', 'pri-btn'); nb.textContent = 'Hesabla →';
  nb.onclick = () => { if (S.kWeight && parseFloat(S.kWeight) > 0) set({ kStep: 3 }); };
  foot.appendChild(bb); foot.appendChild(nb);

  card.appendChild(body); card.appendChild(foot);
  return card;
}

function mkKStep3() {
  const wrap = ce('div');
  const tw = parseFloat(S.kWeight) || 0;

  const rowResults = S.kRows.map(r => {
    const mat = S.anbar.find(a => String(a.id) === String(r.materialId));
    const pct = parseFloat(r.percent) || 0;
    if (!mat || !pct || !tw) return { ...r, mat, pct, cost: null, usedAmt: null };
    const ppu = pricePerUnit(mat);
    const ua = (pct / 100) * tw;
    return { ...r, mat, pct, cost: ppu != null ? ppu * ua : null, usedAmt: ua };
  });

  const totPct = rowResults.reduce((s, r) => s + (r.pct || 0), 0);
  const totCost = rowResults.reduce((s, r) => s + (r.cost || 0), 0);
  const pctOk = Math.abs(totPct - 100) < 0.01;
  const unm = S.kRows.filter(r => !r.materialId).length;

  // name input
  const ni = ce('input', 'form-inp');
  ni.type = 'text'; ni.value = S.kName; ni.placeholder = 'Məhsul adı (ixtiyari)';
  ni.style.cssText = 'margin-bottom:12px;width:100%';
  ni.oninput = e => { S.kName = e.target.value; };
  wrap.appendChild(ni);

  // chips
  const chips = ce('div', 'chips');
  const c1 = ce('div', 'chip ' + (pctOk ? 'chip-ok' : totPct > 100 ? 'chip-err' : 'chip-warn'));
  c1.textContent = totPct.toFixed(2) + '% ' + (pctOk ? '✓' : totPct > 100 ? '↑' : '↓');
  const c2 = ce('div', 'chip chip-neu');
  c2.textContent = tw + ' ' + S.kUnit;
  chips.appendChild(c1); chips.appendChild(c2);
  if (unm > 0) {
    const c3 = ce('div', 'chip chip-warn');
    c3.textContent = '⚠ ' + unm + ' tapılmadı';
    chips.appendChild(c3);
  }
  wrap.appendChild(chips);

  // result
  const res = ce('div', 'result-box');
  if (S.kName) { const rn = ce('div', 'res-name'); rn.textContent = S.kName; res.appendChild(rn); }
  const rsub = ce('div', 'res-sub'); rsub.textContent = tw + ' ' + S.kUnit + ' · ' + S.kRows.length + ' ingredient';
  const rlbl = ce('div', 'res-label'); rlbl.textContent = 'Birbaşa xərc';
  const rprice = ce('div', 'res-price'); rprice.textContent = '₼ ' + totCost.toFixed(4);
  const rapprox = ce('div', 'res-approx'); rapprox.textContent = '≈ ₼ ' + totCost.toFixed(2);
  res.appendChild(rsub); res.appendChild(rlbl); res.appendChild(rprice); res.appendChild(rapprox);
  wrap.appendChild(res);

  // ingredient cards
  rowResults.forEach(r => {
    const ic = ce('div', 'ing-card' + (r.materialId ? '' : ' unmatched'));
    const head = ce('div', 'ing-head');
    const nm = ce('span', 'ing-name' + (r.materialId ? '' : ' unmatched'));
    nm.textContent = r.parsedName;
    const del = ce('button', 'ing-del');
    del.textContent = '✕';
    del.onclick = () => kDelRow(r.id);
    head.appendChild(nm); head.appendChild(del);

    const sel = ce('select', 'ing-sel' + (r.materialId ? '' : ' unmatched'));
    const def = ce('option'); def.value = ''; def.textContent = '— Seçin —'; sel.appendChild(def);
    S.anbar.forEach(a => {
      const o = ce('option'); o.value = String(a.id);
      o.textContent = a.name + ' (' + a.qty + ' ' + a.unit + ')';
      if (String(r.materialId) === String(a.id)) o.selected = true;
      sel.appendChild(o);
    });
    sel.onchange = e => kUpdRow(r.id, 'materialId', e.target.value);

    const row2 = ce('div', 'ing-row');
    const pi = ce('input', 'ing-pct');
    pi.type = 'number'; pi.value = r.percent; pi.min = '0'; pi.max = '100'; pi.step = '.1';
    pi.oninput = e => kUpdRow(r.id, 'percent', e.target.value);
    const pctLbl = ce('span');
    pctLbl.style.cssText = 'font-size:13px;color:#aaa';
    pctLbl.textContent = '%';
    const cost = ce('div', 'ing-cost');
    if (r.cost != null) {
      cost.textContent = r.usedAmt.toFixed(2) + ' ' + S.kUnit + ' · ';
      const strong = ce('strong');
      strong.textContent = '₼ ' + r.cost.toFixed(4);
      cost.appendChild(strong);
    } else {
      cost.style.color = '#ccc';
      cost.textContent = '—';
    }
    row2.appendChild(pi); row2.appendChild(pctLbl); row2.appendChild(cost);

    ic.appendChild(head); ic.appendChild(sel); ic.appendChild(row2);
    wrap.appendChild(ic);
  });

  const nb = ce('button', 'new-kal-btn');
  nb.textContent = '+ Yeni resept';
  nb.onclick = kReset;
  wrap.appendChild(nb);
  return wrap;
}

init();
</script>
</body>
</html>
