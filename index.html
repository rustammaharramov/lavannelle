*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#F7F4EF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a2e;max-width:640px;margin:0 auto;min-height:100vh}
button{font-family:inherit;cursor:pointer}
.nav{background:#1a1a2e;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.nav-brand{color:#fff;font-size:16px;font-weight:700;border:none;background:none;padding:8px 0;display:flex;align-items:center;gap:6px}
.nav-brand span{color:#6c7a99;font-size:13px}
.nav-tabs{display:flex;gap:4px}
.nav-tab{background:none;border:none;color:#6c7a99;font-size:13px;font-weight:600;padding:8px 12px;border-radius:8px}
.nav-tab.active{background:rgba(255,255,255,.12);color:#fff}
.home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:10px}
.home h1{font-size:28px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.home p{font-size:14px;color:#999;margin-bottom:20px}
.home-card{width:100%;background:#fff;border:1.5px solid #e0dbd4;border-radius:16px;padding:22px 20px;display:flex;align-items:center;gap:16px;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.home-card:active{background:#faf8f5}
.hc-icon{font-size:30px;width:52px;height:52px;background:#f0ece4;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hc-body{flex:1}
.hc-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:2px}
.hc-desc{font-size:12px;color:#999;line-height:1.4}
.hc-arrow{font-size:20px;color:#3b5bdb;font-weight:700}
.page{padding:16px;min-height:calc(100vh - 56px)}
.topbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.topbar-title{flex:1;font-size:18px;font-weight:700;color:#1a1a2e}
.search-inp{flex:2;background:#fff;border:1.5px solid #e0dbd4;border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;min-width:0}
.search-inp:focus{outline:none;border-color:#3b5bdb}
.add-btn{background:#1a1a2e;color:#fff;border:none;border-radius:12px;padding:12px 16px;font-size:14px;font-weight:700;white-space:nowrap}
.statusbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.st-info{font-size:12px;color:#999}
.st-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.st-sync{background:#ebfbee;color:#2b8a3e;border:1px solid #b2f2bb}
.st-local{background:#fff3e0;color:#e67e22;border:1px solid #ffd8a8}
.mat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:80px}
.mat-card{background:#fff;border-radius:12px;border:1.5px solid #e0dbd4;overflow:hidden}
.mat-row{display:flex;align-items:center;padding:14px 16px;gap:10px}
.mat-row:active{background:#fafafa}
.mat-num{font-size:11px;color:#ccc;width:18px;flex-shrink:0;font-family:monospace;text-align:right}
.mat-info{flex:1;min-width:0}
.mat-name{font-size:15px;font-weight:600;color:#1a1a2e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mat-meta{font-size:12px;color:#aaa;margin-top:2px}
.mat-note{font-size:11px;color:#e67e22;font-weight:600;margin-top:2px}
.mat-price{font-size:15px;font-weight:700;color:#1a1a2e;font-family:monospace;flex-shrink:0;margin-right:4px}
.mat-chevron{font-size:14px;color:#ccc;flex-shrink:0}
.edit-form{background:#fffdf8;border-top:1.5px solid #f0ece4;padding:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-full{margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.6px}
.form-inp{background:#fff;border:1.5px solid #d5cec6;border-radius:10px;padding:12px 13px;font-size:15px;font-family:inherit;width:100%}
.form-inp:focus{outline:none;border-color:#3b5bdb}
.form-btns{display:flex;gap:8px}
.btn-save{flex:1;background:#1a1a2e;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700}
.btn-cancel{background:#f0ece4;color:#555;border:none;border-radius:10px;padding:14px 18px;font-size:14px;font-weight:600}
.btn-delete{background:#fff5f5;color:#c92a2a;border:1.5px solid #ffc9c9;border-radius:10px;padding:14px;font-size:14px;font-weight:600;margin-top:8px;width:100%}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:13px 26px;border-radius:24px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.toast.show{opacity:1}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;background:#F7F4EF}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:34px;height:34px;border:3px solid #e0dbd4;border-top-color:#3b5bdb;border-radius:50%;animation:spin .7s linear infinite}
.loading p{font-size:13px;color:#999}
.steps{display:flex;align-items:center;margin-bottom:18px}
.step-pill{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 5px;border-radius:20px;font-size:12px;font-weight:600}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.step-line{flex:1;height:1.5px;min-width:12px}
.kal-card{background:#fff;border-radius:12px;border:1.5px solid #e0dbd4;overflow:hidden;margin-bottom:12px}
.kal-body{padding:20px 16px}
.kal-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#faf8f5;border-top:1px solid #f0ece4}
.recipe-ta{width:100%;padding:16px;font-size:14px;font-family:inherit;border:none;resize:none;color:#333;line-height:1.9;min-height:220px;background:#fff}
.recipe-ta:focus{outline:none}
.pri-btn{background:#1a1a2e;color:#fff;border:none;border-radius:10px;padding:13px 22px;font-size:15px;font-weight:700}
.sec-btn{background:#f0ece4;color:#555;border:none;border-radius:10px;padding:13px 18px;font-size:14px;font-weight:600}
.ing-card{background:#fff;border-radius:12px;border:1.5px solid #e0dbd4;padding:14px;margin-bottom:8px}
.ing-card.unmatched{border-color:#ffd8a8;background:#fffbf0}
.ing-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ing-name{font-size:14px;font-weight:600;color:#1a1a2e}
.ing-name.unmatched{color:#e67e22}
.ing-del{background:#fff5f5;color:#c92a2a;border:1px solid #ffc9c9;border-radius:6px;padding:6px 10px;font-size:12px}
.ing-sel{width:100%;background:#fff;border:1.5px solid #d5cec6;border-radius:8px;padding:11px 10px;font-size:14px;font-family:inherit;margin-bottom:8px}
.ing-sel.unmatched{border-color:#ffd8a8}
.ing-sel:focus{outline:none;border-color:#3b5bdb}
.ing-row{display:flex;align-items:center;gap:8px}
.ing-pct{width:90px;background:#fff;border:1.5px solid #d5cec6;border-radius:8px;padding:11px;font-size:15px;font-family:inherit;text-align:center}
.ing-pct:focus{outline:none;border-color:#3b5bdb}
.ing-cost{flex:1;font-size:13px;color:#666;text-align:right}
.ing-cost strong{color:#1a1a2e;font-family:monospace;font-size:14px}
.result-box{background:#1a1a2e;border-radius:14px;padding:22px 20px;margin-bottom:12px}
.res-name{color:#fff;font-size:18px;font-weight:700;margin-bottom:2px}
.res-sub{color:#6c7a99;font-size:13px;margin-bottom:18px}
.res-label{font-size:10px;color:#6c7a99;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.res-price{color:#fff;font-family:monospace;font-weight:800;font-size:34px;letter-spacing:-1px}
.res-approx{color:#a0b0cc;font-family:monospace;font-size:14px;margin-top:5px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid}
.chip-ok{background:#ebfbee;color:#2b8a3e;border-color:#b2f2bb}
.chip-warn{background:#fffbf0;color:#e67e22;border-color:#ffd8a8}
.chip-err{background:#fff5f5;color:#c92a2a;border-color:#ffc9c9}
.chip-neu{background:#f0ece4;color:#555;border-color:#d5cec6}
.new-kal-btn{width:100%;background:#f0ece4;color:#1a1a2e;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;margin-bottom:30px}
.empty-msg{text-align:center;padding:40px 20px;color:#ccc;font-size:14px}
</style>

function pricePerUnit(item) {
  const v = parseFloat(item.qty) || 0;
  const u = (item.unit || '').toLowerCase();
  let grams = v;
  if (u === 'kg') grams = v * 1000;
  if (u === 'l') grams = v * 1000;
  if (!grams || !item.price) return null;
  return parseFloat(item.price) / grams;
}

function similarity(a, b) {
  const A = a.toLowerCase().trim();
  const B = b.toLowerCase().trim();
  if (A === B) return 1;
  if (A.length > 4 && B.includes(A)) return 0.95;
  if (B.length > 4 && A.includes(B)) return 0.95;
  const wA = A.split(' ').filter(w => w.length > 2);
  const wB = B.split(' ').filter(w => w.length > 2);
  if (!wA.length) return 0;
  let m = 0;
  for (const w of wA) {
    if (wB.some(wb => wb === w || (w.length > 4 && wb.includes(w)) || (wb.length > 4 && w.includes(wb)))) m++;
  }
  const ratio = m / wA.length;
  return ratio >= 0.75 ? ratio * 0.85 : 0;
}

function bestMatch(name, anbar) {
  let best = null, bs = 0;
  for (const i of anbar) {
    const s = similarity(name, i.name);
    if (s > bs) { bs = s; best = i; }
  }
  return bs >= 0.75 ? best : null;
}

function parseRecipe(text) {
  const results = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const c = line.trim().replace(/^[•\-\*\d\.]+\s*/, '').trim();
    const m = c.match(/^(.*?)\s+([\d.,]+)\s*%\s*$/);
    if (!m) continue;
    const name = m[1].trim();
    const pct = parseFloat(m[2].replace(',', '.'));
    if (!name || isNaN(pct)) continue;
    results.push({ id: Math.random().toString(36), parsedName: name, percent: pct, materialId: '' });
  }
  return results;
}

function set(patch) {
  const wasPage = S.page;
  const wasAtirSub = S.atirSub;
  Object.assign(S, patch);
  // Only push history when page or sub-page changes
  if (patch.page !== undefined && patch.page !== wasPage) {
    history.pushState({ page: S.page, atirSub: S.atirSub }, '');
  } else if (patch.atirSub !== undefined && patch.atirSub !== wasAtirSub) {
    history.pushState({ page: S.page, atirSub: S.atirSub }, '');
  }
  render();
}

    set({ syncSt: 'sync' });
    showToast('✓ Saxlanıldı');
  } catch(e) {
    try { localStorage.setItem('lav', JSON.stringify(items)); } catch(e2) {}
    set({ syncSt: 'local' });
    showToast('⚠ Yalnız bu cihazda saxlanıldı');
  }
  setTimeout(() => set({ syncSt: '' }), 3000);
}

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  // Əvvəlcə loading olmadan INIT-i göstər ki, ağ ekran olmasın
  let data = null;

  // 1. localStorage-dan oxu (sürətli)
  try {
    const s = localStorage.getItem('lav');
    if (s) data = JSON.parse(s);
  } catch(e) {}

  // Əgər local data varsa dərhal göstər
  if (data && data.length) {
    set({ anbar: data, loading: false });
  history.replaceState({ page: 'home', atirSub: null }, '');
  } else {
    // Local yoxdur — INIT-i göstər
    set({ anbar: INIT, loading: false });
    try { localStorage.setItem('lav', JSON.stringify(INIT)); } catch(e) {}
  }

  // nextId-ni yenilə
  nextId = Math.max(...S.anbar.map(i => parseInt(i.id)||0)) + 1;
  if (nextId < 100) nextId = 100;

  // Ətir anbarını da yüklə
  initAtir();

  // Sonra arxa planda Google Sheets-dən yüklə
  try {
    const gsData = await gsLoad();
    if (gsData && gsData.length) {
      set({ anbar: gsData });
      nextId = Math.max(...gsData.map(i => parseInt(i.id)||0)) + 1;
      if (nextId < 100) nextId = 100;
      try { localStorage.setItem('lav', JSON.stringify(gsData)); } catch(e) {}
    } else if (!data || !data.length) {
      // GS boşdur, INIT-i yaz
      try { await gsSave(INIT); } catch(e) {}
    }
  } catch(e) {
    // GS işləmir — problem yoxdur, local ilə davam et
  }
}

function mkSteps() {
  const wrap = ce('div', 'steps');
  const defs = ['Resept', 'Həcm', 'Nəticə'];
  defs.forEach((label, i) => {
    const n = i + 1;
    const act = S.kStep === n, done = S.kStep > n;
    const pill = ce('div', 'step-pill');
    if (act) pill.style.cssText = 'background:#1a1a2e;color:#fff;border:1.5px solid #1a1a2e';
    else if (done) pill.style.cssText = 'background:#ebfbee;color:#2b8a3e;border:1.5px solid #b2f2bb';
    else pill.style.cssText = 'background:#e8e4dc;color:#aaa;border:1.5px solid #d5cec6';

    const num = ce('div', 'step-num');
    if (act) num.style.cssText = 'background:#fff;color:#1a1a2e';
    else if (done) num.style.cssText = 'background:#2b8a3e;color:#fff';
    else num.style.cssText = 'background:#c8c0b4;color:#fff';
    num.textContent = done ? '✓' : String(n);

    pill.appendChild(num);
    pill.appendChild(document.createTextNode(label));
    wrap.appendChild(pill);

    if (i < 2) {
      const line = ce('div', 'step-line');
      line.style.background = done ? '#b2f2bb' : '#d5cec6';
      wrap.appendChild(line);
    }
  });
  return wrap;
}

function mkKStep3() {
  const wrap = ce('div');
  const tw = parseFloat(S.kWeight) || 0;

  const rowResults = S.kRows.map(r => {
    const mat = S.anbar.find(a => String(a.id) === String(r.materialId));
    const pct = parseFloat(r.percent) || 0;
    if (!mat || !pct || !tw) return { ...r, mat, pct, cost: null, usedAmt: null };
    const ppu = pricePerUnit(mat);
    const ua = (pct / 100) * tw;
    return { ...r, mat, pct, cost: ppu != null ? ppu * ua : null, usedAmt: ua };
  });

  const totPct = rowResults.reduce((s, r) => s + (r.pct || 0), 0);
  const matCost = rowResults.reduce((s, r) => s + (r.cost || 0), 0);
  const umumiExtra = S.kUmumi ? (parseFloat(S.kUmumiVal) || 0) : 0;
  const qabExtra = S.kQab ? (parseFloat(S.kQabVal) || 0) : 0;
  const totCost = matCost + umumiExtra + qabExtra;
  const pctOk = Math.abs(totPct - 100) < 0.01;
  const unm = S.kRows.filter(r => !r.materialId).length;

  // name input
  const ni = ce('input', 'form-inp');
  ni.type = 'text'; ni.value = S.kName; ni.placeholder = 'Məhsul adı (ixtiyari)';
  ni.style.cssText = 'margin-bottom:12px;width:100%';
  ni.oninput = e => { S.kName = e.target.value; };
  wrap.appendChild(ni);

  // Ümumi xərclər checkbox
  function mkExtraRow(label, activeKey, valKey) {
    const row = ce('div');
    row.style.cssText = 'background:#fff;border:1.5px solid #e0dbd4;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px';

    const lbl = ce('div');
    lbl.style.cssText = 'flex:1;font-size:14px;font-weight:600;color:' + (S[activeKey] ? '#1a1a2e' : '#aaa');
    lbl.textContent = label;
    const inp2 = ce('input', 'form-inp');
    inp2.type = 'number'; inp2.value = S[valKey]; inp2.min = '0'; inp2.step = '0.01';
    inp2.style.cssText = 'width:90px;text-align:right;' + (S[activeKey] ? '' : 'opacity:.4');

    sym.textContent = '₼';
    row.appendChild(cb); row.appendChild(lbl); row.appendChild(inp2); row.appendChild(sym);
    return row;
  }

  // chips
  const chips = ce('div', 'chips');
  const c1 = ce('div', 'chip ' + (pctOk ? 'chip-ok' : totPct > 100 ? 'chip-err' : 'chip-warn'));
  c1.textContent = totPct.toFixed(2) + '% ' + (pctOk ? '✓' : totPct > 100 ? '↑' : '↓');
  const c2 = ce('div', 'chip chip-neu');
  c2.textContent = tw + ' ' + S.kUnit;
  chips.appendChild(c1); chips.appendChild(c2);
  if (unm > 0) {
    const c3 = ce('div', 'chip chip-warn');
    c3.textContent = '⚠ ' + unm + ' tapılmadı';

  wrap.appendChild(chips);

  // result
  const res = ce('div', 'result-box');

  const rsub = ce('div', 'res-sub'); rsub.textContent = tw + ' ' + S.kUnit + ' · ' + S.kRows.length + ' ingredient';
  const rlbl = ce('div', 'res-label'); rlbl.textContent = 'Ümumi xərc';
  const rprice = ce('div', 'res-price'); rprice.textContent = '₼ ' + totCost.toFixed(2);
  // breakdown
  const breakdown = ce('div');
  breakdown.style.cssText = 'margin-top:12px;border-top:1px solid rgba(255,255,255,.1);padding-top:10px;display:flex;flex-direction:column;gap:4px';
  const addLine = (label, val) => {
    const l = ce('div'); l.style.cssText = 'display:flex;justify-content:space-between;font-size:12px;color:#6c7a99';
    const lt = ce('span'); lt.textContent = label;
    const lv = ce('span'); lv.style.fontFamily = 'monospace'; lv.textContent = '₼ ' + val.toFixed(2);
    l.appendChild(lt); l.appendChild(lv); breakdown.appendChild(l);
  };
  addLine('Material xərci', matCost);
  if (umumiExtra > 0) addLine('Ümumi xərclər', umumiExtra);
  if (qabExtra > 0) addLine('Qablaşdırma', qabExtra);
  res.appendChild(rsub);

    const row2 = ce('div', 'ing-row');

  // extra costs
  wrap.appendChild(mkExtraRow('Ümumi xərclər', 'kUmumi', 'kUmumiVal'));
  wrap.appendChild(mkExtraRow('Qablaşdırma', 'kQab', 'kQabVal'));

  // result

  return wrap;

function updateAtirResult() {
  const wrap = document.getElementById('atir-result');
  if (wrap) drawAtirResult(wrap);
}

function parseBlend(text) {
  const parts = text.split('+').map(p => p.trim()).filter(Boolean);
  const results = [];
  for (const part of parts) {
    const m = part.match(/^(.*?)\s+(\d+(?:\.\d+)?)%\s*$/);
    if (!m) continue;
    results.push({ name: m[1].trim(), pct: parseFloat(m[2]) });
  }
  return results;
}

function drawAtirResult(wrap) {
  wrap.innerHTML = '';
  const miqdar = parseFloat(S.aMiqdar) || 0;
  const faiz = parseFloat(S.aFaiz) || 0;
  const blend = parseBlend(S.aBlend);
  if (miqdar <= 0 || faiz <= 0 || blend.length === 0) return;

  const totalAtir = (miqdar * faiz) / 100;
  const totalPct = blend.reduce((s, b) => s + b.pct, 0);

  const res = ce('div', 'result-box');
  const rsub = ce('div', 'res-sub');
  rsub.textContent = miqdar + ' qr · ' + faiz + '% ətir = ' + totalAtir.toFixed(2) + ' qr ətir';
  const rlbl = ce('div', 'res-label'); rlbl.textContent = 'Bölünüş';
  res.appendChild(rsub); res.appendChild(rlbl);

  const breakdown = ce('div');
  breakdown.style.cssText = 'margin-top:8px;display:flex;flex-direction:column;gap:8px';

  blend.forEach(b => {
    const grams = (totalAtir * b.pct) / totalPct;
    const row = ce('div');
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:8px';
    const nameEl = ce('span'); nameEl.style.cssText = 'color:#9aa0b0;font-size:13px;flex:1'; nameEl.textContent = b.name;
    const pctEl = ce('span'); pctEl.style.cssText = 'color:#6c7a99;font-size:12px;white-space:nowrap'; pctEl.textContent = b.pct + '%';
    const grEl = ce('span'); grEl.style.cssText = 'color:#fff;font-family:monospace;font-weight:700;font-size:16px;white-space:nowrap'; grEl.textContent = grams.toFixed(2) + ' qr';
    row.appendChild(nameEl); row.appendChild(pctEl); row.appendChild(grEl);
    breakdown.appendChild(row);
  });

  if (Math.abs(totalPct - 100) > 0.1) {
    const warn = ce('div');
    warn.style.cssText = 'margin-top:6px;font-size:12px;color:#e67e22;background:rgba(230,126,34,.15);padding:8px 10px;border-radius:8px';
    warn.textContent = '⚠ Faizlər cəmi ' + totalPct.toFixed(1) + '% (100% olmalıdır)';
    breakdown.appendChild(warn);
  }

  res.appendChild(breakdown);
  wrap.appendChild(res);
}

async function runBlendAI(mode) {
  const input = S.bfInput.trim();
  if (!input) { showToast('Zəhmət olmasa bir şey yazın'); return; }

  set({ bfLoading: true, bfResult: null });

  // Build fragrance list from anbar with guc
  const atirList = S.atirAnbar.map(a =>
    `${a.name} | ${a.country}${a.brand ? ', ' + a.brand : ''} | istifadə: ${a.usage || '-'} | güc: ${a.guc || '-'}`
  ).join('\n');

  const mehsul = S.bfMehsul || 'M&P Sabun';
  const cins = S.bfCins || 'Qadın';

  const mehsulQayda = {
    'M&P Sabun': 'MƏHSUL: M&P Sabun. Dəriyə birbaşa təmas var. Yumşaq, gözəl, yüngül-orta intensivlikdə qoxular seç. Ağır qoxulardan çəkin. Ümumi faiz 1-3%.',
    'Ətirli Mum Tablet': 'MƏHSUL: Ətirli Mum Tablet — garderopda passiv yayılır. Dərin, sabit qoxular: müşk, amber, odunsu, lavanda. Baza notlara üstünlük ver. Ümumi faiz 6-10%.',
    'Ətirli Əriyən Mum': 'MƏHSUL: Ətirli Əriyən Mum — aroma lampada, istilik ilə otağa yayılır. Uçucu, canlı qoxular: çiçəkli, sitrus, meyvəli. Flash point 65C+ üstün tut. Ümumi faiz 8-12%.'
  };

  const gucQayda = 'ƏTİR GÜCU BALANSI — faiz qoyarkən mütləq nəzərə al: Güclü: 10-20%, Yaxşı: 20-35%, Orta: 30-45%, Zəif: 40-55%, Çox Zəif: 50-65%';

  const prompt = mode === 'movzu'
    ? `Sən peşəkar parfümer və kosmetik formulyatorsən.\n\n${mehsulQayda[mehsul] || ''}\nCİNSİYYƏT: ${cins} üçün uyğun qoxu profili seç.\n\n${gucQayda}\n\nMüştərinin tələbi: "${input}" mövzusuna uyğun ${mehsul} üçün blend yarat.\n\nAnbar siyahısı:\n${atirList}\n\nQAYDALAR:\n- Mövzuya uyğun ətirləri anbardan seç\n- Anbarında olmayan lazım olan varsa anbar: false qeyd et\n- 3-5 ətirdən ibarət blend, faizlər cəmi dəqiq 100%\n- Azərbaycan adı gözəl, mənalı olsun (məs. Dəniz Küləyi, Gecə Bağçası)\n- YALNIZ JSON ver:\n{"blend_adi_az":"Azərbaycanca ad","blend_adi_en":"English name","movzu":"${input}","mehsul":"${mehsul}","izah":"1-2 cümlə izahat","atirlər":[{"ad":"Ətir adı","faiz":40,"anbar":true,"qeyd":"rolu"}]}`
    : `Sən peşəkar parfümer və kosmetik formulyatorsən.\n\n${mehsulQayda[mehsul] || ''}\nCİNSİYYƏT: ${cins} üçün uyğun qoxu profili seç.\n\n${gucQayda}\n\nMüştərinin tələbi: "${input}" ətirini mərkəzə alaraq ${mehsul} üçün blend yarat.\n\nAnbar siyahısı:\n${atirList}\n\nQAYDALAR:\n- "${input}" ətiri dominant olsun (30-50%), zəifdirsə faizini artır\n- Tamamlayıcı ətirləri anbardan seç, yoxdursa anbar: false\n- 3-5 ətirdən ibarət 2-3 variant, hər birinin faizləri cəmi dəqiq 100%\n- Hər variantın adı gözəl, mənalı olsun\n- YALNIZ JSON ver:\n{"əsas_ətir":"${input}","mehsul":"${mehsul}","variantlar":[{"ad_az":"Azərbaycanca ad","ad_en":"English name","izah":"1-2 cümlə","atirlər":[{"ad":"Ətir adı","faiz":45,"anbar":true,"qeyd":"rolu"}]}]}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    if (data.error) {
      set({ bfLoading: false });
      showToast('API xətası: ' + (data.error.message || JSON.stringify(data.error)));
      return;
    }
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    set({ bfResult: parsed, bfLoading: false, bfMode: mode });
  } catch(e) {
    set({ bfLoading: false });
    showToast('Xəta: ' + (e && e.message ? e.message : String(e)));
  }
}

function mkBlendResult() {
  const wrap = ce('div');
  const r = S.bfResult;
  const mode = S.bfMode;

  if (mode === 'movzu') {
    // Single blend result
    const res = ce('div', 'result-box');
    const rname = ce('div', 'res-name'); rname.textContent = r.blend_adi_en || r.blend_adi || '';
    const rnameaz = ce('div'); rnameaz.style.cssText = 'font-size:13px;color:#9b7acc;margin-top:2px;margin-bottom:4px'; rnameaz.textContent = r.blend_adi_az || '';
    const rsub = ce('div', 'res-sub'); rsub.textContent = (r.movzu || '') + ' · ' + (r.mehsul || '');
    const rlbl = ce('div', 'res-label'); rlbl.textContent = 'Blend';
    res.appendChild(rname); if (r.blend_adi_az) res.appendChild(rnameaz); res.appendChild(rsub); res.appendChild(rlbl);

    const breakdown = ce('div');
    breakdown.style.cssText = 'margin-top:8px;display:flex;flex-direction:column;gap:6px';
    (r.atirlər || []).forEach(a => {
      const row = ce('div');
      row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:8px';
      const nameEl = ce('span');
      nameEl.style.cssText = 'color:' + (a.anbar ? '#9aa0b0' : '#e67e22') + ';font-size:13px;flex:1';
      nameEl.textContent = a.ad + (a.anbar ? '' : ' ⚠');
      const pctEl = ce('span');
      pctEl.style.cssText = 'color:#fff;font-family:monospace;font-weight:700;font-size:15px';
      pctEl.textContent = a.faiz + '%';
      row.appendChild(nameEl); row.appendChild(pctEl);
      breakdown.appendChild(row);
      if (a.qeyd) {
        const note = ce('div');
        note.style.cssText = 'font-size:11px;color:#6c7a99;margin-top:-4px;padding-left:2px';
        note.textContent = a.qeyd;
        breakdown.appendChild(note);
      }
    });
    res.appendChild(breakdown);

    if (r.izah) {
      const izah = ce('div');
      izah.style.cssText = 'margin-top:10px;font-size:12px;color:#6c7a99;border-top:1px solid rgba(255,255,255,.1);padding-top:10px;line-height:1.5';
      izah.textContent = r.izah;
      res.appendChild(izah);
    }
    wrap.appendChild(res);

  } else {
    // Multiple variants
    (r.variantlar || []).forEach((v, vi) => {
      const res = ce('div', 'result-box');
      res.style.marginBottom = '10px';
      const rname = ce('div', 'res-name'); rname.textContent = v.ad || ('Variant ' + (vi+1));
      const rsub2 = ce('div', 'res-sub'); rsub2.textContent = r.mehsul || '';
      const rlbl2 = ce('div', 'res-label'); rlbl2.textContent = 'Blend';
      res.appendChild(rname); res.appendChild(rsub2); res.appendChild(rlbl2);

      const breakdown2 = ce('div');
      breakdown2.style.cssText = 'margin-top:8px;display:flex;flex-direction:column;gap:6px';
      (v.atirlər || []).forEach(a => {
        const row = ce('div');
        row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:8px';
        const nameEl = ce('span');
        nameEl.style.cssText = 'color:' + (a.anbar ? '#9aa0b0' : '#e67e22') + ';font-size:13px;flex:1';
        nameEl.textContent = a.ad + (a.anbar ? '' : ' ⚠');
        const pctEl = ce('span');
        pctEl.style.cssText = 'color:#fff;font-family:monospace;font-weight:700;font-size:15px';
        pctEl.textContent = a.faiz + '%';
        row.appendChild(nameEl); row.appendChild(pctEl);
        breakdown2.appendChild(row);
        if (a.qeyd) {
          const note = ce('div');
          note.style.cssText = 'font-size:11px;color:#6c7a99;margin-top:-4px;padding-left:2px';
          note.textContent = a.qeyd;
          breakdown2.appendChild(note);
        }
      });
      res.appendChild(breakdown2);

      if (v.izah) {
        const izah2 = ce('div');
        izah2.style.cssText = 'margin-top:10px;font-size:12px;color:#6c7a99;border-top:1px solid rgba(255,255,255,.1);padding-top:10px;line-height:1.5';
        izah2.textContent = v.izah;
        res.appendChild(izah2);
      }
      wrap.appendChild(res);
    });
  }

  // Use in blend calculator button
  const useBtn = ce('button', 'new-kal-btn');
  useBtn.textContent = '🧪 Blend Hesablayıcıya köçür';
  useBtn.style.marginTop = '8px';
  useBtn.onclick = () => {
    // Build blend string and go to blend calculator
    let blendStr = '';
    if (mode === 'movzu' && r.atirlər) {
      blendStr = r.atirlər.map(a => a.ad + ' ' + a.faiz + '%').join(' + ');
    } else if (r.variantlar && r.variantlar[0]) {
      blendStr = r.variantlar[0].atirlər.map(a => a.ad + ' ' + a.faiz + '%').join(' + ');
    }
    S.aBlend = blendStr;
    set({ atirSub: 'blend' });
  };
  wrap.appendChild(useBtn);

  return wrap;
}

// ── HAZIR BLENDLƏr SƏHİFƏSİ ─────────────────────────────────────────────────
function mkHazirBlendlerPage() {
  const page = ce('div', 'page');

  const hdr = ce('div', 'topbar');
  const title = ce('span', 'topbar-title'); title.textContent = '📋 Hazır Blendlər';
  const back = ce('button', 'sec-btn'); back.textContent = '← Geri';
  back.style.cssText = 'padding:8px 14px;font-size:13px';
  back.onclick = () => set({ atirSub: 'fabrika' });
  hdr.appendChild(back); hdr.appendChild(title);
  page.appendChild(hdr);

  // Filters
  const filterWrap = ce('div');
  filterWrap.style.cssText = 'display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap';

  const katSel = ce('select', 'form-inp');
  katSel.style.cssText = 'flex:1;min-width:120px;font-size:13px;padding:8px';
  ['Hamısı','M&P Sabun','Əriyən Mum','Ətirli Tablet'].forEach(k => {
    const o = ce('option'); o.value = k; o.textContent = k;
    if ((S.hbKat||'Hamısı') === k) o.selected = true;
    katSel.appendChild(o);
  });
  katSel.onchange = e => { S.hbKat = e.target.value; render(); };

  const cinsSel = ce('select', 'form-inp');
  cinsSel.style.cssText = 'flex:1;min-width:100px;font-size:13px;padding:8px';
  ['Hamısı','Qadın','Unisex','Uşaq','Kişi'].forEach(c => {
    const o = ce('option'); o.value = c; o.textContent = c;
    if ((S.hbCins||'Hamısı') === c) o.selected = true;
    cinsSel.appendChild(o);
  });
  cinsSel.onchange = e => { S.hbCins = e.target.value; render(); };

  filterWrap.appendChild(katSel);
  filterWrap.appendChild(cinsSel);
  page.appendChild(filterWrap);

  // Search
  const srch = ce('input', 'form-inp');
  srch.type = 'text';
  srch.placeholder = '🔍 Blend adı və ya ətir axtar...';
  srch.style.cssText = 'margin-bottom:12px;font-size:13px';
  srch.value = S.hbSearch || '';
  srch.oninput = e => { S.hbSearch = e.target.value; render(); };
  page.appendChild(srch);

  // Filter blends
  let filtered = HAZIR_BLENDLER;
  if (S.hbKat && S.hbKat !== 'Hamısı') filtered = filtered.filter(b => b.kateqoriya === S.hbKat);
  if (S.hbCins && S.hbCins !== 'Hamısı') filtered = filtered.filter(b => b.cins === S.hbCins);
  if (S.hbSearch) {
    const q = S.hbSearch.toLowerCase();
    filtered = filtered.filter(b => b.ad.toLowerCase().includes(q) || b.atirlər.toLowerCase().includes(q) || b.profil.toLowerCase().includes(q));
  }
  // Sort: 5→1 first, unrated middle, 0 (never again) at bottom
  filtered = [...filtered].sort((a, b) => {
    const getR = x => { try { const v = localStorage.getItem('blendRating_' + x.ad.replace(/\s+/g,'_')); return v === null ? -1 : parseInt(v); } catch(e) { return -1; } };
    const ra = getR(a), rb = getR(b);
    if (ra === 0 && rb !== 0) return 1;
    if (rb === 0 && ra !== 0) return -1;
    if (ra === rb) return 0;
    if (ra === -1) return 1;
    if (rb === -1) return -1;
    return rb - ra;
  });

  // Hide zero toggle button removed — 0-rated stay at bottom

  const count = ce('div');
  count.style.cssText = 'font-size:12px;color:#666;margin-bottom:10px';
  count.textContent = filtered.length + ' blend tapıldı';
  page.appendChild(count);

  if (filtered.length === 0) {
    const empty = ce('div');
    empty.style.cssText = 'text-align:center;padding:40px;color:#666;font-size:14px';
    empty.textContent = 'Heç bir blend tapılmadı';
    page.appendChild(empty);
    return page;
  }

  filtered.forEach((b, bi) => {
    const card = ce('div', 'result-box');
    card.style.cssText = 'margin-bottom:10px';

    // Rating key per blend (use ad as unique key)
    const rKey = 'blendRating_' + b.ad.replace(/\s+/g,'_');
    let curRating = 0;
    try { curRating = parseInt(localStorage.getItem(rKey) || '0') || 0; } catch(e) {}

    // Skip if rated 0 and filter is active — no, show all but dim 0-rated ones
    // (user said 0 = never use again, so show with red X indicator)

    const topRow = ce('div');
    topRow.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px';

    const nameEl = ce('div', 'res-name');
    nameEl.style.cssText = 'font-size:14px;font-weight:700;color:#fff;flex:1';
    nameEl.textContent = b.ad;

    const katBadge = ce('span');
    katBadge.style.cssText = 'font-size:13px';
    katBadge.textContent = b.kateqoriya === 'M&P Sabun' ? '🧼' : b.kateqoriya === 'Əriyən Mum' ? '🕯️' : '🌸';

    topRow.appendChild(nameEl);
    topRow.appendChild(katBadge);
    card.appendChild(topRow);

    // Star rating row
    const starRow = ce('div');
    starRow.className = 'rc-starrow';
    starRow.style.cssText = 'display:flex;align-items:center;gap:4px;margin-bottom:8px;flex-wrap:wrap';

    const hasRating = localStorage.getItem(rKey) !== null;
    const isZero = hasRating && curRating === 0;

    // ✕ button
    const zeroBtn = ce('button');
    zeroBtn.style.cssText = `font-size:12px;background:none;border:1.5px solid ${isZero?'#e74c3c':'#444'};border-radius:6px;cursor:pointer;padding:1px 7px;color:${isZero?'#e74c3c':'#666'}`;
    zeroBtn.textContent = '✕';
    zeroBtn.onclick = ev => {
      ev.stopPropagation();
      showRatingConfirm(card, rKey, 0);
    };
    starRow.appendChild(zeroBtn);

    const sep = ce('span');
    sep.style.cssText = 'color:#333;font-size:10px;margin:0 2px';
    sep.textContent = '|';
    starRow.appendChild(sep);

    // 1-5 stars
    for (let st = 1; st <= 5; st++) {
      const star = ce('button');
      const filled = st <= curRating;
      star.style.cssText = `font-size:20px;background:none;border:none;cursor:pointer;padding:0 1px;line-height:1;color:${filled?'#f5c518':'#333'}`;
      star.textContent = filled ? '\u2605' : '\u2606';
      const stVal = st;
      star.onclick = ev => {
        ev.stopPropagation();
        showRatingConfirm(card, rKey, stVal);
      };
      starRow.appendChild(star);
    }

    // Label
    const rl = ce('span');
    if (curRating > 0 && hasRating) {
      rl.style.cssText = 'font-size:11px;color:#f5c518;margin-left:4px;font-weight:600';
      rl.textContent = curRating + '/5';
    } else if (isZero) {
      rl.style.cssText = 'font-size:11px;color:#e74c3c;margin-left:4px';
      rl.textContent = 'Istifade edilmir';
    } else {
      rl.style.cssText = 'font-size:11px;color:#555;margin-left:4px';
      rl.textContent = 'Sinaqdan kecmeyib';
    }
    starRow.appendChild(rl);

    // Delete button
    if (hasRating) {
      const delBtn = ce('button');
      delBtn.style.cssText = 'font-size:11px;background:none;border:1px solid #444;border-radius:6px;cursor:pointer;padding:1px 7px;color:#666;margin-left:4px';
      delBtn.textContent = '\ud83d\uddd1';
      delBtn.onclick = ev => {
        ev.stopPropagation();
        showRatingConfirm(card, rKey, 'del');
      };
      starRow.appendChild(delBtn);
    }

    card.appendChild(starRow);

    if (isZero) card.style.cssText = 'margin-bottom:10px;opacity:0.45';

    const meta = ce('div');
    meta.style.cssText = 'font-size:11px;color:#6c7a99;margin-bottom:10px';
    meta.textContent = b.cins + ' · ' + b.profil;
    card.appendChild(meta);

    // Ingredients with guc badges
    const gucRenk = {
      'Güclü':'#4caf50','Yaxşı':'#2196f3',
      'Orta':'#ff9800','Zəif':'#9e9e9e','Çox Zəif':'#f44336'
    };

    // Build ingredient rows - original blend
    const origParts = b.atirlər.split('+').map(p => p.trim());
    origParts.forEach(p => {
      const m = p.match(/^(.+?)\s+(\d+)%$/);
      if (!m) return;
      const atirName = m[1].trim();
      const faiz = m[2];
      // Better matching: check if anbar name contains key words
      const words = atirName.toLowerCase().replace(/ fo| eo| fо/g,'').trim().split(' ').filter(w=>w.length>2);
      const anbarItem = S.atirAnbar.find(a => {
        if (!a.name) return false;
        const an = a.name.toLowerCase();
        return words.length > 0 && words.every(w => an.includes(w));
      }) || S.atirAnbar.find(a => {
        if (!a.name) return false;
        const an = a.name.toLowerCase();
        return words[0] && an.includes(words[0]);
      });
      const guc = anbarItem ? anbarItem.guc : null;

      const row = ce('div');
      row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:6px';

      const left = ce('div');
      left.style.cssText = 'display:flex;align-items:center;gap:5px;flex:1;min-width:0';

      const nm = ce('span');
      nm.style.cssText = 'font-size:12px;color:#9aa0b0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
      nm.textContent = atirName;
      left.appendChild(nm);

      if (guc) {
        const gb = ce('span');
        gb.style.cssText = `font-size:9px;padding:1px 5px;border-radius:6px;color:#fff;background:${gucRenk[guc]||'#666'};white-space:nowrap;flex-shrink:0`;
        gb.textContent = guc;
        left.appendChild(gb);
      }

      const pct = ce('span');
      pct.style.cssText = 'font-family:monospace;font-weight:700;font-size:13px;color:#fff;flex-shrink:0';
      pct.textContent = faiz + '%';

      row.appendChild(left); row.appendChild(pct);
      card.appendChild(row);
    });

    if (b.izah) {
      const iz = ce('div');
      iz.style.cssText = 'font-size:11px;color:#6c7a99;margin-top:8px;border-top:1px solid rgba(255,255,255,.08);padding-top:8px;line-height:1.5';
      iz.textContent = b.izah;
      card.appendChild(iz);
    }

    // Interactive alternativ chips
    if (b.alternativ) {
      const altWrap = ce('div');
      altWrap.style.cssText = 'margin-top:8px;padding:8px 10px;background:rgba(255,200,100,.06);border-radius:10px;border:1px solid rgba(255,200,100,.18)';

      const altLbl = ce('div');
      altLbl.style.cssText = 'font-size:10px;color:#e8a030;font-weight:600;margin-bottom:7px;letter-spacing:.3px';
      altLbl.textContent = '🔄 Əvəzetmə seçin';
      altWrap.appendChild(altLbl);

      // Parse "Ətir A → Ətir B | Ətir C → Ətir D" into chips
      const altItems = b.alternativ.split('|').map(s => s.trim()).filter(Boolean);
      const chipWrap = ce('div');
      chipWrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px';

      // State key for selected alt chip per blend
      const stateKey = 'hbAlt_' + bi;
      if (S[stateKey] === undefined) S[stateKey] = null;

      altItems.forEach((alt, ai) => {
        const chip = ce('button');
        const isSelected = S[stateKey] === ai;
        chip.style.cssText = `font-size:11px;padding:4px 9px;border-radius:14px;border:1.5px solid ${isSelected ? '#e8a030' : 'rgba(255,200,100,.3)'};background:${isSelected ? 'rgba(255,200,100,.2)' : 'transparent'};color:${isSelected ? '#e8a030' : '#a08050'};cursor:pointer;text-align:left;line-height:1.4`;
        chip.textContent = alt;
        chip.onclick = e => {
          e.stopPropagation();
          S[stateKey] = (S[stateKey] === ai) ? null : ai;
          render();
        };
        chipWrap.appendChild(chip);
      });

      altWrap.appendChild(chipWrap);

      if (S[stateKey] !== null) {
        const selNote = ce('div');
        selNote.style.cssText = 'font-size:10px;color:#e8a030;margin-top:5px';
        selNote.textContent = '✓ Seçilmiş əvəzetmə blend hesablamaya tətbiq olunacaq';
        altWrap.appendChild(selNote);
      }

      card.appendChild(altWrap);
    }

    // Use button - builds blend string considering selected alternativ
    const useBtn = ce('button', 'sec-btn');
    useBtn.style.cssText = 'margin-top:8px;width:100%;font-size:12px;padding:7px';
    useBtn.textContent = '🧪 Blend Hesablayıcıya köçür';
    useBtn.onclick = e => {
      e.stopPropagation();
      const stateKey = 'hbAlt_' + bi;
      const selIdx = S[stateKey];
      let blendStr = b.atirlər;

      if (selIdx !== null && b.alternativ) {
        const altItems = b.alternativ.split('|').map(s => s.trim()).filter(Boolean);
        const selAlt = altItems[selIdx];
        // Parse "Köhnə Ətir → Yeni Ətir" or "Köhnə → Yeni"
        const arrow = selAlt.match(/^(.+?)\s*→\s*(.+)$/);
        if (arrow) {
          const from = arrow[1].trim();
          const to = arrow[2].trim();
          // Replace in blend string: find the ingredient name and swap it
          const parts = blendStr.split('+').map(p => {
            const m = p.trim().match(/^(.+?)\s+(\d+)%$/);
            if (!m) return p;
            // Check if this ingredient matches 'from'
            const fromWords = from.toLowerCase().replace(/ fo| eo/g,'').trim().split(' ').filter(w=>w.length>2);
            const partName = m[1].toLowerCase();
            const matches = fromWords.length > 0 && fromWords.some(w => partName.includes(w));
            if (matches) return to + ' ' + m[2] + '%';
            return p.trim();
          });
          blendStr = parts.join(' + ');
        }
      }

      S.aBlend = blendStr;
      set({ atirSub: 'blend' });
    };
    card.appendChild(useBtn);

    page.appendChild(card);
  });

  return page;
}

    card.appendChild(iz);

    const useBtn = ce('button', 'sec-btn');
    useBtn.style.cssText = 'width:100%;font-size:12px;padding:7px';
    useBtn.textContent = '🧪 Blend Hesablayıcıya köçür';
    useBtn.onclick = () => { S.aBlend = blendStr; set({ atirSub: 'blend' }); };
    card.appendChild(useBtn);

    page.appendChild(card);
  });

  // ── AI Master Blend ──
  const sec2 = ce('div');
  sec2.style.cssText = 'font-size:11px;font-weight:700;color:#888;letter-spacing:.8px;text-transform:uppercase;margin:20px 0 10px';
  sec2.textContent = 'AI ilə Fərdi Master Blend';
  page.appendChild(sec2);

  const aiCard = ce('div', 'kal-card');
  const aiBody = ce('div', 'kal-body');

  // Mövcud qoxu xarakteri
  const xLbl = ce('div', 'form-label');
  xLbl.style.cssText = 'margin-bottom:8px';
  xLbl.textContent = 'Mövcud məhsulun qoxu xarakteri';
  aiBody.appendChild(xLbl);

  const xarChips = ce('div');
  xarChips.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px';
  ['🌸 Çiçəkli','🍓 Meyvəli','🌲 Oduncaq','🍋 Sitrus','🍬 Şirin','🌊 Dəniz','❓ Bilmirəm'].forEach(x => {
    const chip = ce('button');
    const sel = S.mbXarakter === x;
    chip.style.cssText = `padding:6px 11px;border-radius:14px;border:1.5px solid ${sel?'#a78bfa':'#333'};background:${sel?'rgba(167,139,250,.15)':'transparent'};color:${sel?'#a78bfa':'#888'};font-size:12px;cursor:pointer`;
    chip.textContent = x;
    chip.onclick = () => { S.mbXarakter = sel ? '' : x; render(); };
    xarChips.appendChild(chip);
  });
  aiBody.appendChild(xarChips);

  // İstədiyi effekt
  const eLbl = ce('div', 'form-label');
  eLbl.style.cssText = 'margin-bottom:8px';
  eLbl.textContent = 'Nə istəyirsiniz?';
  aiBody.appendChild(eLbl);

  const effektChips = ce('div');
  effektChips.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px';
  ['Dərinlik ver','Yumşalt','Gücləndir','Universal saxla'].forEach(ef => {
    const chip = ce('button');
    const sel = (S.mbEffekt || 'Universal saxla') === ef;
    chip.style.cssText = `padding:6px 11px;border-radius:14px;border:1.5px solid ${sel?'#a78bfa':'#333'};background:${sel?'rgba(167,139,250,.15)':'transparent'};color:${sel?'#a78bfa':'#888'};font-size:12px;cursor:pointer`;
    chip.textContent = ef;
    chip.onclick = () => { S.mbEffekt = ef; render(); };
    effektChips.appendChild(chip);
  });
  aiBody.appendChild(effektChips);

  const aiBtn = ce('button', 'pri-btn');
  aiBtn.style.cssText = 'width:100%;padding:14px;font-size:15px';
  aiBtn.textContent = S.mbLoading ? '⏳ Hazırlanır...' : '🔮 Master Blend Yarat';
  aiBtn.disabled = !!S.mbLoading;
  aiBtn.onclick = runMasterBlendAI;
  aiBody.appendChild(aiBtn);

  aiCard.appendChild(aiBody);
  page.appendChild(aiCard);

  if (S.mbLoading) {
    const load = ce('div');
    load.style.cssText = 'text-align:center;padding:24px;color:#aaa;font-size:13px';
    load.innerHTML = '<div class="spinner" style="margin:0 auto 10px"></div>AI master blend hazırlayır...';
    page.appendChild(load);
  }

  if (S.mbResult) {
    page.appendChild(mkMasterBlendResult());
  }

  return page;
}

async function runMasterBlendAI() {
  set({ mbLoading: true, mbResult: null });

  const atirList = S.atirAnbar.map(a =>
    `${a.name} | ${a.country}${a.brand?', '+a.brand:''} | güc: ${a.guc||'-'}`
  ).join('\n');

  const xarakter = S.mbXarakter || '❓ Bilmirəm';
  const effekt = S.mbEffekt || 'Universal saxla';
  const mehsul = S.mbMehsul === 'Mum' ? 'Əriyən Mum' : 'Sabun';

  const prompt = `Sən peşəkar parfümer və kosmetik formulyatorsən. Müştərinin mövcud hazır məhsulu var — artıq yenidən əridilən və ya yenilənəcək ${mehsul}. Hansı ətirlər olduğunu tam bilmir.

Mövcud qoxunun xarakteri: ${xarakter}
İstədiyi effekt: ${effekt}
Məhsul: ${mehsul}

Anbar siyahısı:
${atirList}

MASTER BLEND MƏNTİQİ:
- Master blend mövcud ətri POZMAMALIDIR — ona yumşaqlıq, dərinlik, sabitlik əlavə etməlidir
- Universal ətirlər seç: Vanilla, White Musk, Sandalwood, Lavender — hər qoxu ilə uyğundur
- Konfliktli ətirlər seçmə: Coffee, Chocolate, Apple Cinnamon, Ginger — bunlar çox dominantdır
- Ümumi faiz: ${mehsul === 'Sabun' ? '1-3%' : '8-12%'} (master blend məhsula əlavə olunacaq)
- Faizlər cəmi dəqiq 100% olsun
- 3-4 ətirdən ibarət olsun

YALNIZ JSON ver:
{"ad_az":"Azərbaycanca ad","ad_en":"English name","xarakter":"${xarakter}","effekt":"${effekt}","mehsul":"${mehsul}","izah":"2-3 cümlə — niyə bu blend bu məhsula uyğundur","atirlər":[{"ad":"Ətir adı","faiz":40,"anbar":true,"rol":"niyə bu ətir seçildi"}]}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    const text = data.content.map(i => i.text || '').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
    set({ mbResult: parsed, mbLoading: false });
  } catch(err) {
    set({ mbLoading: false });
    showToast('Xəta baş verdi, yenidən cəhd edin');
  }
}

function mkMasterBlendResult() {
  const r = S.mbResult;
  const wrap = ce('div');

  const res = ce('div', 'result-box');
  res.style.marginTop = '12px';

  const nm = ce('div', 'res-name'); nm.textContent = r.ad_az || r.ad || '';
  const sub = ce('div', 'res-sub'); sub.textContent = (r.ad_en || '') + ' · ' + (r.mehsul || '');
  const lbl = ce('div', 'res-label'); lbl.textContent = 'Master Blend';
  res.appendChild(nm); res.appendChild(sub); res.appendChild(lbl);

  const ingWrap = ce('div'); ingWrap.style.cssText = 'margin-top:8px;display:flex;flex-direction:column;gap:5px';
  (r.atirlər || []).forEach(a => {
    const row = ce('div');
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;gap:8px';
    const left = ce('div'); left.style.cssText = 'flex:1';
    const nameEl = ce('span'); nameEl.style.cssText = `font-size:13px;color:${a.anbar?'#9aa0b0':'#e67e22'}`;
    nameEl.textContent = a.ad + (a.anbar ? '' : ' ⚠');
    const rolEl = ce('div'); rolEl.style.cssText = 'font-size:10px;color:#555;margin-top:1px'; rolEl.textContent = a.rol || '';
    left.appendChild(nameEl); left.appendChild(rolEl);
    const pct = ce('span'); pct.style.cssText = 'font-family:monospace;font-weight:700;font-size:14px;color:#fff;flex-shrink:0';
    pct.textContent = a.faiz + '%';
    row.appendChild(left); row.appendChild(pct);
    ingWrap.appendChild(row);
  });
  res.appendChild(ingWrap);

  if (r.izah) {
    const iz = ce('div');
    iz.style.cssText = 'font-size:12px;color:#6c7a99;margin-top:10px;border-top:1px solid rgba(255,255,255,.1);padding-top:10px;line-height:1.5';
    iz.textContent = r.izah;
    res.appendChild(iz);
  }

  const useBtn = ce('button', 'sec-btn');
  useBtn.style.cssText = 'margin-top:10px;width:100%;font-size:12px;padding:7px';
  useBtn.textContent = '🧪 Blend Hesablayıcıya köçür';
  useBtn.onclick = () => {
    if (r.atirlər) S.aBlend = r.atirlər.map(a => a.ad + ' ' + a.faiz + '%').join(' + ');
    set({ atirSub: 'blend' });
  };
  res.appendChild(useBtn);

  wrap.appendChild(res);
  return wrap;
}

// ── RATING CONFIRM HELPER ────────────────────────────────────────────────────
function showRatingConfirm(card, rKey, val) {
  // Remove any existing confirm panel
  const existing = card.querySelector('.rc-panel');
  if (existing) { existing.remove(); return; }

  const panel = ce('div');
  panel.className = 'rc-panel';
  panel.style.cssText = 'margin:6px 0 4px;padding:9px 11px;background:rgba(255,255,255,.07);border-radius:10px;border:1px solid rgba(255,255,255,.15)';

  const msg = ce('div');
  msg.style.cssText = 'font-size:12px;color:#ccc;margin-bottom:8px;line-height:1.4';
  if (val === 'del') {
    msg.textContent = 'Reytinqi tamamilə silmək istəyirsiniz?';
  } else if (val === 0) {
    msg.textContent = 'Bu blendi "bir daha istifadə etməyim" kimi işarələmək istəyirsiniz?';
  } else {
    const stars = '★'.repeat(val) + '☆'.repeat(5 - val);
    msg.textContent = val + ' ulduz (' + stars + ') vermək istəyirsiniz?';
  }
  panel.appendChild(msg);

  const btnRow = ce('div');
  btnRow.style.cssText = 'display:flex;gap:8px';

  const okBtn = ce('button', 'pri-btn');
  okBtn.style.cssText = 'padding:6px 16px;font-size:12px';
  okBtn.textContent = 'Bəli';
  okBtn.onclick = ev => {
    ev.stopPropagation();
    try {
      if (val === 'del') localStorage.removeItem(rKey);
      else localStorage.setItem(rKey, String(val));
    } catch(err) {}
    render();
  };

  const noBtn = ce('button', 'sec-btn');
  noBtn.style.cssText = 'padding:6px 16px;font-size:12px';
  noBtn.textContent = 'Xeyr';
  noBtn.onclick = ev => { ev.stopPropagation(); panel.remove(); };

  btnRow.appendChild(okBtn);
  btnRow.appendChild(noBtn);
  panel.appendChild(btnRow);

  // Insert directly after starRow
  const starRow = card.querySelector('.rc-starrow');
  if (starRow && starRow.nextSibling) {
    card.insertBefore(panel, starRow.nextSibling);
  } else if (starRow) {
    starRow.after(panel);
  } else {
    card.appendChild(panel);
  }
}

init();
</script>
