*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#F7F4EF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a2e;max-width:640px;margin:0 auto;min-height:100vh}
button{font-family:inherit;cursor:pointer}
.nav{background:#1a1a2e;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.nav-brand{color:#fff;font-size:16px;font-weight:700;border:none;background:none;padding:8px 0;display:flex;align-items:center;gap:6px}
.nav-brand span{color:#6c7a99;font-size:13px}
.nav-tabs{display:flex;gap:4px}
.nav-tab{background:none;border:none;color:#6c7a99;font-size:13px;font-weight:600;padding:8px 12px;border-radius:8px}
.nav-tab.active{background:rgba(255,255,255,.12);color:#fff}
.home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:10px}
.home h1{font-size:28px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.home p{font-size:14px;color:#999;margin-bottom:20px}
.home-card{width:100%;background:#fff;border:1.5px solid #e0dbd4;border-radius:16px;padding:22px 20px;display:flex;align-items:center;gap:16px;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.home-card:active{background:#faf8f5}
.hc-icon{font-size:30px;width:52px;height:52px;background:#f0ece4;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hc-body{flex:1}
.hc-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:2px}
.hc-desc{font-size:12px;color:#999;line-height:1.4}
.hc-arrow{font-size:20px;color:#3b5bdb;font-weight:700}
.page{padding:16px;min-height:calc(100vh - 56px)}
.topbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.topbar-title{flex:1;font-size:18px;font-weight:700;color:#1a1a2e}
.search-inp{flex:2;background:#fff;border:1.5px solid #e0dbd4;border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;min-width:0}
.search-inp:focus{outline:none;border-color:#3b5bdb}
.add-btn{background:#1a1a2e;color:#fff;border:none;border-radius:12px;padding:12px 16px;font-size:14px;font-weight:700;white-space:nowrap}
.statusbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.st-info{font-size:12px;color:#999}
.st-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.st-sync{background:#ebfbee;color:#2b8a3e;border:1px solid #b2f2bb}
.st-local{background:#fff3e0;color:#e67e22;border:1px solid #ffd8a8}
.mat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:80px}
.mat-card{background:#fff;border-radius:12px;border:1.5px solid #e0dbd4;overflow:hidden}
.mat-row{display:flex;align-items:center;padding:14px 16px;gap:10px}
.mat-row:active{background:#fafafa}
.mat-num{font-size:11px;color:#ccc;width:18px;flex-shrink:0;font-family:monospace;text-align:right}
.mat-info{flex:1;min-width:0}
.mat-name{font-size:15px;font-weight:600;color:#1a1a2e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mat-meta{font-size:12px;color:#aaa;margin-top:2px}
.mat-note{font-size:11px;color:#e67e22;font-weight:600;margin-top:2px}
.mat-price{font-size:15px;font-weight:700;color:#1a1a2e;font-family:monospace;flex-shrink:0;margin-right:4px}
.mat-chevron{font-size:14px;color:#ccc;flex-shrink:0}
.edit-form{background:#fffdf8;border-top:1.5px solid #f0ece4;padding:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-full{margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.6px}
.form-inp{background:#fff;border:1.5px solid #d5cec6;border-radius:10px;padding:12px 13px;font-size:15px;font-family:inherit;width:100%}
.form-inp:focus{outline:none;border-color:#3b5bdb}
.form-btns{display:flex;gap:8px}
.btn-save{flex:1;background:#1a1a2e;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700}
.btn-cancel{background:#f0ece4;color:#555;border:none;border-radius:10px;padding:14px 18px;font-size:14px;font-weight:600}
.btn-delete{background:#fff5f5;color:#c92a2a;border:1.5px solid #ffc9c9;border-radius:10px;padding:14px;font-size:14px;font-weight:600;margin-top:8px;width:100%}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:13px 26px;border-radius:24px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.toast.show{opacity:1}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;background:#F7F4EF}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:34px;height:34px;border:3px solid #e0dbd4;border-top-color:#3b5bdb;border-radius:50%;animation:spin .7s linear infinite}
.loading p{font-size:13px;color:#999}
.steps{display:flex;align-items:center;margin-bottom:18px}
.step-pill{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 5px;border-radius:20px;font-size:12px;font-weight:600}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.step-line{flex:1;height:1.5px;min-width:12px}
.kal-card{background:#fff;border-radius:12px;border:1.5px solid #e0dbd4;overflow:hidden;margin-bottom:12px}
.kal-body{padding:20px 16px}
.kal-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#faf8f5;border-top:1px solid #f0ece4}
.recipe-ta{width:100%;padding:16px;font-size:14px;font-family:inherit;border:none;resize:none;color:#333;line-height:1.9;min-height:220px;background:#fff}
.recipe-ta:focus{outline:none}
.pri-btn{background:#1a1a2e;color:#fff;border:none;border-radius:10px;padding:13px 22px;font-size:15px;font-weight:700}
.sec-btn{background:#f0ece4;color:#555;border:none;border-radius:10px;padding:13px 18px;font-size:14px;font-weight:600}
.ing-card{background:#fff;border-radius:12px;border:1.5px solid #e0dbd4;padding:14px;margin-bottom:8px}
.ing-card.unmatched{border-color:#ffd8a8;background:#fffbf0}
.ing-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ing-name{font-size:14px;font-weight:600;color:#1a1a2e}
.ing-name.unmatched{color:#e67e22}
.ing-del{background:#fff5f5;color:#c92a2a;border:1px solid #ffc9c9;border-radius:6px;padding:6px 10px;font-size:12px}
.ing-sel{width:100%;background:#fff;border:1.5px solid #d5cec6;border-radius:8px;padding:11px 10px;font-size:14px;font-family:inherit;margin-bottom:8px}
.ing-sel.unmatched{border-color:#ffd8a8}
.ing-sel:focus{outline:none;border-color:#3b5bdb}
.ing-row{display:flex;align-items:center;gap:8px}
.ing-pct{width:90px;background:#fff;border:1.5px solid #d5cec6;border-radius:8px;padding:11px;font-size:15px;font-family:inherit;text-align:center}
.ing-pct:focus{outline:none;border-color:#3b5bdb}
.ing-cost{flex:1;font-size:13px;color:#666;text-align:right}
.ing-cost strong{color:#1a1a2e;font-family:monospace;font-size:14px}
.result-box{background:#1a1a2e;border-radius:14px;padding:22px 20px;margin-bottom:12px}
.res-name{color:#fff;font-size:18px;font-weight:700;margin-bottom:2px}
.res-sub{color:#6c7a99;font-size:13px;margin-bottom:18px}
.res-label{font-size:10px;color:#6c7a99;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.res-price{color:#fff;font-family:monospace;font-weight:800;font-size:34px;letter-spacing:-1px}
.res-approx{color:#a0b0cc;font-family:monospace;font-size:14px;margin-top:5px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid}
.chip-ok{background:#ebfbee;color:#2b8a3e;border-color:#b2f2bb}
.chip-warn{background:#fffbf0;color:#e67e22;border-color:#ffd8a8}
.chip-err{background:#fff5f5;color:#c92a2a;border-color:#ffc9c9}
.chip-neu{background:#f0ece4;color:#555;border-color:#d5cec6}
.new-kal-btn{width:100%;background:#f0ece4;color:#1a1a2e;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;margin-bottom:30px}
.empty-msg{text-align:center;padding:40px 20px;color:#ccc;font-size:14px}
</style>

function pricePerUnit(item) {
  const v = parseFloat(item.qty) || 0;
  const u = (item.unit || '').toLowerCase();
  let grams = v;
  if (u === 'kg') grams = v * 1000;
  if (u === 'l') grams = v * 1000;
  if (!grams || !item.price) return null;
  return parseFloat(item.price) / grams;
}

function similarity(a, b) {
  const A = a.toLowerCase().trim();
  const B = b.toLowerCase().trim();
  if (A === B) return 1;
  if (A.length > 4 && B.includes(A)) return 0.95;
  if (B.length > 4 && A.includes(B)) return 0.95;
  const wA = A.split(' ').filter(w => w.length > 2);
  const wB = B.split(' ').filter(w => w.length > 2);
  if (!wA.length) return 0;
  let m = 0;
  for (const w of wA) {
    if (wB.some(wb => wb === w || (w.length > 4 && wb.includes(w)) || (wb.length > 4 && w.includes(wb)))) m++;
  }
  const ratio = m / wA.length;
  return ratio >= 0.75 ? ratio * 0.85 : 0;
}

function bestMatch(name, anbar) {
  let best = null, bs = 0;
  for (const i of anbar) {
    const s = similarity(name, i.name);
    if (s > bs) { bs = s; best = i; }
  }
  return bs >= 0.75 ? best : null;
}

function parseRecipe(text) {
  const results = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const c = line.trim().replace(/^[‚ÄĘ\-\*\d\.]+\s*/, '').trim();
    const m = c.match(/^(.*?)\s+([\d.,]+)\s*%\s*$/);
    if (!m) continue;
    const name = m[1].trim();
    const pct = parseFloat(m[2].replace(',', '.'));
    if (!name || isNaN(pct)) continue;
    results.push({ id: Math.random().toString(36), parsedName: name, percent: pct, materialId: '' });
  }
  return results;
}

function mkSteps() {
  const wrap = ce('div', 'steps');
  const defs = ['Resept', 'H…ôcm', 'N…ôtic…ô'];
  defs.forEach((label, i) => {
    const n = i + 1;
    const act = S.kStep === n, done = S.kStep > n;
    const pill = ce('div', 'step-pill');
    if (act) pill.style.cssText = 'background:#1a1a2e;color:#fff;border:1.5px solid #1a1a2e';
    else if (done) pill.style.cssText = 'background:#ebfbee;color:#2b8a3e;border:1.5px solid #b2f2bb';
    else pill.style.cssText = 'background:#e8e4dc;color:#aaa;border:1.5px solid #d5cec6';

    const num = ce('div', 'step-num');
    if (act) num.style.cssText = 'background:#fff;color:#1a1a2e';
    else if (done) num.style.cssText = 'background:#2b8a3e;color:#fff';
    else num.style.cssText = 'background:#c8c0b4;color:#fff';
    num.textContent = done ? '‚úď' : String(n);

    pill.appendChild(num);
    pill.appendChild(document.createTextNode(label));
    wrap.appendChild(pill);

    if (i < 2) {
      const line = ce('div', 'step-line');
      line.style.background = done ? '#b2f2bb' : '#d5cec6';
      wrap.appendChild(line);
    }
  });
  return wrap;
}

function mkKStep3() {
  const wrap = ce('div');
  const tw = parseFloat(S.kWeight) || 0;

  const rowResults = S.kRows.map(r => {
    const mat = S.anbar.find(a => String(a.id) === String(r.materialId));
    const pct = parseFloat(r.percent) || 0;
    if (!mat || !pct || !tw) return { ...r, mat, pct, cost: null, usedAmt: null };
    const ppu = pricePerUnit(mat);
    const ua = (pct / 100) * tw;
    return { ...r, mat, pct, cost: ppu != null ? ppu * ua : null, usedAmt: ua };
  });

  const totPct = rowResults.reduce((s, r) => s + (r.pct || 0), 0);
  const matCost = rowResults.reduce((s, r) => s + (r.cost || 0), 0);
  const umumiExtra = S.kUmumi ? (parseFloat(S.kUmumiVal) || 0) : 0;
  const qabExtra = S.kQab ? (parseFloat(S.kQabVal) || 0) : 0;
  const totCost = matCost + umumiExtra + qabExtra;
  const pctOk = Math.abs(totPct - 100) < 0.01;
  const unm = S.kRows.filter(r => !r.materialId).length;

  // name input
  const ni = ce('input', 'form-inp');
  ni.type = 'text'; ni.value = S.kName; ni.placeholder = 'M…ôhsul adńĪ (ixtiyari)';
  ni.style.cssText = 'margin-bottom:12px;width:100%';
  ni.oninput = e => { S.kName = e.target.value; };
  wrap.appendChild(ni);

  // √úmumi x…ôrcl…ôr checkbox
  function mkExtraRow(label, activeKey, valKey) {
    const row = ce('div');
    row.style.cssText = 'background:#fff;border:1.5px solid #e0dbd4;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px';
    const cb = ce('input');
    cb.type = 'checkbox'; cb.checked = S[activeKey];
    cb.style.cssText = 'width:20px;height:20px;cursor:pointer;accent-color:#1a1a2e;flex-shrink:0';
    cb.onchange = e => { const p = {}; p[activeKey] = e.target.checked; set(p); };
    const lbl = ce('div');
    lbl.style.cssText = 'flex:1;font-size:14px;font-weight:600;color:' + (S[activeKey] ? '#1a1a2e' : '#aaa');
    lbl.textContent = label;
    const inp2 = ce('input', 'form-inp');
    inp2.type = 'number'; inp2.value = S[valKey]; inp2.min = '0'; inp2.step = '0.01';
    inp2.style.cssText = 'width:90px;text-align:right;' + (S[activeKey] ? '' : 'opacity:.4');
    inp2.disabled = !S[activeKey];
    inp2.oninput = e => { const p = {}; p[valKey] = e.target.value; S[valKey] = e.target.value; };
    const sym = ce('span');
    sym.style.cssText = 'font-size:13px;color:#aaa;flex-shrink:0';
    sym.textContent = '‚āľ';
    row.appendChild(cb); row.appendChild(lbl); row.appendChild(inp2); row.appendChild(sym);
    return row;
  }

  // chips
  const chips = ce('div', 'chips');
  const c1 = ce('div', 'chip ' + (pctOk ? 'chip-ok' : totPct > 100 ? 'chip-err' : 'chip-warn'));
  c1.textContent = totPct.toFixed(2) + '% ' + (pctOk ? '‚úď' : totPct > 100 ? '‚ÜĎ' : '‚Üď');
  const c2 = ce('div', 'chip chip-neu');
  c2.textContent = tw + ' ' + S.kUnit;
  chips.appendChild(c1); chips.appendChild(c2);
  if (unm > 0) {
    const c3 = ce('div', 'chip chip-warn');
    c3.textContent = '‚ö† ' + unm + ' tapńĪlmadńĪ';
    chips.appendChild(c3);
  }
  wrap.appendChild(chips);

  // result
  const res = ce('div', 'result-box');
  if (S.kName) { const rn = ce('div', 'res-name'); rn.textContent = S.kName; res.appendChild(rn); }
  const rsub = ce('div', 'res-sub'); rsub.textContent = tw + ' ' + S.kUnit + ' ¬∑ ' + S.kRows.length + ' ingredient';
  const rlbl = ce('div', 'res-label'); rlbl.textContent = '√úmumi x…ôrc';
  const rprice = ce('div', 'res-price'); rprice.textContent = '‚āľ ' + totCost.toFixed(2);
  // breakdown
  const breakdown = ce('div');
  breakdown.style.cssText = 'margin-top:12px;border-top:1px solid rgba(255,255,255,.1);padding-top:10px;display:flex;flex-direction:column;gap:4px';
  const addLine = (label, val) => {
    const l = ce('div'); l.style.cssText = 'display:flex;justify-content:space-between;font-size:12px;color:#6c7a99';
    const lt = ce('span'); lt.textContent = label;
    const lv = ce('span'); lv.style.fontFamily = 'monospace'; lv.textContent = '‚āľ ' + val.toFixed(2);
    l.appendChild(lt); l.appendChild(lv); breakdown.appendChild(l);
  };
  addLine('Material x…ôrci', matCost);
  if (umumiExtra > 0) addLine('√úmumi x…ôrcl…ôr', umumiExtra);
  if (qabExtra > 0) addLine('QablaŇüdńĪrma', qabExtra);
  res.appendChild(rsub);
  res.appendChild(rlbl); res.appendChild(rprice);
  if (umumiExtra > 0 || qabExtra > 0) res.appendChild(breakdown);
  // ingredient cards
  rowResults.forEach(r => {
    const ic = ce('div', 'ing-card' + (r.materialId ? '' : ' unmatched'));
    const head = ce('div', 'ing-head');
    const nm = ce('span', 'ing-name' + (r.materialId ? '' : ' unmatched'));
    nm.textContent = r.parsedName;
    const del = ce('button', 'ing-del');
    del.textContent = '‚úē';
    del.onclick = () => kDelRow(r.id);
    head.appendChild(nm); head.appendChild(del);

    const sel = ce('select', 'ing-sel' + (r.materialId ? '' : ' unmatched'));
    const def = ce('option'); def.value = ''; def.textContent = '‚ÄĒ Se√ßin ‚ÄĒ'; sel.appendChild(def);
    S.anbar.forEach(a => {
      const o = ce('option'); o.value = String(a.id);
      o.textContent = a.name + ' (' + a.qty + ' ' + a.unit + ')';
      if (String(r.materialId) === String(a.id)) o.selected = true;
      sel.appendChild(o);
    });
    sel.onchange = e => kUpdRow(r.id, 'materialId', e.target.value);

    const row2 = ce('div', 'ing-row');
    const pi = ce('input', 'ing-pct');
    pi.type = 'number'; pi.value = r.percent; pi.min = '0'; pi.max = '100'; pi.step = '.1';
    pi.oninput = e => kUpdRow(r.id, 'percent', e.target.value);
    const pctLbl = ce('span');
    pctLbl.style.cssText = 'font-size:13px;color:#aaa';
    pctLbl.textContent = '%';
    const cost = ce('div', 'ing-cost');
    if (r.cost != null) {
      cost.textContent = r.usedAmt.toFixed(2) + ' ' + S.kUnit + ' ¬∑ ';
      const strong = ce('strong');
      strong.textContent = '‚āľ ' + r.cost.toFixed(4);
      cost.appendChild(strong);
    } else {
      cost.style.color = '#ccc';
      cost.textContent = '‚ÄĒ';
    }
    row2.appendChild(pi); row2.appendChild(pctLbl); row2.appendChild(cost);

    ic.appendChild(head); ic.appendChild(sel); ic.appendChild(row2);
    wrap.appendChild(ic);
  });

function updateAtirResult() {
  const wrap = document.getElementById('atir-result');
  if (wrap) drawAtirResult(wrap);
}

function parseBlend(text) {
  const parts = text.split('+').map(p => p.trim()).filter(Boolean);
  const results = [];
  for (const part of parts) {
    const m = part.match(/^(.*?)\s+(\d+(?:\.\d+)?)%\s*$/);
    if (!m) continue;
    results.push({ name: m[1].trim(), pct: parseFloat(m[2]) });
  }
  return results;
}

function drawAtirResult(wrap) {
  wrap.innerHTML = '';
  const miqdar = parseFloat(S.aMiqdar) || 0;
  const faiz = parseFloat(S.aFaiz) || 0;
  const blend = parseBlend(S.aBlend);
  if (miqdar <= 0 || faiz <= 0 || blend.length === 0) return;

  const totalAtir = (miqdar * faiz) / 100;
  const totalPct = blend.reduce((s, b) => s + b.pct, 0);

  const res = ce('div', 'result-box');
  const rsub = ce('div', 'res-sub');
  rsub.textContent = miqdar + ' qr ¬∑ ' + faiz + '% …ôtir = ' + totalAtir.toFixed(2) + ' qr …ôtir';
  const rlbl = ce('div', 'res-label'); rlbl.textContent = 'B√∂l√ľn√ľŇü';
  res.appendChild(rsub); res.appendChild(rlbl);

  const breakdown = ce('div');
  breakdown.style.cssText = 'margin-top:8px;display:flex;flex-direction:column;gap:8px';

  blend.forEach(b => {
    const grams = (totalAtir * b.pct) / totalPct;
    const row = ce('div');
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:8px';
    const nameEl = ce('span'); nameEl.style.cssText = 'color:#9aa0b0;font-size:13px;flex:1'; nameEl.textContent = b.name;
    const pctEl = ce('span'); pctEl.style.cssText = 'color:#6c7a99;font-size:12px;white-space:nowrap'; pctEl.textContent = b.pct + '%';
    const grEl = ce('span'); grEl.style.cssText = 'color:#fff;font-family:monospace;font-weight:700;font-size:16px;white-space:nowrap'; grEl.textContent = grams.toFixed(2) + ' qr';
    row.appendChild(nameEl); row.appendChild(pctEl); row.appendChild(grEl);
    breakdown.appendChild(row);
  });

  if (Math.abs(totalPct - 100) > 0.1) {
    const warn = ce('div');
    warn.style.cssText = 'margin-top:6px;font-size:12px;color:#e67e22;background:rgba(230,126,34,.15);padding:8px 10px;border-radius:8px';
    warn.textContent = '‚ö† Faizl…ôr c…ômi ' + totalPct.toFixed(1) + '% (100% olmalńĪdńĪr)';
    breakdown.appendChild(warn);
  }

  res.appendChild(breakdown);
  wrap.appendChild(res);
}

  body.appendChild(cinsLbl); body.appendChild(cinsSel);
  body.appendChild(btn);
  card.appendChild(body);
  page.appendChild(card);

  // Result
  if (S.bfLoading) {
    const load = ce('div');
    load.style.cssText = 'text-align:center;padding:30px;color:#aaa;font-size:14px';
    load.innerHTML = '<div class="spinner" style="margin:0 auto 12px"></div>AI blend hazńĪrlayńĪr...';

  }

  if (S.bfResult) {
    page.appendChild(mkBlendResult());
  }

  return page;
}

        const pctEl = ce('span');
        pctEl.style.cssText = 'color:#fff;font-family:monospace;font-weight:700;font-size:15px';

        breakdown2.appendChild(row);
        if (a.qeyd) {
          const note = ce('div');
          note.style.cssText = 'font-size:11px;color:#6c7a99;margin-top:-4px;padding-left:2px';
          note.textContent = a.qeyd;
          breakdown2.appendChild(note);
        }
      });
      res.appendChild(breakdown2);

      if (v.izah) {

        izah2.textContent = v.izah;
        res.appendChild(izah2);
      }
      wrap.appendChild(res);
    });
  }

  // Use in blend calculator button
  const useBtn = ce('button', 'new-kal-btn');
  useBtn.textContent = 'ūüß™ Blend HesablayńĪcńĪya k√∂√ß√ľr';
  useBtn.style.marginTop = '8px';
  useBtn.onclick = () => {
    let blendStr = '';
    if (mode === 'movzu' && r.atirl…ôr) {
      blendStr = r.atirl…ôr.map(a => a.ad + ' ' + a.faiz + '%').join(' + ');
    } else if (r.variantlar && r.variantlar[0]) {
      blendStr = r.variantlar[0].atirl…ôr.map(a => a.ad + ' ' + a.faiz + '%').join(' + ');
    }
    S.aBlend = blendStr;
    set({ atirSub: 'blend' });
  };
  wrap.appendChild(useBtn);

  // Helper to build a saveable blend object from AI result
  function buildSaveObj(blendData, mehsul, cins, profil) {
    const atirStr = (blendData.atirl…ôr || []).map(a => a.ad + ' ' + a.faiz + '%').join(' + ');
    const altArr = (blendData.atirl…ôr || [])
      .filter(a => a.alternativ)
      .map(a => a.ad.split(' ')[0] + ' ‚Üí ' + a.alternativ);
    const altStr = altArr.join(' | ');
    return {
      kateqoriya: mehsul || 'M&P Sabun',
      cins: cins || 'Unisex',
      profil: profil || 'AI Blend',
      ad: (blendData.blend_adi_en || blendData.ad || 'AI Blend') + (blendData.blend_adi_az ? ' / ' + blendData.blend_adi_az : ''),
      atirl…ôr: atirStr,
      izah: blendData.izah || '',
      alternativ: altStr,
      aiSaved: true,
    };
  }

  // Yadda saxla button(s)
  if (mode === 'movzu') {
    const alreadySaved = S.savedBlends.some(b => b.ad === ((r.blend_adi_en || r.blend_adi || '') + (r.blend_adi_az ? ' / ' + r.blend_adi_az : '')));
    const saveBtn = ce('button', 'new-kal-btn');

      saveBtn.onclick = () => {
        const obj = buildSaveObj(r, r.mehsul, r.cins, r.movzu);
        S.savedBlends.unshift(obj);
        saveBlendToStorage();
        render();
      };
    }
    wrap.appendChild(saveBtn);
  } else {
    // Multiple variants - save button for each
    (r.variantlar || []).forEach((v, vi) => {
      const vName = v.ad || ('Variant ' + (vi+1));
      const alreadySaved = S.savedBlends.some(b => b.ad.startsWith(vName));
      const saveBtn = ce('button', 'new-kal-btn');
      saveBtn.textContent = alreadySaved ? '‚úď ' + vName + ' saxlanńĪb' : 'ūüíĺ ' + vName + ' ‚Üí HazńĪr Blendl…ôr…ô';
      saveBtn.style.cssText = 'margin-top:6px;display:block;width:100%;background:' + (alreadySaved ? 'rgba(39,174,96,.2)' : 'rgba(155,122,204,.15)') + ';border-color:' + (alreadySaved ? '#27ae60' : '#9b7acc') + ';color:' + (alreadySaved ? '#27ae60' : '#9b7acc');
      if (!alreadySaved) {
        const vCopy = v;
        saveBtn.onclick = () => {
          const obj = buildSaveObj(vCopy, r.mehsul, r.cins, r.profil);
          S.savedBlends.unshift(obj);
          saveBlendToStorage();
          render();
        };
      }
      wrap.appendChild(saveBtn);
    });
  }

  return wrap;
}

    if (a.vanilla !== b.vanilla) return a.vanilla ? 1 : -1;

  // Header

  const tbody = document.createElement('tbody');

  sorted.forEach((r, i) => {

    const row = document.createElement('tr');

    // Discoloration

  // Filters

  const cinsSel = ce('select', 'form-inp');
  cinsSel.style.cssText = 'flex:1;min-width:100px;font-size:13px;padding:8px';
  ['HamńĪsńĪ','QadńĪn','Unisex','UŇüaq','KiŇüi'].forEach(c => {
    const o = ce('option'); o.value = c; o.textContent = c;
    if ((S.hbCins||'HamńĪsńĪ') === c) o.selected = true;
    cinsSel.appendChild(o);
  });
  cinsSel.onchange = e => { S.hbCins = e.target.value; render(); };

  filterWrap.appendChild(katSel);
  filterWrap.appendChild(cinsSel);
  page.appendChild(filterWrap);

  // Search
  const srch = ce('input', 'form-inp');
  srch.type = 'text';
  srch.placeholder = 'ūüĒć Blend adńĪ v…ô ya …ôtir axtar...';

  srch.value = S.hbSearch || '';

  let filtered = [...(S.savedBlends || []), ...HAZIR_BLENDLER];

  if (S.hbCins && S.hbCins !== 'HamńĪsńĪ') filtered = filtered.filter(b => b.cins === S.hbCins);
  if (S.hbSearch) {
    const q = S.hbSearch.toLowerCase();
    filtered = filtered.filter(b => b.ad.toLowerCase().includes(q) || b.atirl…ôr.toLowerCase().includes(q) || b.profil.toLowerCase().includes(q));
  }
  // Sort: 5‚Üí1 first, unrated middle, 0 (never again) at bottom
  filtered = [...filtered].sort((a, b) => {
    const getR = x => { try { const v = localStorage.getItem('blendRating_' + x.ad.replace(/\s+/g,'_')); return v === null ? -1 : parseInt(v); } catch(e) { return -1; } };
    const ra = getR(a), rb = getR(b);
    if (ra === 0 && rb !== 0) return 1;
    if (rb === 0 && ra !== 0) return -1;
    if (ra === rb) return 0;
    if (ra === -1) return 1;
    if (rb === -1) return -1;
    return rb - ra;
  });

  // Hide zero toggle button removed ‚ÄĒ 0-rated stay at bottom

  const count = ce('div');
  count.style.cssText = 'font-size:12px;color:#666;margin-bottom:10px';
  count.textContent = filtered.length + ' blend tapńĪldńĪ';
  page.appendChild(count);

  if (filtered.length === 0) {
    const empty = ce('div');
    empty.style.cssText = 'text-align:center;padding:40px;color:#666;font-size:14px';
    empty.textContent = 'He√ß bir blend tapńĪlmadńĪ';
    page.appendChild(empty);
    return page;
  }

  filtered.forEach((b, bi) => {
    const card = ce('div', 'result-box');
    card.style.cssText = 'margin-bottom:10px';

    // Rating key per blend (use ad as unique key)
    const rKey = 'blendRating_' + b.ad.replace(/\s+/g,'_');
    let curRating = 0;
    try { curRating = parseInt(localStorage.getItem(rKey) || '0') || 0; } catch(e) {}

    // Skip if rated 0 and filter is active ‚ÄĒ no, show all but dim 0-rated ones

    const topRow = ce('div');

    if (b.aiSaved) {

    starRow.className = 'rc-starrow';
    starRow.style.cssText = 'display:flex;align-items:center;gap:4px;margin-bottom:8px;flex-wrap:wrap';

    const hasRating = localStorage.getItem(rKey) !== null;
    const isZero = hasRating && curRating === 0;

    // ‚úē button
    const zeroBtn = ce('button');
    zeroBtn.style.cssText = `font-size:12px;background:none;border:1.5px solid ${isZero?'#e74c3c':'#444'};border-radius:6px;cursor:pointer;padding:1px 7px;color:${isZero?'#e74c3c':'#666'}`;
    zeroBtn.textContent = '‚úē';
    zeroBtn.onclick = ev => {
      ev.stopPropagation();
      showRatingConfirm(card, rKey, 0);
    };
    starRow.appendChild(zeroBtn);

    const sep = ce('span');
    sep.style.cssText = 'color:#333;font-size:10px;margin:0 2px';
    sep.textContent = '|';
    starRow.appendChild(sep);

    // 1-5 stars
    for (let st = 1; st <= 5; st++) {

      star.textContent = filled ? '\u2605' : '\u2606';

      star.onclick = ev => {
        ev.stopPropagation();
        showRatingConfirm(card, rKey, stVal);
      };
      starRow.appendChild(star);

    // Label
    const rl = ce('span');

      rl.style.cssText = 'font-size:11px;color:#f5c518;margin-left:4px;font-weight:600';

    if (hasRating) {

      delBtn.onclick = ev => {
        ev.stopPropagation();
        showRatingConfirm(card, rKey, 'del');
      };
      starRow.appendChild(delBtn);
    }
    // Remove from saved button for AI blends
    if (b.aiSaved) {
      const rmBtn = ce('button');

      rmBtn.onclick = ev => {
        ev.stopPropagation();
        S.savedBlends = S.savedBlends.filter(x => x.ad !== b.ad);
        saveBlendToStorage();
        render();
      };
      starRow.appendChild(rmBtn);
    }

    card.appendChild(starRow);

async function runRengAI() {
  if (!S.rengAI || !S.rengAI.trim()) { showToast('R…ông adńĪ yazńĪn'); return; }
  set({ rengAILoading: true, rengAIResult: null });

  var prompt = 'S…ôn M&P sabun boyakarlńĪńüńĪ √ľzr…ô m√ľt…ôx…ôssis…ôn. ńįstifad…ô√ßi ańü M&P sabun bazasńĪnda x√ľsusi bir r…ông almaq ist…ôyir.\n\nńįst…ôdiyi r…ông: "' + S.rengAI + '"\n\n∆Źlind…ôki r…ôngl…ôr (may…ô piqment):\n930 seti (30ml, daha g√ľcl√ľ/t√ľnd): SarńĪ, NarńĪncńĪ, QńĪrmńĪzńĪ, Limon-yaŇüńĪl, √á…ôhrayńĪ, B…ôn√∂vŇü…ôyi, Mavi, S√ľd ŇüokoladńĪ, Qara\n1050 seti (50ml, y√ľng√ľl): Q…ôhv…ôyi, Qara, B…ôn√∂vŇü…ôyi, √á…ôhrayńĪ, YaŇüńĪl, Karmin, Mavi, QńĪrmńĪzńĪ, SarńĪ, Ańü\n\nVACńįB QAYDALAR:\n- Ańü baza r…ôngl…ôri parlaq v…ô pastel edir\n- ParlaqlńĪńüńĪ azaltmaq √ľ√ß√ľn: Qara (isti r…ôngl…ôr √ľ√ß√ľn) v…ô ya Q…ôhv…ôyi (daha t…ôhl√ľk…ôsiz)\n- Mavi, YaŇüńĪl, B…ôn√∂vŇü…ôyi, Limon-yaŇüńĪlńĪna QARA QATMA ‚ÄĒ tamam baŇüqa r…ông…ô √ßevrilir\n- Bu r…ôngl…ôr √ľ√ß√ľn: Q…ôhv…ôyi v…ô ya komplement r…ông istifad…ô et\n- 930 set g√ľcl√ľd√ľr ‚ÄĒ az damcńĪ lazńĪmdńĪr\n- 100q baza √ľ√ß√ľn √ľmumi 5-10 damcńĪ r…ông\n\nYALNIZ JSON ver:\n{"ad":"Az…ôrbaycanca r…ông adńĪ","ad_en":"English color name","damci":"100q baza √ľ√ß√ľn damcńĪ sayńĪ ‚ÄĒ m…ôs: SarńĪ 7 damcńĪ + Q…ôhv…ôyi 2 damcńĪ","addim":"AddńĪm-addńĪm qaydalar","xeberdarliq":"Varsa x…ôb…ôrdarlńĪq, yoxdursa boŇü string","izah":"Bu r…ôngin ańü bazada davranńĪŇüńĪ"}';

  try {
    var resp = await fetch(GS_URL, { method: 'POST', body: JSON.stringify({ action: 'ai_blend', prompt: prompt }) });
    var data = await resp.json();
    if (data.error) { set({ rengAILoading: false }); showToast('API x…ôtasńĪ: ' + (data.error.message||'')); return; }
    var text = data.content.map(function(i){ return i.text||''; }).join('');
    var parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    set({ rengAIResult: parsed, rengAILoading: false });
  } catch(e) {
    set({ rengAILoading: false });
    showToast('X…ôta: ' + (e && e.message ? e.message : String(e)));
  }
}

function showRatingConfirm(card, rKey, val) {
  // Remove any existing confirm panel
  const existing = card.querySelector('.rc-panel');
  if (existing) { existing.remove(); return; }

  const panel = ce('div');
  panel.className = 'rc-panel';
  panel.style.cssText = 'margin:6px 0 4px;padding:9px 11px;background:rgba(255,255,255,.07);border-radius:10px;border:1px solid rgba(255,255,255,.15)';

  const msg = ce('div');
  msg.style.cssText = 'font-size:12px;color:#ccc;margin-bottom:8px;line-height:1.4';
  if (val === 'del') {
    msg.textContent = 'Reytinqi tamamil…ô silm…ôk ist…ôyirsiniz?';
  } else if (val === 0) {
    msg.textContent = 'Bu blendi "bir daha istifad…ô etm…ôyim" kimi iŇüar…ôl…ôm…ôk ist…ôyirsiniz?';
  } else {
    const stars = '‚ėÖ'.repeat(val) + '‚ėÜ'.repeat(5 - val);
    msg.textContent = val + ' ulduz (' + stars + ') verm…ôk ist…ôyirsiniz?';
  }
  panel.appendChild(msg);

  const btnRow = ce('div');
  btnRow.style.cssText = 'display:flex;gap:8px';

  const okBtn = ce('button', 'pri-btn');
  okBtn.style.cssText = 'padding:6px 16px;font-size:12px';
  okBtn.textContent = 'B…ôli';
  okBtn.onclick = ev => {
    ev.stopPropagation();
    try {
      if (val === 'del') localStorage.removeItem(rKey);
      else localStorage.setItem(rKey, String(val));
    } catch(err) {}
    render();
  };

  const noBtn = ce('button', 'sec-btn');
  noBtn.style.cssText = 'padding:6px 16px;font-size:12px';
  noBtn.textContent = 'Xeyr';
  noBtn.onclick = ev => { ev.stopPropagation(); panel.remove(); };

  btnRow.appendChild(okBtn);
  btnRow.appendChild(noBtn);
  panel.appendChild(btnRow);

  // Insert directly after starRow
  const starRow = card.querySelector('.rc-starrow');
  if (starRow && starRow.nextSibling) {
    card.insertBefore(panel, starRow.nextSibling);
  } else if (starRow) {
    starRow.after(panel);
  } else {
    card.appendChild(panel);
  }
}
