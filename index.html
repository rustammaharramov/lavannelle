*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#F7F4EF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a2e;max-width:640px;margin:0 auto;min-height:100vh}
button{font-family:inherit;cursor:pointer}
.nav{background:#1a1a2e;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.nav-brand{color:#fff;font-size:16px;font-weight:700;border:none;background:none;padding:8px 0;display:flex;align-items:center;gap:6px}
.nav-brand span{color:#6c7a99;font-size:13px}
.nav-tabs{display:flex;gap:4px}
.nav-tab{background:none;border:none;color:#6c7a99;font-size:13px;font-weight:600;padding:8px 12px;border-radius:8px}
.nav-tab.active{background:rgba(255,255,255,.12);color:#fff}
.home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:10px}
.home h1{font-size:28px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.home p{font-size:14px;color:#bbbbbb;margin-bottom:20px}
.home-card{width:100%;background:#fff;border:1.5px solid #e0dbd4;border-radius:16px;padding:22px 20px;display:flex;align-items:center;gap:16px;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.home-card:active{background:#faf8f5}
.hc-icon{font-size:30px;width:52px;height:52px;background:#f0ece4;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hc-body{flex:1}
.hc-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:2px}
.hc-desc{font-size:12px;color:#bbbbbb;line-height:1.4}
.hc-arrow{font-size:20px;color:#3b5bdb;font-weight:700}
.page{padding:16px;min-height:calc(100vh - 56px)}
.topbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.topbar-title{flex:1;font-size:18px;font-weight:700;color:#1a1a2e}
.search-inp{flex:2;background:#fff;border:1.5px solid #e0dbd4;border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;min-width:0}
.search-inp:focus{outline:none;border-color:#3b5bdb}
.add-btn{background:#1a1a2e;color:#fff;border:none;border-radius:12px;padding:12px 16px;font-size:14px;font-weight:700;white-space:nowrap}
.statusbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.st-info{font-size:12px;color:#bbbbbb}
.st-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.st-sync{background:#ebfbee;color:#2b8a3e;border:1px solid #b2f2bb}
.st-local{background:#fff3e0;color:#e67e22;border:1px solid #ffd8a8}
.mat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:80px}
.mat-card{background:#fff;border-radius:12px;border:1.5px solid #e0dbd4;overflow:hidden}
.mat-row{display:flex;align-items:center;padding:14px 16px;gap:10px}
.mat-row:active{background:#fafafa}
.mat-num{font-size:11px;color:#ccc;width:18px;flex-shrink:0;font-family:monospace;text-align:right}
.mat-info{flex:1;min-width:0}
.mat-name{font-size:15px;font-weight:600;color:#1a1a2e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mat-meta{font-size:12px;color:#c8c8c8;margin-top:2px}
.mat-note{font-size:11px;color:#e67e22;font-weight:600;margin-top:2px}
.mat-price{font-size:12px;font-weight:700;color:#1a1a2e;font-family:monospace;flex-shrink:0;margin-right:4px}
.mat-chevron{font-size:14px;color:#ccc;flex-shrink:0}
.edit-form{background:#fffdf8;border-top:1.5px solid #f0ece4;padding:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-full{margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:700;color:#c8c8c8;text-transform:uppercase;letter-spacing:.6px}
.form-inp{background:#fff;border:1.5px solid #d5cec6;border-radius:10px;padding:12px 13px;font-size:15px;font-family:inherit;width:100%}
.form-inp:focus{outline:none;border-color:#3b5bdb}
.form-btns{display:flex;gap:8px}
.btn-save{flex:1;background:#1a1a2e;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700}
.btn-cancel{background:#f0ece4;color:#7a8499;border:none;border-radius:10px;padding:14px 18px;font-size:14px;font-weight:600}
.btn-delete{background:#fff5f5;color:#c92a2a;border:1.5px solid #ffc9c9;border-radius:10px;padding:14px;font-size:14px;font-weight:600;margin-top:8px;width:100%}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:13px 26px;border-radius:24px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.toast.show{opacity:1}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;background:#F7F4EF}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:34px;height:34px;border:3px solid #e0dbd4;border-top-color:#3b5bdb;border-radius:50%;animation:spin .7s linear infinite}
.loading p{font-size:13px;color:#bbbbbb}
.steps{display:flex;align-items:center;margin-bottom:18px}
.step-pill{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 5px;border-radius:20px;font-size:12px;font-weight:600}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.step-line{flex:1;height:1.5px;min-width:12px}
.kal-card{background:#fff;border-radius:12px;border:1.5px solid #e0dbd4;overflow:hidden;margin-bottom:12px}
.kal-body{padding:20px 16px}
.kal-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#faf8f5;border-top:1px solid #f0ece4}

.recipe-ta:focus{outline:none}
.pri-btn{background:#1a1a2e;color:#fff;border:none;border-radius:10px;padding:13px 22px;font-size:15px;font-weight:700}
.sec-btn{background:#f0ece4;color:#7a8499;border:none;border-radius:10px;padding:13px 18px;font-size:14px;font-weight:600}

.ing-card.unmatched{border-color:#ffd8a8;background:#fffbf0}
.ing-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ing-name{font-size:14px;font-weight:600;color:#1a1a2e}
.ing-name.unmatched{color:#e67e22}

.ing-row{display:flex;align-items:center;gap:8px}

.ing-cost{flex:1;font-size:13px;color:#9fa9bf;text-align:right}

.result-box{background:#1a1a2e;border-radius:14px;padding:22px 20px;margin-bottom:12px}
.res-name{color:#fff;font-size:18px;font-weight:700;margin-bottom:2px}
.res-sub{color:#6c7a99;font-size:13px;margin-bottom:18px}

.res-price{color:#fff;font-family:monospace;font-weight:800;font-size:34px;letter-spacing:-1px}
.res-approx{color:#a0b0cc;font-family:monospace;font-size:14px;margin-top:5px}

.chip-ok{background:#ebfbee;color:#2b8a3e;border-color:#b2f2bb}
.chip-warn{background:#fffbf0;color:#e67e22;border-color:#ffd8a8}

function pricePerUnit(item) {
  const v = parseFloat(item.qty) || 0;
  const u = (item.unit || '').toLowerCase();
  let grams = v;
  if (u === 'kg') grams = v * 1000;
  if (u === 'l') grams = v * 1000;
  if (!grams || !item.price) return null;
  return parseFloat(item.price) / grams;
}

function similarity(a, b) {
  const A = a.toLowerCase().trim();
  const B = b.toLowerCase().trim();
  if (A === B) return 1;
  if (A.length > 4 && B.includes(A)) return 0.95;
  if (B.length > 4 && A.includes(B)) return 0.95;
  const wA = A.split(' ').filter(w => w.length > 2);
  const wB = B.split(' ').filter(w => w.length > 2);
  if (!wA.length) return 0;
  let m = 0;
  for (const w of wA) {
    if (wB.some(wb => wb === w || (w.length > 4 && wb.includes(w)) || (wb.length > 4 && w.includes(wb)))) m++;
  }
  const ratio = m / wA.length;
  return ratio >= 0.75 ? ratio * 0.85 : 0;
}

function bestMatch(name, anbar) {
  let best = null, bs = 0;
  for (const i of anbar) {
    const s = similarity(name, i.name);
    if (s > bs) { bs = s; best = i; }
  }
  return bs >= 0.75 ? best : null;
}

function parseRecipe(text) {
  const results = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const c = line.trim().replace(/^[вҖў\-\*\d\.]+\s*/, '').trim();
    const m = c.match(/^(.*?)\s+([\d.,]+)\s*%\s*$/);
    if (!m) continue;
    const name = m[1].trim();
    const pct = parseFloat(m[2].replace(',', '.'));
    if (!name || isNaN(pct)) continue;
    results.push({ id: Math.random().toString(36), parsedName: name, percent: pct, materialId: '' });
  }
  return results;
}

// в”Җв”Җ INIT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function init() {
  // ЖҸvvЙҷlcЙҷ loading olmadan INIT-i gГ¶stЙҷr ki, aДҹ ekran olmasДұn
  let data = null;

  // 1. localStorage-dan oxu (sГјrЙҷtli)
  try {
    const s = localStorage.getItem('lav');
    if (s) data = JSON.parse(s);
  } catch(e) {}

  // ЖҸgЙҷr local data varsa dЙҷrhal gГ¶stЙҷr
  if (data && data.length) {
    set({ anbar: data, loading: false });
  history.replaceState({ page: 'home', atirSub: null }, '');
  } else {
    // Local yoxdur вҖ” INIT-i gГ¶stЙҷr
    set({ anbar: INIT, loading: false });
    try { localStorage.setItem('lav', JSON.stringify(INIT)); } catch(e) {}
  }

  // nextId-ni yenilЙҷ
  nextId = Math.max(...S.anbar.map(i => parseInt(i.id)||0)) + 1;
  if (nextId < 100) nextId = 100;

  // ЖҸtir anbarДұnДұ da yГјklЙҷ
  initAtir();

  // ReytinqlЙҷri Sheets-dЙҷn yГјklЙҷ
  loadRatings();

  // Sonra arxa planda Google Sheets-dЙҷn yГјklЙҷ
  try {
    const gsData = await gsLoad();
    if (gsData && gsData.length) {
      set({ anbar: gsData });
      nextId = Math.max(...gsData.map(i => parseInt(i.id)||0)) + 1;
      if (nextId < 100) nextId = 100;
      try { localStorage.setItem('lav', JSON.stringify(gsData)); } catch(e) {}
    } else if (!data || !data.length) {
      // GS boЕҹdur, INIT-i yaz
      try { await gsSave(INIT); } catch(e) {}
    }
  } catch(e) {
    // GS iЕҹlЙҷmir вҖ” problem yoxdur, local ilЙҷ davam et
  }
}

  startAtirEdit(n);
}

// в”Җв”Җ ANBAR в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function startEdit(item) {
  set({ editId: item.id, editBuf: { name: item.name, qty: String(item.qty), unit: item.unit, price: String(item.price), note: item.note || '' } });
}

function addItem() {
  if (!isAdmin()) { showToast('вӣ” YalnДұz Admin edЙҷ bilЙҷr'); return; }
  const n = { id: nextId++, name: '', qty: '', unit: 'ml', price: '', note: '' };
  S.anbar.push(n);
  set({ anbar: S.anbar });
  startEdit(n);
}

async function saveItem() {
  if (!isAdmin()) { showToast('вӣ” YalnДұz Admin edЙҷ bilЙҷr'); return; }
  const b = S.editBuf;
  const items = S.anbar.map(i => i.id === S.editId
    ? { ...i, name: b.name, qty: parseFloat(b.qty) || b.qty, unit: b.unit, price: parseFloat(b.price) || b.price, note: b.note }
    : i
  );
  set({ editId: null, editBuf: {} });
  await persist(items);
}

function cancelEdit() {
  const i = S.anbar.find(x => x.id === S.editId);
  if (i && !i.name && !i.qty && !i.price) {
    set({ anbar: S.anbar.filter(x => x.id !== S.editId) });
  }
  set({ editId: null, editBuf: {} });
}

async function delItem(id) {
  if (!isAdmin()) { showToast('вӣ” YalnДұz Admin edЙҷ bilЙҷr'); return; }
  await persist(S.anbar.filter(i => i.id !== id));
}

function kParse() {
  const rows = parseRecipe(S.kText).map(r => {
    const m = bestMatch(r.parsedName, S.anbar);
    return { ...r, materialId: m ? String(m.id) : '' };
  });
  set({ kRows: rows, kStep: 2 });
}

function kUpdRow(id, f, v) {
  set({ kRows: S.kRows.map(r => r.id === id ? { ...r, [f]: v } : r) });
}

function kDelRow(id) {
  set({ kRows: S.kRows.filter(r => r.id !== id) });
}

function kReset() {
  set({ kStep: 1, kText: '', kWeight: '', kUnit: 'g', kRows: [], kName: '',
    kUmumi: false, kUmumiVal: '1', kQab: false, kQabVal: '2' });
}

  const root = document.getElementById('root');
  root.innerHTML = '';

  if (S.loading) {
    const d = ce('div', 'loading');
    d.innerHTML = '<div class="spinner"></div><p>YГјklЙҷnir...</p>';
    root.appendChild(d);
    return;
  }

  if (S.page === 'home') {
    root.appendChild(mkHome());

  }

  root.appendChild(mkNav());
  if (S.page === 'anbar') root.appendChild(mkAnbar());

  if (S.page === 'atirdunyasi') root.appendChild(mkAtirDunyasi());
  if (S.page === 'rengdunyasi') root.appendChild(mkRengDunyasi());
}

  if (S.kStep === 1) page.appendChild(mkKStep1());

function mkSteps() {
  const wrap = ce('div', 'steps');
  const defs = ['Resept', 'HЙҷcm', 'NЙҷticЙҷ'];
  defs.forEach((label, i) => {
    const n = i + 1;
    const act = S.kStep === n, done = S.kStep > n;
    const pill = ce('div', 'step-pill');
    if (act) pill.style.cssText = 'background:#1a1a2e;color:#fff;border:1.5px solid #1a1a2e';
    else if (done) pill.style.cssText = 'background:#ebfbee;color:#2b8a3e;border:1.5px solid #b2f2bb';
    else pill.style.cssText = 'background:#e8e4dc;color:#c8c8c8;border:1.5px solid #d5cec6';

    const num = ce('div', 'step-num');
    if (act) num.style.cssText = 'background:#fff;color:#1a1a2e';
    else if (done) num.style.cssText = 'background:#2b8a3e;color:#fff';
    else num.style.cssText = 'background:#c8c0b4;color:#fff';
    num.textContent = done ? 'вң“' : String(n);

    pill.appendChild(num);
    pill.appendChild(document.createTextNode(label));
    wrap.appendChild(pill);

    if (i < 2) {
      const line = ce('div', 'step-line');
      line.style.background = done ? '#b2f2bb' : '#d5cec6';
      wrap.appendChild(line);
    }
  });
  return wrap;
}

function mkKStep3() {
  const wrap = ce('div');
  const tw = parseFloat(S.kWeight) || 0;

  const rowResults = S.kRows.map(r => {
    const mat = S.anbar.find(a => String(a.id) === String(r.materialId));
    const pct = parseFloat(r.percent) || 0;
    if (!mat || !pct || !tw) return { ...r, mat, pct, cost: null, usedAmt: null };
    const ppu = pricePerUnit(mat);
    const ua = (pct / 100) * tw;
    return { ...r, mat, pct, cost: ppu != null ? ppu * ua : null, usedAmt: ua };
  });

  const totPct = rowResults.reduce((s, r) => s + (r.pct || 0), 0);
  const matCost = rowResults.reduce((s, r) => s + (r.cost || 0), 0);
  const umumiExtra = S.kUmumi ? (parseFloat(S.kUmumiVal) || 0) : 0;
  const qabExtra = S.kQab ? (parseFloat(S.kQabVal) || 0) : 0;
  const totCost = matCost + umumiExtra + qabExtra;
  const pctOk = Math.abs(totPct - 100) < 0.01;
  const unm = S.kRows.filter(r => !r.materialId).length;

  // name input
  const ni = ce('input', 'form-inp');
  ni.type = 'text'; ni.value = S.kName; ni.placeholder = 'MЙҷhsul adДұ (ixtiyari)';
  ni.style.cssText = 'margin-bottom:12px;width:100%';
  ni.oninput = e => { S.kName = e.target.value; };
  wrap.appendChild(ni);

  // Гңmumi xЙҷrclЙҷr checkbox
  function mkExtraRow(label, activeKey, valKey) {
    const row = ce('div');
    row.style.cssText = 'background:#fff;border:1.5px solid #e0dbd4;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px';
    const cb = ce('input');
    cb.type = 'checkbox'; cb.checked = S[activeKey];
    cb.style.cssText = 'width:20px;height:20px;cursor:pointer;accent-color:#1a1a2e;flex-shrink:0';
    cb.onchange = e => { const p = {}; p[activeKey] = e.target.checked; set(p); };
    const lbl = ce('div');
    lbl.style.cssText = 'flex:1;font-size:14px;font-weight:600;color:' + (S[activeKey] ? '#1a1a2e' : '#aaa');
    lbl.textContent = label;
    const inp2 = ce('input', 'form-inp');
    inp2.type = 'number'; inp2.value = S[valKey]; inp2.min = '0'; inp2.step = '0.01';
    inp2.style.cssText = 'width:90px;text-align:right;' + (S[activeKey] ? '' : 'opacity:.4');
    inp2.disabled = !S[activeKey];
    inp2.oninput = e => { const p = {}; p[valKey] = e.target.value; S[valKey] = e.target.value; };
    const sym = ce('span');
    sym.style.cssText = 'font-size:13px;color:#c8c8c8;flex-shrink:0';
    sym.textContent = 'вӮј';
    row.appendChild(cb); row.appendChild(lbl); row.appendChild(inp2); row.appendChild(sym);
    return row;
  }

  // chips
  const chips = ce('div', 'chips');
  const c1 = ce('div', 'chip ' + (pctOk ? 'chip-ok' : totPct > 100 ? 'chip-err' : 'chip-warn'));
  c1.textContent = totPct.toFixed(2) + '% ' + (pctOk ? 'вң“' : totPct > 100 ? 'вҶ‘' : 'вҶ“');
  const c2 = ce('div', 'chip chip-neu');
  c2.textContent = tw + ' ' + S.kUnit;
  chips.appendChild(c1); chips.appendChild(c2);
  if (unm > 0) {
    const c3 = ce('div', 'chip chip-warn');
    c3.textContent = 'вҡ  ' + unm + ' tapДұlmadДұ';
    chips.appendChild(c3);
  }
  wrap.appendChild(chips);

  // result
  const res = ce('div', 'result-box');
  if (S.kName) { const rn = ce('div', 'res-name'); rn.textContent = S.kName; res.appendChild(rn); }
  const rsub = ce('div', 'res-sub'); rsub.textContent = tw + ' ' + S.kUnit + ' В· ' + S.kRows.length + ' ingredient';
  const rlbl = ce('div', 'res-label'); rlbl.textContent = 'Гңmumi xЙҷrc';
  const rprice = ce('div', 'res-price'); rprice.textContent = 'вӮј ' + totCost.toFixed(2);
  // breakdown
  const breakdown = ce('div');
  breakdown.style.cssText = 'margin-top:12px;border-top:1px solid rgba(255,255,255,.1);padding-top:10px;display:flex;flex-direction:column;gap:4px';
  const addLine = (label, val) => {
    const l = ce('div'); l.style.cssText = 'display:flex;justify-content:space-between;font-size:12px;color:#6c7a99';
    const lt = ce('span'); lt.textContent = label;
    const lv = ce('span'); lv.style.fontFamily = 'monospace'; lv.textContent = 'вӮј ' + val.toFixed(2);
    l.appendChild(lt); l.appendChild(lv); breakdown.appendChild(l);
  };
  addLine('Material xЙҷrci', matCost);
  if (umumiExtra > 0) addLine('Гңmumi xЙҷrclЙҷr', umumiExtra);
  if (qabExtra > 0) addLine('QablaЕҹdДұrma', qabExtra);
  res.appendChild(rsub);
  res.appendChild(rlbl); res.appendChild(rprice);
  if (umumiExtra > 0 || qabExtra > 0) res.appendChild(breakdown);
  // ingredient cards
  rowResults.forEach(r => {
    const ic = ce('div', 'ing-card' + (r.materialId ? '' : ' unmatched'));
    const head = ce('div', 'ing-head');
    const nm = ce('span', 'ing-name' + (r.materialId ? '' : ' unmatched'));
    nm.textContent = r.parsedName;
    const del = ce('button', 'ing-del');
    del.textContent = 'вң•';
    del.onclick = () => kDelRow(r.id);
    head.appendChild(nm); head.appendChild(del);

    const sel = ce('select', 'ing-sel' + (r.materialId ? '' : ' unmatched'));
    const def = ce('option'); def.value = ''; def.textContent = 'вҖ” SeГ§in вҖ”'; sel.appendChild(def);
    S.anbar.forEach(a => {
      const o = ce('option'); o.value = String(a.id);
      o.textContent = a.name + ' (' + a.qty + ' ' + a.unit + ')';
      if (String(r.materialId) === String(a.id)) o.selected = true;
      sel.appendChild(o);
    });
    sel.onchange = e => kUpdRow(r.id, 'materialId', e.target.value);

    const row2 = ce('div', 'ing-row');
    const pi = ce('input', 'ing-pct');
    pi.type = 'number'; pi.value = r.percent; pi.min = '0'; pi.max = '100'; pi.step = '.1';
    pi.oninput = e => kUpdRow(r.id, 'percent', e.target.value);
    const pctLbl = ce('span');
    pctLbl.style.cssText = 'font-size:13px;color:#c8c8c8';
    pctLbl.textContent = '%';
    const cost = ce('div', 'ing-cost');
    if (r.cost != null) {
      cost.textContent = r.usedAmt.toFixed(2) + ' ' + S.kUnit + ' В· ';
      const strong = ce('strong');
      strong.textContent = 'вӮј ' + r.cost.toFixed(4);
      cost.appendChild(strong);
    } else {
      cost.style.color = '#ccc';
      cost.textContent = 'вҖ”';
    }
    row2.appendChild(pi); row2.appendChild(pctLbl); row2.appendChild(cost);

    ic.appendChild(head); ic.appendChild(sel); ic.appendChild(row2);
    wrap.appendChild(ic);
  });

  // extra costs
  wrap.appendChild(mkExtraRow('Гңmumi xЙҷrclЙҷr', 'kUmumi', 'kUmumiVal'));
  wrap.appendChild(mkExtraRow('QablaЕҹdДұrma', 'kQab', 'kQabVal'));

  // result
  wrap.appendChild(res);
  return wrap;
}

function mkAtir() {
  const page = ce('div', 'page');

  // Header
  const hdr = ce('div', 'topbar');
  const title = ce('span', 'topbar-title');
  title.textContent = 'рҹҢё Blend Hesablama';
  const clearBtn = ce('button', 'sec-btn');
  clearBtn.textContent = 'рҹ—‘ TЙҷmizlЙҷ';

  clearBtn.onclick = () => { S.aBlend = ''; render(); };
  hdr.appendChild(title);
  hdr.appendChild(clearBtn);
  page.appendChild(hdr);

  // Blend textarea
  const s1 = ce('div', 'kal-card');
  const s1b = ce('div', 'kal-body');
  const s1l = ce('div', 'form-label'); s1l.textContent = 'ЖҸtir Blendi'; s1l.style.marginBottom = '8px';
  const ta = ce('textarea', 'recipe-ta');
  ta.style.minHeight = '90px';
  ta.placeholder = 'White Tea FO USA 50% + Japan Cherry Blossom FO USA 30% + Bergamot FO USA 20%';
  ta.value = S.aBlend;
  ta.oninput = e => { S.aBlend = e.target.value; updateAtirResult(); };
  s1b.appendChild(s1l); s1b.appendChild(ta);
  s1.appendChild(s1b);
  page.appendChild(s1);

  // Miqdar
  const s2 = ce('div', 'kal-card');
  const s2b = ce('div', 'kal-body');
  const s2l = ce('div', 'form-label'); s2l.textContent = 'Miqdar (qr / ml)'; s2l.style.marginBottom = '8px';
  const s2i = ce('input', 'form-inp');
  s2i.type = 'number'; s2i.placeholder = '100'; s2i.value = S.aMiqdar;
  s2i.min = '0'; s2i.step = '0.1';
  s2i.style.cssText = 'font-size:22px;font-weight:700;width:150px';
  s2i.oninput = e => { S.aMiqdar = e.target.value; updateAtirResult(); };
  s2b.appendChild(s2l); s2b.appendChild(s2i);
  s2.appendChild(s2b);
  page.appendChild(s2);

  // Faiz
  const s3 = ce('div', 'kal-card');
  const s3b = ce('div', 'kal-body');
  const s3l = ce('div', 'form-label'); s3l.textContent = 'ЖҸtir Faizi (%)'; s3l.style.marginBottom = '8px';
  const s3row = ce('div'); s3row.style.cssText = 'display:flex;align-items:center;gap:8px';
  const s3i = ce('input', 'form-inp');
  s3i.type = 'number'; s3i.placeholder = '15'; s3i.value = S.aFaiz;
  s3i.min = '0'; s3i.max = '100'; s3i.step = '0.1';
  s3i.style.cssText = 'font-size:22px;font-weight:700;width:130px';
  s3i.oninput = e => { S.aFaiz = e.target.value; updateAtirResult(); };
  const s3sym = ce('span'); s3sym.style.cssText = 'font-size:20px;color:#c8c8c8;font-weight:700'; s3sym.textContent = '%';
  s3row.appendChild(s3i); s3row.appendChild(s3sym);
  s3b.appendChild(s3l); s3b.appendChild(s3row);

  // NЙҷticЙҷ container
  const resWrap = ce('div');
  resWrap.id = 'atir-result';
  page.appendChild(resWrap);
  drawAtirResult(resWrap);

  return page;
}

function updateAtirResult() {
  const wrap = document.getElementById('atir-result');
  if (wrap) drawAtirResult(wrap);
}

function parseBlend(text) {
  const parts = text.split('+').map(p => p.trim()).filter(Boolean);
  const results = [];
  for (const part of parts) {
    const m = part.match(/^(.*?)\s+(\d+(?:\.\d+)?)%\s*$/);
    if (!m) continue;
    results.push({ name: m[1].trim(), pct: parseFloat(m[2]) });
  }
  return results;
}

function drawAtirResult(wrap) {
  wrap.innerHTML = '';
  const miqdar = parseFloat(S.aMiqdar) || 0;
  const faiz = parseFloat(S.aFaiz) || 0;
  const blend = parseBlend(S.aBlend);
  if (miqdar <= 0 || faiz <= 0 || blend.length === 0) return;

  const totalAtir = (miqdar * faiz) / 100;
  const totalPct = blend.reduce((s, b) => s + b.pct, 0);

  const res = ce('div', 'result-box');
  const rsub = ce('div', 'res-sub');
  rsub.textContent = miqdar + ' qr В· ' + faiz + '% Йҷtir = ' + totalAtir.toFixed(2) + ' qr Йҷtir';
  const rlbl = ce('div', 'res-label'); rlbl.textContent = 'BГ¶lГјnГјЕҹ';
  res.appendChild(rsub); res.appendChild(rlbl);

  const breakdown = ce('div');
  breakdown.style.cssText = 'margin-top:8px;display:flex;flex-direction:column;gap:8px';

  blend.forEach(b => {
    const grams = (totalAtir * b.pct) / totalPct;
    const row = ce('div');
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:8px';
    const nameEl = ce('span'); nameEl.style.cssText = 'color:#9aa0b0;font-size:13px;flex:1'; nameEl.textContent = b.name;
    const pctEl = ce('span'); pctEl.style.cssText = 'color:#6c7a99;font-size:12px;white-space:nowrap'; pctEl.textContent = b.pct + '%';
    const grEl = ce('span'); grEl.style.cssText = 'color:#fff;font-family:monospace;font-weight:700;font-size:16px;white-space:nowrap'; grEl.textContent = grams.toFixed(2) + ' qr';
    row.appendChild(nameEl); row.appendChild(pctEl); row.appendChild(grEl);
    breakdown.appendChild(row);
  });

  if (Math.abs(totalPct - 100) > 0.1) {
    const warn = ce('div');
    warn.style.cssText = 'margin-top:6px;font-size:12px;color:#e67e22;background:rgba(230,126,34,.15);padding:8px 10px;border-radius:8px';
    warn.textContent = 'вҡ  FaizlЙҷr cЙҷmi ' + totalPct.toFixed(1) + '% (100% olmalДұdДұr)';
    breakdown.appendChild(warn);
  }

  res.appendChild(breakdown);
  wrap.appendChild(res);
}

async function runBlendAI(mode) {
  const input = S.bfInput.trim();
  if (!input) { showToast('ZЙҷhmЙҷt olmasa bir Еҹey yazДұn'); return; }

  if (!isAdmin()) { showToast('вӣ” AI yalnДұz Admin ГјГ§ГјndГјr'); return; }
  set({ bfLoading: true, bfResult: null });

  // Build fragrance list from anbar with guc
  const mehsul = S.bfMehsul || 'M&P Sabun';
  const cins = S.bfCins || 'QadДұn';
  const isSabun = mehsul === 'M&P Sabun';

  // Sabun ГјГ§Гјn yalnДұz USA ЙҷtirlЙҷri gГ¶ndЙҷr
  const sabunFilter = a => (a.country||'').toLowerCase().includes('usa') || (a.name||'').toUpperCase().includes('USA');
  const usableAtir = isSabun ? S.atirAnbar.filter(sabunFilter) : S.atirAnbar;
  const atirList = usableAtir.map(a => `${a.name} | ${a.guc||'?'}` ).join('\n');

  const mehsulQayda = {
    'M&P Sabun': 'MЖҸHSUL: M&P Sabun. DЙҷriyЙҷ birbaЕҹa tЙҷmas var. YumЕҹaq, gГ¶zЙҷl, yГјngГјl-orta intensivlikdЙҷ qoxular seГ§. AДҹДұr qoxulardan Г§Йҷkin. Гңmumi faiz 1-3%.\nвҡ пёҸ SABUN QAYDASI: YalnДұz "FO USA" (CandleScience) ЙҷtirlЙҷrdЙҷn istifadЙҷ et. FR (Fransa) vЙҷ CN (ГҮin) ЙҷtirlЙҷri QADAДһANDIR.',
    'ЖҸtirli Mum Tablet': 'MЖҸHSUL: ЖҸtirli Mum Tablet вҖ” garderopda passiv yayДұlДұr. DЙҷrin, sabit qoxular: mГјЕҹk, amber, odunsu, lavanda. Baza notlara ГјstГјnlГјk ver. Гңmumi faiz 6-10%.',
    'ЖҸtirli ЖҸriyЙҷn Mum': 'MЖҸHSUL: ЖҸtirli ЖҸriyЙҷn Mum вҖ” aroma lampada, istilik ilЙҷ otaДҹa yayДұlДұr. UГ§ucu, canlДұ qoxular: Г§iГ§Йҷkli, sitrus, meyvЙҷli. Flash point 65C+ ГјstГјn tut. Гңmumi faiz 8-12%.'
  };

  const gucQayda = 'ЖҸTД°R GГңCU BALANSI вҖ” faiz qoyarkЙҷn mГјtlЙҷq nЙҷzЙҷrЙҷ al: GГјclГј: 10-20%, YaxЕҹДұ: 20-35%, Orta: 30-45%, ZЙҷif: 40-55%, ГҮox ZЙҷif: 50-65%';

  const prompt = mode === 'movzu'
    ? `${mehsulQayda[mehsul] || ''}\nCД°NSД°YYЖҸT: ${cins} ГјГ§Гјn uyДҹun qoxu profili seГ§.\n\n${gucQayda}\n\nMГјЕҹtЙҷrinin tЙҷlЙҷbi: "${input}" mГ¶vzusuna uyДҹun ${mehsul} ГјГ§Гјn blend yarat.\n\nQAYDALAR:\n- MГ¶vzuya uyДҹun ЙҷtirlЙҷri anbardan seГ§\n- AnbarДұnda olmayan lazДұm olan varsa anbar: false qeyd et\n- 3-5 ЙҷtirdЙҷn ibarЙҷt blend, faizlЙҷr cЙҷmi dЙҷqiq 100%\n- AzЙҷrbaycan adДұ gГ¶zЙҷl, mЙҷnalДұ olsun (mЙҷs. DЙҷniz KГјlЙҷyi, GecЙҷ BaДҹГ§asДұ)\n- YALNIZ JSON ver:\n{"blend_adi_az":"AzЙҷrbaycanca ad","blend_adi_en":"English name","movzu":"${input}","mehsul":"${mehsul}","izah":"1-2 cГјmlЙҷ izahat","atirlЙҷr":[{"ad":"ЖҸtir adДұ","faiz":40,"anbar":true,"qeyd":"rolu"}]}`
    : `${mehsulQayda[mehsul] || ''}\nCД°NSД°YYЖҸT: ${cins} ГјГ§Гјn uyДҹun qoxu profili seГ§.\n\n${gucQayda}\n\nMГјЕҹtЙҷrinin tЙҷlЙҷbi: "${input}" Йҷtirini mЙҷrkЙҷzЙҷ alaraq ${mehsul} ГјГ§Гјn blend yarat.\n\nQAYDALAR:\n- "${input}" Йҷtiri dominant olsun (30-50%), zЙҷifdirsЙҷ faizini artДұr\n- TamamlayДұcДұ ЙҷtirlЙҷri anbardan seГ§, yoxdursa anbar: false\n- 3-5 ЙҷtirdЙҷn ibarЙҷt 2-3 variant, hЙҷr birinin faizlЙҷri cЙҷmi dЙҷqiq 100%\n- HЙҷr variantДұn adДұ gГ¶zЙҷl, mЙҷnalДұ olsun\n- YALNIZ JSON ver:\n{"Йҷsas_Йҷtir":"${input}","mehsul":"${mehsul}","variantlar":[{"ad_az":"AzЙҷrbaycanca ad","ad_en":"English name","izah":"1-2 cГјmlЙҷ","atirlЙҷr":[{"ad":"ЖҸtir adДұ","faiz":45,"anbar":true,"qeyd":"rolu"}]}]}`;

  // Prompt caching: system + anbar siyahДұsДұ ayrДұca gГ¶ndЙҷrilir
  const systemPrompt = `SЙҷn peЕҹЙҷkar parfГјmer vЙҷ kosmetik formulyatorsЙҷn. YalnДұz JSON cavab ver, heГ§ bir izahat ЙҷlavЙҷ etmЙҷ.\n\nAnbar siyahДұsДұ:\n${atirList}`;

  try {
    const response = await fetch(GS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'ai_blend', prompt: prompt, systemPrompt: systemPrompt })
    });

    const data = await response.json();
    if (data.error) {
      set({ bfLoading: false });
      showToast('API xЙҷtasДұ: ' + (data.error.message || JSON.stringify(data.error)));
      return;
    }
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    set({ bfResult: parsed, bfLoading: false, bfMode: mode });
  } catch(e) {
    set({ bfLoading: false });
    showToast('XЙҷta: ' + (e && e.message ? e.message : String(e)));
  }
}

function mkBlendResult() {
  const wrap = ce('div');
  const r = S.bfResult;
  const mode = S.bfMode;

  if (mode === 'movzu') {
    // Single blend result
    const res = ce('div', 'result-box');
    const rname = ce('div', 'res-name'); rname.textContent = r.blend_adi_en || r.blend_adi || '';
    const rnameaz = ce('div'); rnameaz.style.cssText = 'font-size:13px;color:#9b7acc;margin-top:2px;margin-bottom:4px'; rnameaz.textContent = r.blend_adi_az || '';
    const rsub = ce('div', 'res-sub'); rsub.textContent = (r.movzu || '') + ' В· ' + (r.mehsul || '');
    const rlbl = ce('div', 'res-label'); rlbl.textContent = 'Blend';
    res.appendChild(rname); if (r.blend_adi_az) res.appendChild(rnameaz); res.appendChild(rsub); res.appendChild(rlbl);

    const breakdown = ce('div');
    breakdown.style.cssText = 'margin-top:8px;display:flex;flex-direction:column;gap:6px';
    (r.atirlЙҷr || []).forEach(a => {
      const row = ce('div');
      row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:8px';
      const nameEl = ce('span');
      nameEl.style.cssText = 'color:' + (a.anbar ? '#9aa0b0' : '#e67e22') + ';font-size:13px;flex:1';
      nameEl.textContent = a.ad + (a.anbar ? '' : ' вҡ ');
      const pctEl = ce('span');
      pctEl.style.cssText = 'color:#fff;font-family:monospace;font-weight:700;font-size:15px';
      pctEl.textContent = a.faiz + '%';
      row.appendChild(nameEl); row.appendChild(pctEl);
      breakdown.appendChild(row);
      if (a.qeyd) {
        const note = ce('div');
        note.style.cssText = 'font-size:11px;color:#6c7a99;margin-top:-4px;padding-left:2px';
        note.textContent = a.qeyd;
        breakdown.appendChild(note);
      }
    });
    res.appendChild(breakdown);

    if (r.izah) {
      const izah = ce('div');
      izah.style.cssText = 'margin-top:10px;font-size:12px;color:#6c7a99;border-top:1px solid rgba(255,255,255,.1);padding-top:10px;line-height:1.5';
      izah.textContent = r.izah;
      res.appendChild(izah);
    }
    wrap.appendChild(res);

  } else {
    // Multiple variants
    (r.variantlar || []).forEach((v, vi) => {
      const res = ce('div', 'result-box');
      res.style.marginBottom = '10px';
      const rname = ce('div', 'res-name'); rname.textContent = v.ad || ('Variant ' + (vi+1));
      const rsub2 = ce('div', 'res-sub'); rsub2.textContent = r.mehsul || '';
      const rlbl2 = ce('div', 'res-label'); rlbl2.textContent = 'Blend';
      res.appendChild(rname); res.appendChild(rsub2); res.appendChild(rlbl2);

      const breakdown2 = ce('div');
      breakdown2.style.cssText = 'margin-top:8px;display:flex;flex-direction:column;gap:6px';
      (v.atirlЙҷr || []).forEach(a => {
        const row = ce('div');
        row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:8px';
        const nameEl = ce('span');
        nameEl.style.cssText = 'color:' + (a.anbar ? '#9aa0b0' : '#e67e22') + ';font-size:13px;flex:1';
        nameEl.textContent = a.ad + (a.anbar ? '' : ' вҡ ');
        const pctEl = ce('span');
        pctEl.style.cssText = 'color:#fff;font-family:monospace;font-weight:700;font-size:15px';
        pctEl.textContent = a.faiz + '%';
        row.appendChild(nameEl); row.appendChild(pctEl);
        breakdown2.appendChild(row);
        if (a.qeyd) {
          const note = ce('div');
          note.style.cssText = 'font-size:11px;color:#6c7a99;margin-top:-4px;padding-left:2px';
          note.textContent = a.qeyd;
          breakdown2.appendChild(note);
        }
      });
      res.appendChild(breakdown2);

      if (v.izah) {
        const izah2 = ce('div');
        izah2.style.cssText = 'margin-top:10px;font-size:12px;color:#6c7a99;border-top:1px solid rgba(255,255,255,.1);padding-top:10px;line-height:1.5';
        izah2.textContent = v.izah;
        res.appendChild(izah2);
      }
      wrap.appendChild(res);
    });
  }

  // Use in blend calculator button
  const useBtn = ce('button', 'new-kal-btn');
  useBtn.textContent = 'рҹ§Ә Blend HesablayДұcДұya kГ¶Г§Гјr';
  useBtn.style.marginTop = '8px';
  useBtn.onclick = () => {
    let blendStr = '';
    if (mode === 'movzu' && r.atirlЙҷr) {
      blendStr = r.atirlЙҷr.map(a => a.ad + ' ' + a.faiz + '%').join(' + ');
    } else if (r.variantlar && r.variantlar[0]) {
      blendStr = r.variantlar[0].atirlЙҷr.map(a => a.ad + ' ' + a.faiz + '%').join(' + ');
    }
    S.aBlend = blendStr;
    set({ atirSub: 'blend' });
  };
  wrap.appendChild(useBtn);

  // Helper to build a saveable blend object from AI result
  function buildSaveObj(blendData, mehsul, cins, profil) {
    const atirStr = (blendData.atirlЙҷr || []).map(a => a.ad + ' ' + a.faiz + '%').join(' + ');
    const altArr = (blendData.atirlЙҷr || [])
      .filter(a => a.alternativ)
      .map(a => a.ad.split(' ')[0] + ' вҶ’ ' + a.alternativ);
    const altStr = altArr.join(' | ');
    return {
      kateqoriya: mehsul || 'M&P Sabun',
      cins: cins || 'Unisex',
      profil: profil || 'AI Blend',
      ad: (blendData.blend_adi_en || blendData.ad || 'AI Blend') + (blendData.blend_adi_az ? ' / ' + blendData.blend_adi_az : ''),
      atirlЙҷr: atirStr,
      izah: blendData.izah || '',
      alternativ: altStr,
      aiSaved: true,
    };
  }

  // Yadda saxla button(s)
  if (mode === 'movzu') {
    const alreadySaved = S.savedBlends.some(b => b.ad === ((r.blend_adi_en || r.blend_adi || '') + (r.blend_adi_az ? ' / ' + r.blend_adi_az : '')));
    const saveBtn = ce('button', 'new-kal-btn');
    saveBtn.textContent = alreadySaved ? 'вң“ Yadda saxlanДұb' : 'рҹ’ҫ HazДұr BlendlЙҷrЙҷ ЙҷlavЙҷ et';
    saveBtn.style.cssText = 'margin-top:6px;background:' + (alreadySaved ? 'rgba(39,174,96,.2)' : 'rgba(155,122,204,.15)') + ';border-color:' + (alreadySaved ? '#27ae60' : '#9b7acc') + ';color:' + (alreadySaved ? '#27ae60' : '#9b7acc');
    if (!alreadySaved) {
      saveBtn.onclick = () => {
        const obj = buildSaveObj(r, r.mehsul, r.cins, r.movzu);
        S.savedBlends.unshift(obj);
        saveBlendToStorage();
        saveBlendToGS(obj);
        render();
      };
    }
    wrap.appendChild(saveBtn);
  } else {
    // Multiple variants - save button for each
    (r.variantlar || []).forEach((v, vi) => {
      const vName = v.ad || ('Variant ' + (vi+1));
      const alreadySaved = S.savedBlends.some(b => b.ad.startsWith(vName));
      const saveBtn = ce('button', 'new-kal-btn');
      saveBtn.textContent = alreadySaved ? 'вң“ ' + vName + ' saxlanДұb' : 'рҹ’ҫ ' + vName + ' вҶ’ HazДұr BlendlЙҷrЙҷ';
      saveBtn.style.cssText = 'margin-top:6px;display:block;width:100%;background:' + (alreadySaved ? 'rgba(39,174,96,.2)' : 'rgba(155,122,204,.15)') + ';border-color:' + (alreadySaved ? '#27ae60' : '#9b7acc') + ';color:' + (alreadySaved ? '#27ae60' : '#9b7acc');
      if (!alreadySaved) {
        const vCopy = v;
        saveBtn.onclick = () => {
          const obj = buildSaveObj(vCopy, r.mehsul, r.cins, r.profil);
          S.savedBlends.unshift(obj);
          saveBlendToStorage();
          saveBlendToGS(obj);
          render();
        };
      }
      wrap.appendChild(saveBtn);
    });
  }

  return wrap;
}

function mkCPPage() {
  const page = ce('div', 'page');

  const hdr = ce('div', 'topbar');
  const title = ce('span', 'topbar-title'); title.textContent = 'рҹ§Ә CP ЖҸtirlЙҷr';
  const back = ce('button', 'sec-btn'); back.textContent = 'вҶҗ Geri';
  back.style.cssText = 'padding:8px 14px;font-size:13px';
  back.onclick = () => set({ atirSub: 'fabrika' });
  hdr.appendChild(back); hdr.appendChild(title);
  page.appendChild(hdr);

  const desc = ce('p');
  desc.style.cssText = 'font-size:12px;color:#9aa0b0;margin-bottom:16px;line-height:1.5';
  desc.textContent = 'CandleScience вҖ” Cold Process sabun ГјГ§Гјn test nЙҷticЙҷlЙҷri. CP Test+ olanlar ГјstdЙҷ, Vanilla- Йҷn ГјstdЙҷ.';
  page.appendChild(desc);

  // в”Җв”Җ CЖҸDVЖҸL в”Җв”Җ
  const tblTitle = ce('div');
  tblTitle.style.cssText = 'font-size:13px;font-weight:700;color:#5dcc8a;margin-bottom:10px;background:#1a1e2e;padding:10px 12px;border-radius:10px 10px 0 0;margin-bottom:0';
  tblTitle.textContent = 'рҹ“Ҡ CP Test CЙҷdvЙҷli';
  page.appendChild(tblTitle);

  // Sort: CP+ first (sorted by vanilla asc, then level), CP- last
  const sorted = [...CP_DATA].sort((a, b) => {
    if (a.cp !== b.cp) return a.cp ? -1 : 1;
    if (!a.cp) return 0;
    // CP+ group: vanilla- first
    if (a.vanilla !== b.vanilla) return a.vanilla ? 1 : -1;
    // within vanilla group: greenвҶ’yellowвҶ’red
    const lvl = {green:0, yellow:1, red:2, none:3};
    return (lvl[a.level]||0) - (lvl[b.level]||0);
  });

  // Build real HTML table
  const tblWrap = ce('div');
  tblWrap.style.cssText = 'overflow-x:auto;margin-bottom:24px;border-radius:0 0 10px 10px;border:1px solid rgba(255,255,255,.1);background:#1a1e2e';

  const tbl = document.createElement('table');
  tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:11px';

  // Header
  const thead = document.createElement('thead');
  const hRow = document.createElement('tr');
  hRow.style.cssText = 'background:#252a3e';
  ['ЖҸtir adДұ','CP','Vanil','Accel.','Diskolorasiya','Separ.'].forEach((h,i) => {
    const th = document.createElement('th');
    th.style.cssText = 'padding:8px 6px;color:#9aa0b0;font-weight:700;text-align:' + (i===0?'left':'center') + ';white-space:nowrap';
    th.textContent = h;
    hRow.appendChild(th);
  });
  thead.appendChild(hRow);
  tbl.appendChild(thead);

  const tbody = document.createElement('tbody');
  let prevCpGroup = null;

  sorted.forEach((r, i) => {
    // Divider between CP+ and CP- groups
    if (prevCpGroup !== null && prevCpGroup !== r.cp) {
      const divRow = document.createElement('tr');
      const divTd = document.createElement('td');
      divTd.colSpan = 6;
      divTd.style.cssText = 'padding:3px 8px;font-size:10px;color:#7a8499;background:rgba(255,255,255,.04);text-align:center;letter-spacing:1px';
      divTd.textContent = 'в”Җв”Җ CP Test yoxlanДұlmamДұЕҹ в”Җв”Җ';
      divRow.appendChild(divTd);
      tbody.appendChild(divRow);
    }
    prevCpGroup = r.cp;

    const row = document.createElement('tr');
    row.style.cssText = 'background:' + (i%2===0?'rgba(255,255,255,.04)':'transparent') + ';border-top:1px solid rgba(255,255,255,.06)';

    // Name
    const nameTd = document.createElement('td');
    nameTd.style.cssText = 'padding:7px 8px;color:' + (r.cp?'#5dcc8a':'#6a7080') + ';line-height:1.3';
    const nameShort = r.ad.replace(' FO USA','');
    // Level badge for CP+ rows
    if (r.cp && r.level !== 'none') {
      const badge = {green:'рҹҹў',yellow:'рҹҹЎ',red:'рҹ”ҙ'}[r.level];
      nameTd.textContent = badge + ' ' + nameShort;
    } else {
      nameTd.textContent = nameShort;
    }
    row.appendChild(nameTd);

    // CP
    const cpTd = document.createElement('td');
    cpTd.style.cssText = 'padding:7px 6px;text-align:center;font-size:13px';
    cpTd.textContent = r.cp ? 'вң…' : 'вқҢ';
    row.appendChild(cpTd);

    // Vanilla
    const vanTd = document.createElement('td');
    const vanSt = r.vanilla===true?{t:'Var',c:'#e67e22'}: r.vanilla===false?{t:'Yox',c:'#4caf50'}:{t:'вҖ”',c:'#555'};
    vanTd.style.cssText = 'padding:7px 6px;text-align:center;color:'+vanSt.c+';font-weight:600;font-size:11px';
    vanTd.textContent = vanSt.t;
    row.appendChild(vanTd);

    // Acceleration
    const accTd = document.createElement('td');
    const accSt = !r.acceleration||r.acceleration==='-'?{t:'вҖ”',c:'#4caf50'}:
                  r.acceleration==='Slight'?{t:'Slight',c:'#f39c12'}:
                  r.acceleration==='Moderate'?{t:'Moderate',c:'#e74c3c'}:{t:r.acceleration,c:'#e74c3c'};
    accTd.style.cssText = 'padding:7px 6px;text-align:center;color:'+accSt.c+';font-weight:600;font-size:11px';
    accTd.textContent = accSt.t;
    row.appendChild(accTd);

    // Discoloration
    const disTd = document.createElement('td');
    const disSt = !r.discoloration||r.discoloration==='-'?{t:'вҖ”',c:'#4caf50'}:
                  r.discoloration.includes('Light')?{t:r.discoloration,c:'#f39c12'}:
                  r.discoloration.includes('Dark')?{t:r.discoloration,c:'#e74c3c'}:{t:r.discoloration,c:'#e67e22'};
    disTd.style.cssText = 'padding:7px 6px;text-align:center;color:'+disSt.c+';font-weight:600;font-size:10px';
    disTd.textContent = disSt.t;
    row.appendChild(disTd);

    // Separation
    const sepTd = document.createElement('td');
    const sepSt = !r.separation||r.separation==='-'?{t:'вҖ”',c:'#4caf50'}:{t:r.separation,c:'#e67e22'};
    sepTd.style.cssText = 'padding:7px 6px;text-align:center;color:'+sepSt.c+';font-weight:600;font-size:11px';
    sepTd.textContent = sepSt.t;
    row.appendChild(sepTd);

    tbody.appendChild(row);
  });
  tbl.appendChild(tbody);
  tblWrap.appendChild(tbl);
  page.appendChild(tblWrap);

  // в”Җв”Җ BLENDLЖҸR в”Җв”Җ
  const blTitle = ce('div');
  blTitle.style.cssText = 'font-size:13px;font-weight:700;color:#5dcc8a;margin-bottom:4px';
  blTitle.textContent = 'рҹ§ҙ CP BlendlЙҷr (3 Йҷtirli)';
  page.appendChild(blTitle);

  const blDesc = ce('div');
  blDesc.style.cssText = 'font-size:11px;color:#9fa9bf;margin-bottom:10px;line-height:1.5';
  blDesc.textContent = 'YalnДұz CP Test+ ЙҷtirlЙҷrdЙҷn, 3 Йҷtirli. CЙҷdvЙҷl mЙҷlumatlarДұna ЙҷsasЙҷn hesablanДұb.';
  page.appendChild(blDesc);

  // Legend
  const leg = ce('div');
  leg.style.cssText = 'display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap';
  [['рҹҹў','ЖҸlveriЕҹli вҖ” vanilla yox, acc. yox/slight'],['рҹҹЎ','DiqqЙҷtli вҖ” moderate acc. var'],['рҹ”ҙ','ГҮЙҷtin вҖ” vanilla + gГјclГј diskolor.']].forEach(([ic,lb])=>{
    const t = ce('div');
    t.style.cssText = 'font-size:10px;color:#9aa0b0;line-height:1.4';
    t.textContent = ic + ' ' + lb;
    leg.appendChild(t);
  });
  page.appendChild(leg);

  const levelColors = { green:'#1a3a2a', yellow:'#3a2e10', red:'#3a1515' };
  const levelBorder = { green:'#2d6e45', yellow:'#7a5e18', red:'#7a2828' };
  const levelIcon   = { green:'рҹҹў', yellow:'рҹҹЎ', red:'рҹ”ҙ' };
  const levelLabel  = { green:'ЖҸlveriЕҹli', yellow:'DiqqЙҷtli', red:'ГҮЙҷtin' };
  const levelTextC  = { green:'#5dcc8a', yellow:'#f5bc40', red:'#f07070' };

  CP_BLENDLER.forEach(b => {
    const card = ce('div');
    card.style.cssText = 'margin-bottom:10px;padding:12px;background:'+levelColors[b.level]+';border:1px solid '+levelBorder[b.level]+';border-radius:12px';

    const topRow = ce('div');
    topRow.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:8px';
    const icon = ce('span'); icon.textContent = levelIcon[b.level];
    const name = ce('div'); name.style.cssText = 'font-size:13px;font-weight:700;color:#f0f0f0;flex:1'; name.textContent = b.ad;
    const lvlBadge = ce('span');
    lvlBadge.style.cssText = 'font-size:9px;color:'+levelTextC[b.level]+';font-weight:700;border:1px solid '+levelBorder[b.level]+';border-radius:6px;padding:1px 6px';
    lvlBadge.textContent = levelLabel[b.level];
    topRow.appendChild(icon); topRow.appendChild(name); topRow.appendChild(lvlBadge);
    card.appendChild(topRow);

    // в”Җв”Җ STAR RATING в”Җв”Җ
    const rKey = 'blendRating_cp_' + b.ad.replace(/\s+/g,'_');
    let curRating = 0;
    { const _r = getRating(rKey); curRating = _r !== null ? (parseInt(_r) || 0) : 0; }
    const hasRating = getRating(rKey) !== null;
    const isZero = hasRating && curRating === 0;

    const starRow = ce('div');
    starRow.style.cssText = 'display:flex;align-items:center;gap:4px;margin-bottom:8px;flex-wrap:wrap';

    const zeroBtn = ce('button');
    zeroBtn.style.cssText = `font-size:12px;background:none;border:1.5px solid ${isZero?'#e74c3c':'#444'};border-radius:6px;cursor:pointer;padding:1px 7px;color:${isZero?'#e74c3c':'#666'}`;
    zeroBtn.textContent = 'вң•';
    zeroBtn.onclick = ev => { ev.stopPropagation(); showRatingConfirm(card, rKey, 0); };
    starRow.appendChild(zeroBtn);

    const sep = ce('span'); sep.style.cssText = 'color:#444;font-size:10px;margin:0 2px'; sep.textContent = '|';
    starRow.appendChild(sep);

    for (let st = 1; st <= 5; st++) {
      const star = ce('button');
      const filled = st <= curRating;
      star.style.cssText = `font-size:20px;background:none;border:none;cursor:pointer;padding:0 1px;line-height:1;color:${filled?'#f5c518':'#555'}`;
      star.textContent = filled ? '\u2605' : '\u2606';
      const stVal = st;
      star.onclick = ev => { ev.stopPropagation(); showRatingConfirm(card, rKey, stVal); };
      starRow.appendChild(star);
    }

    const rl = ce('span');
    if (curRating > 0 && hasRating) {
      rl.style.cssText = 'font-size:11px;color:#f5c518;margin-left:4px;font-weight:600';
      rl.textContent = curRating + '/5';
    } else if (isZero) {
      rl.style.cssText = 'font-size:11px;color:#e74c3c;margin-left:4px';
      rl.textContent = 'Д°stifadЙҷ edilmir';
    } else {
      rl.style.cssText = 'font-size:11px;color:#7a8499;margin-left:4px';
      rl.textContent = 'SДұnaqdan keГ§mЙҷyib';
    }
    starRow.appendChild(rl);

    if (hasRating) {
      const delBtn = ce('button');
      delBtn.style.cssText = 'font-size:11px;background:none;border:1px solid #444;border-radius:6px;cursor:pointer;padding:1px 7px;color:#9fa9bf;margin-left:4px';
      delBtn.textContent = 'рҹ—‘';
      delBtn.onclick = ev => { ev.stopPropagation(); showRatingConfirm(card, rKey, 'del'); };
      starRow.appendChild(delBtn);
    }
    card.appendChild(starRow);

    // Ingredients
    b.atirlЙҷr.split('+').map(p=>p.trim()).forEach(p => {
      const m = p.match(/^(.+?)\s+(\d+)%$/);
      if (!m) return;
      const row = ce('div');
      row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:4px';
      const nm = ce('span'); nm.style.cssText = 'font-size:12px;color:#b8c0cc'; nm.textContent = m[1];
      const pct = ce('span'); pct.style.cssText = 'font-size:13px;font-weight:700;color:#f0f0f0;font-family:monospace'; pct.textContent = m[2]+'%';
      row.appendChild(nm); row.appendChild(pct);
      card.appendChild(row);
    });

    const iz = ce('div');
    iz.style.cssText = 'font-size:11px;color:#b8c0cc;margin-top:8px;border-top:1px solid rgba(255,255,255,.12);padding-top:8px;line-height:1.5';
    iz.textContent = b.izah;
    card.appendChild(iz);

    const qeyd = ce('div');
    qeyd.style.cssText = 'font-size:10px;color:#e8a030;margin-top:4px;line-height:1.4';
    qeyd.textContent = 'вҡ  ' + b.qeyd;
    card.appendChild(qeyd);

    const useBtn = ce('button');
    useBtn.style.cssText = 'margin-top:8px;font-size:11px;padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#9aa0b0;cursor:pointer';
    useBtn.textContent = 'рҹ§Ә HesablayДұcДұya kГ¶Г§Гјr';
    useBtn.onclick = () => { S.aBlend = b.atirlЙҷr; set({ atirSub: 'blend' }); };
    card.appendChild(useBtn);

    page.appendChild(card);
  });

  return page;
}

  // XLSX_BLENDLER-i HAZIR_BLENDLER formatДұna Г§evir
  const tipToKat = {'Sabun':'M&P Sabun','ЖҸriyЙҷn Mum':'ЖҸriyЙҷn Mum','Tablet':'ЖҸtirli Tablet'};
  const xlsxAsHazir = XLSX_BLENDLER.map(b => ({
    ad: b.ad, atirlЙҷr: b.atirlЙҷr, kateqoriya: tipToKat[b.tip] || b.tip,
    cins: b.cins, profil: b.profil, izah: b.acДұqlama
  }));

  // Filter blends вҖ” savedBlends + HAZIR_BLENDLER + XLSX_BLENDLER
  let filtered = [...(S.savedBlends || []), ...HAZIR_BLENDLER, ...xlsxAsHazir];
  if (S.hbKat && S.hbKat !== 'HamДұsДұ') filtered = filtered.filter(b => b.kateqoriya === S.hbKat);
  if (S.hbCins && S.hbCins !== 'HamДұsДұ') filtered = filtered.filter(b => b.cins === S.hbCins);

  }
  // Sort: 5вҶ’1 first, unrated middle, 0 (never again) at bottom
  filtered = [...filtered].sort((a, b) => {
    const getR = x => { const v = getRating('blendRating_' + x.ad.replace(/\s+/g,'_')); return v === null ? -1 : parseInt(v) || 0; };
    const ra = getR(a), rb = getR(b);
    if (ra === 0 && rb !== 0) return 1;
    if (rb === 0 && ra !== 0) return -1;
    if (ra === rb) return 0;
    if (ra === -1) return 1;
    if (rb === -1) return -1;
    return rb - ra;
  });

  // Hide zero toggle button removed вҖ” 0-rated stay at bottom

  if (filtered.length === 0) {

    empty.style.cssText = 'text-align:center;padding:40px;color:#9fa9bf;font-size:14px';
    empty.textContent = 'HeГ§ bir blend tapДұlmadДұ';
    page.appendChild(empty);
    return page;
  }

  filtered.forEach((b, bi) => {
    const card = ce('div', 'result-box');
    card.style.cssText = 'margin-bottom:10px';

    // Rating key per blend (use ad as unique key)
    const rKey = 'blendRating_' + b.ad.replace(/\s+/g,'_');
    let curRating = 0;
    { const _r = getRating(rKey); curRating = _r !== null ? (parseInt(_r) || 0) : 0; }

    // Skip if rated 0 and filter is active вҖ” no, show all but dim 0-rated ones
    // (user said 0 = never use again, so show with red X indicator)

    const topRow = ce('div');
    topRow.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px';

    const nameEl = ce('div', 'res-name');
    nameEl.style.cssText = 'font-size:14px;font-weight:700;color:#fff;flex:1';
    nameEl.textContent = b.ad;

    katBadge.style.cssText = 'font-size:13px;display:flex;align-items:center;gap:4px';

    topRow.appendChild(katBadge);

    const hasRating = getRating(rKey) !== null;
    const isZero = hasRating && curRating === 0;

    // вң• button
    const zeroBtn = ce('button');
    zeroBtn.style.cssText = `font-size:12px;background:none;border:1.5px solid ${isZero?'#e74c3c':'#444'};border-radius:6px;cursor:pointer;padding:1px 7px;color:${isZero?'#e74c3c':'#666'}`;
    zeroBtn.textContent = 'вң•';
    zeroBtn.onclick = ev => {
      ev.stopPropagation();
      showRatingConfirm(card, rKey, 0);
    };
    starRow.appendChild(zeroBtn);

    const sep = ce('span');
    sep.style.cssText = 'color:#333;font-size:10px;margin:0 2px';
    sep.textContent = '|';
    starRow.appendChild(sep);

    // 1-5 stars
    for (let st = 1; st <= 5; st++) {
      const star = ce('button');
      const filled = st <= curRating;
      star.style.cssText = `font-size:20px;background:none;border:none;cursor:pointer;padding:0 1px;line-height:1;color:${filled?'#f5c518':'#333'}`;
      star.textContent = filled ? '\u2605' : '\u2606';
      const stVal = st;
      star.onclick = ev => {
        ev.stopPropagation();
        showRatingConfirm(card, rKey, stVal);
      };
      starRow.appendChild(star);
    }

    // Label
    const rl = ce('span');
    if (curRating > 0 && hasRating) {
      rl.style.cssText = 'font-size:11px;color:#f5c518;margin-left:4px;font-weight:600';
      rl.textContent = curRating + '/5';
    } else if (isZero) {
      rl.style.cssText = 'font-size:11px;color:#e74c3c;margin-left:4px';
      rl.textContent = 'Istifade edilmir';
    } else {
      rl.style.cssText = 'font-size:11px;color:#7a8499;margin-left:4px';
      rl.textContent = 'Sinaqdan kecmeyib';
    }
    starRow.appendChild(rl);

    // Delete button for rated blends
    if (hasRating) {
      const delBtn = ce('button');
      delBtn.style.cssText = 'font-size:11px;background:none;border:1px solid #444;border-radius:6px;cursor:pointer;padding:1px 7px;color:#9fa9bf;margin-left:4px';
      delBtn.textContent = '\ud83d\uddd1';
      delBtn.onclick = ev => {
        ev.stopPropagation();
        showRatingConfirm(card, rKey, 'del');
      };
      starRow.appendChild(delBtn);
    }
    // AI blends: aЕҹaДҹДұya atmaq вң• ilЙҷ eyni mexanizm (reyting = 0, tЙҷsdiq lazДұm)
    if (b.aiSaved && !hasRating) {
      const rmBtn = ce('button');
      rmBtn.style.cssText = 'font-size:13px;background:none;border:none;cursor:pointer;padding:1px 5px;color:#555;margin-left:4px';
      rmBtn.textContent = 'вң•';
      rmBtn.title = 'AЕҹaДҹДұya at';
      rmBtn.onclick = ev => { ev.stopPropagation(); showRatingConfirm(card, rKey, 0); };
      starRow.appendChild(rmBtn);
    }

    card.appendChild(starRow);

    if (isZero) card.style.cssText = 'margin-bottom:10px;opacity:0.45';

    const meta = ce('div');
    meta.style.cssText = 'font-size:11px;color:#6c7a99;margin-bottom:10px';
    meta.textContent = b.cins + ' В· ' + b.profil;
    card.appendChild(meta);

    // Ingredients with guc badges
    const gucRenk = {
      'GГјclГј':'#4caf50','YaxЕҹДұ':'#2196f3',
      'Orta':'#ff9800','ZЙҷif':'#9e9e9e','ГҮox ZЙҷif':'#f44336'
    };

    // Build ingredient rows - original blend
    const origParts = b.atirlЙҷr.split('+').map(p => p.trim());
    origParts.forEach(p => {
      const m = p.match(/^(.+?)\s+(\d+)%$/);
      if (!m) return;
      const atirName = m[1].trim();
      const faiz = m[2];
      // Better matching: check if anbar name contains key words
      const words = atirName.toLowerCase().replace(/ fo| eo| fРҫ/g,'').trim().split(' ').filter(w=>w.length>2);
      const anbarItem = S.atirAnbar.find(a => {
        if (!a.name) return false;
        const an = a.name.toLowerCase();
        return words.length > 0 && words.every(w => an.includes(w));
      }) || S.atirAnbar.find(a => {
        if (!a.name) return false;
        const an = a.name.toLowerCase();
        return words[0] && an.includes(words[0]);
      });
      const guc = anbarItem ? anbarItem.guc : null;

      const row = ce('div');
      row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:6px';

      const left = ce('div');
      left.style.cssText = 'display:flex;align-items:center;gap:5px;flex:1;min-width:0';

      const nm = ce('span');
      nm.style.cssText = 'font-size:12px;color:#9aa0b0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
      nm.textContent = atirName;
      left.appendChild(nm);

      if (guc) {
        const gb = ce('span');
        gb.style.cssText = `font-size:9px;padding:1px 5px;border-radius:6px;color:#fff;background:${gucRenk[guc]||'#666'};white-space:nowrap;flex-shrink:0`;
        gb.textContent = guc;
        left.appendChild(gb);
      }

      const pct = ce('span');
      pct.style.cssText = 'font-family:monospace;font-weight:700;font-size:13px;color:#fff;flex-shrink:0';
      pct.textContent = faiz + '%';

      row.appendChild(left); row.appendChild(pct);
      card.appendChild(row);
    });

    if (b.izah) {
      const iz = ce('div');
      iz.style.cssText = 'font-size:11px;color:#6c7a99;margin-top:8px;border-top:1px solid rgba(255,255,255,.08);padding-top:8px;line-height:1.5';
      iz.textContent = b.izah;
      card.appendChild(iz);
    }

    // Interactive alternativ chips
    if (b.alternativ) {
      const altWrap = ce('div');
      altWrap.style.cssText = 'margin-top:8px;padding:8px 10px;background:rgba(255,200,100,.06);border-radius:10px;border:1px solid rgba(255,200,100,.18)';

      const altLbl = ce('div');
      altLbl.style.cssText = 'font-size:10px;color:#e8a030;font-weight:600;margin-bottom:7px;letter-spacing:.3px';
      altLbl.textContent = 'рҹ”„ ЖҸvЙҷzetmЙҷ seГ§in';
      altWrap.appendChild(altLbl);

      // Parse "ЖҸtir A вҶ’ ЖҸtir B | ЖҸtir C вҶ’ ЖҸtir D" into chips
      const altItems = b.alternativ.split('|').map(s => s.trim()).filter(Boolean);
      const chipWrap = ce('div');
      chipWrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px';

      // State key for selected alt chip per blend
      const stateKey = 'hbAlt_' + bi;
      if (S[stateKey] === undefined) S[stateKey] = null;

      altItems.forEach((alt, ai) => {
        const chip = ce('button');
        const isSelected = S[stateKey] === ai;
        chip.style.cssText = `font-size:11px;padding:4px 9px;border-radius:14px;border:1.5px solid ${isSelected ? '#e8a030' : 'rgba(255,200,100,.3)'};background:${isSelected ? 'rgba(255,200,100,.2)' : 'transparent'};color:${isSelected ? '#e8a030' : '#a08050'};cursor:pointer;text-align:left;line-height:1.4`;
        chip.textContent = alt;
        chip.onclick = e => {
          e.stopPropagation();
          S[stateKey] = (S[stateKey] === ai) ? null : ai;
          render();
        };
        chipWrap.appendChild(chip);
      });

      altWrap.appendChild(chipWrap);

      if (S[stateKey] !== null) {
        const selNote = ce('div');
        selNote.style.cssText = 'font-size:10px;color:#e8a030;margin-top:5px';
        selNote.textContent = 'вң“ SeГ§ilmiЕҹ ЙҷvЙҷzetmЙҷ blend hesablamaya tЙҷtbiq olunacaq';
        altWrap.appendChild(selNote);
      }

      card.appendChild(altWrap);
    }

    // Use button - builds blend string considering selected alternativ
    const useBtn = ce('button', 'sec-btn');
    useBtn.style.cssText = 'margin-top:8px;width:100%;font-size:12px;padding:7px';
    useBtn.textContent = 'рҹ§Ә Blend HesablayДұcДұya kГ¶Г§Гјr';
    useBtn.onclick = e => {
      e.stopPropagation();
      const stateKey = 'hbAlt_' + bi;
      const selIdx = S[stateKey];
      let blendStr = b.atirlЙҷr;

      if (selIdx !== null && b.alternativ) {
        const altItems = b.alternativ.split('|').map(s => s.trim()).filter(Boolean);
        const selAlt = altItems[selIdx];
        // Parse "KГ¶hnЙҷ ЖҸtir вҶ’ Yeni ЖҸtir" or "KГ¶hnЙҷ вҶ’ Yeni"
        const arrow = selAlt.match(/^(.+?)\s*вҶ’\s*(.+)$/);
        if (arrow) {
          const from = arrow[1].trim();
          const to = arrow[2].trim();
          // Replace in blend string: find the ingredient name and swap it
          const parts = blendStr.split('+').map(p => {
            const m = p.trim().match(/^(.+?)\s+(\d+)%$/);
            if (!m) return p;
            // Check if this ingredient matches 'from'
            const fromWords = from.toLowerCase().replace(/ fo| eo/g,'').trim().split(' ').filter(w=>w.length>2);
            const partName = m[1].toLowerCase();
            const matches = fromWords.length > 0 && fromWords.some(w => partName.includes(w));
            if (matches) return to + ' ' + m[2] + '%';
            return p.trim();
          });
          blendStr = parts.join(' + ');
        }
      }

      S.aBlend = blendStr;
      set({ atirSub: 'blend' });
    };
    card.appendChild(useBtn);

    page.appendChild(card);
  });

  return page;
}

function mkMasterBlendResult() {
  const r = S.mbResult;
  const wrap = ce('div');

  const res = ce('div', 'result-box');
  res.style.marginTop = '12px';

  const nm = ce('div', 'res-name'); nm.textContent = r.ad_az || r.ad || '';
  const sub = ce('div', 'res-sub'); sub.textContent = (r.ad_en || '') + ' В· ' + (r.mehsul || '') + (r.intensiv ? ' В· ' + r.intensiv : '') + (r.problem ? ' В· ' + r.problem : '');
  const lbl = ce('div', 'res-label'); lbl.textContent = 'Master Blend';
  res.appendChild(nm); res.appendChild(sub); res.appendChild(lbl);

  const ingWrap = ce('div'); ingWrap.style.cssText = 'margin-top:8px;display:flex;flex-direction:column;gap:5px';
  (r.atirlЙҷr || []).forEach(a => {
    const row = ce('div');
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;gap:8px';
    const left = ce('div'); left.style.cssText = 'flex:1';
    const nameEl = ce('span'); nameEl.style.cssText = `font-size:13px;color:${a.anbar?'#9aa0b0':'#e67e22'}`;
    nameEl.textContent = a.ad + (a.anbar ? '' : ' вҡ ');
    const rolEl = ce('div'); rolEl.style.cssText = 'font-size:10px;color:#7a8499;margin-top:1px'; rolEl.textContent = a.rol || '';
    left.appendChild(nameEl); left.appendChild(rolEl);
    const pct = ce('span'); pct.style.cssText = 'font-family:monospace;font-weight:700;font-size:14px;color:#fff;flex-shrink:0';
    pct.textContent = a.faiz + '%';
    row.appendChild(left); row.appendChild(pct);
    ingWrap.appendChild(row);
  });
  res.appendChild(ingWrap);

  if (r.izah) {
    const iz = ce('div');
    iz.style.cssText = 'font-size:12px;color:#6c7a99;margin-top:10px;border-top:1px solid rgba(255,255,255,.1);padding-top:10px;line-height:1.5';
    iz.textContent = r.izah;
    res.appendChild(iz);
  }

  const useBtn = ce('button', 'sec-btn');
  useBtn.style.cssText = 'margin-top:10px;width:100%;font-size:12px;padding:7px';
  useBtn.textContent = 'рҹ§Ә Blend HesablayДұcДұya kГ¶Г§Гјr';
  useBtn.onclick = () => {
    if (r.atirlЙҷr) S.aBlend = r.atirlЙҷr.map(a => a.ad + ' ' + a.faiz + '%').join(' + ');
    set({ atirSub: 'blend' });
  };
  res.appendChild(useBtn);

  wrap.appendChild(res);
  return wrap;
}

async function runRengAI() {
  if (!S.rengAI || !S.rengAI.trim()) { showToast('RЙҷng adДұ yazДұn'); return; }
  set({ rengAILoading: true, rengAIResult: null });

  var prompt = 'Д°stifadЙҷГ§i aДҹ M&P sabun bazasДұnda bu rЙҷngi istЙҷyir: "' + S.rengAI + '"\n\nVACД°B QAYDALAR:\n- AДҹ baza rЙҷnglЙҷri parlaq edir, pastel nЙҷticЙҷ Г§ДұxДұr\n- ParlaqlДұДҹДұ azaltmaq ГјГ§Гјn: Qara (isti rЙҷnglЙҷr) vЙҷ ya QЙҷhvЙҷyi (daha tЙҷhlГјkЙҷsiz)\n- Mavi, YaЕҹДұl, BЙҷnГ¶vЕҹЙҷyi, Limon-yaЕҹДұlДұna QARA QATMA вҖ” baЕҹqa rЙҷngЙҷ Г§evrilir\n- 930 set gГјclГјdГјr вҖ” az damcДұ lazДұmdДұr\n- 100q baza ГјГ§Гјn Гјmumi 5-10 damcДұ\n\nYALNIZ JSON ver:\n{"ad":"AzЙҷrbaycanca rЙҷng adДұ","ad_en":"English color name","damci":"100q baza ГјГ§Гјn damcДұ sayДұ вҖ” mЙҷs: SarДұ 7 damcДұ + QЙҷhvЙҷyi 2 damcДұ","addim":"AddДұm-addДұm qaydalar","xeberdarliq":"Varsa xЙҷbЙҷrdarlДұq, yoxdursa boЕҹ string","izah":"Bu rЙҷngin aДҹ bazada davranДұЕҹДұ"}';

  var systemPromptReng = 'SЙҷn M&P sabun boyakarlДұДҹДұ ГјzrЙҷ mГјtЙҷxЙҷssisЙҷn. YalnДұz JSON cavab ver.\n\nЖҸlindЙҷki rЙҷnglЙҷr:\n930 seti (30ml, gГјclГј): SarДұ, NarДұncДұ, QДұrmДұzДұ, Limon-yaЕҹДұl, ГҮЙҷhrayДұ, BЙҷnГ¶vЕҹЙҷyi, Mavi, SГјd ЕҹokoladДұ, Qara\n1050 seti (50ml, yГјngГјl): QЙҷhvЙҷyi, Qara, BЙҷnГ¶vЕҹЙҷyi, ГҮЙҷhrayДұ, YaЕҹДұl, Karmin, Mavi, QДұrmДұzДұ, SarДұ, AДҹ';

  try {
    var resp = await fetch(GS_URL, { method: 'POST', body: JSON.stringify({ action: 'ai_blend', prompt: prompt, systemPrompt: systemPromptReng }) });
    var data = await resp.json();
    if (data.error) { set({ rengAILoading: false }); showToast('API xЙҷtasДұ: ' + (data.error.message||'')); return; }
    var text = data.content.map(function(i){ return i.text||''; }).join('');
    var parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    set({ rengAIResult: parsed, rengAILoading: false });
  } catch(e) {
    set({ rengAILoading: false });
    showToast('XЙҷta: ' + (e && e.message ? e.message : String(e)));
  }
}

function showRatingConfirm(card, rKey, val) {
  // Remove any existing confirm panel
  const existing = card.querySelector('.rc-panel');
  if (existing) { existing.remove(); return; }

  const panel = ce('div');
  panel.className = 'rc-panel';
  panel.style.cssText = 'margin:6px 0 4px;padding:9px 11px;background:rgba(255,255,255,.07);border-radius:10px;border:1px solid rgba(255,255,255,.15)';

  const msg = ce('div');
  msg.style.cssText = 'font-size:12px;color:#ccc;margin-bottom:8px;line-height:1.4';
  if (val === 'del') {
    msg.textContent = 'Reytinqi tamamilЙҷ silmЙҷk istЙҷyirsiniz?';
  } else if (val === 0) {
    msg.textContent = 'Bu blendi "bir daha istifadЙҷ etmЙҷyim" kimi iЕҹarЙҷlЙҷmЙҷk istЙҷyirsiniz?';
  } else {
    const stars = 'вҳ…'.repeat(val) + 'вҳҶ'.repeat(5 - val);
    msg.textContent = val + ' ulduz (' + stars + ') vermЙҷk istЙҷyirsiniz?';
  }
  panel.appendChild(msg);

  const btnRow = ce('div');
  btnRow.style.cssText = 'display:flex;gap:8px';

  const okBtn = ce('button', 'pri-btn');
  okBtn.style.cssText = 'padding:6px 16px;font-size:12px';
  okBtn.textContent = 'BЙҷli';
  okBtn.onclick = ev => {
    ev.stopPropagation();
    if (val === 'del') deleteRating(rKey);
    else saveRating(rKey, val);
    panel.remove();
  };

  const noBtn = ce('button', 'sec-btn');
  noBtn.style.cssText = 'padding:6px 16px;font-size:12px';
  noBtn.textContent = 'Xeyr';
  noBtn.onclick = ev => { ev.stopPropagation(); panel.remove(); };

  btnRow.appendChild(okBtn);
  btnRow.appendChild(noBtn);
  panel.appendChild(btnRow);

  // Insert directly after starRow
  const starRow = card.querySelector('.rc-starrow');
  if (starRow && starRow.nextSibling) {
    card.insertBefore(panel, starRow.nextSibling);
  } else if (starRow) {
    starRow.after(panel);
  } else {
    card.appendChild(panel);
  }
}

async function runAtirTovAI() {
  if (!isAdmin()) { showToast('вӣ” AI yalnДұz Admin ГјГ§ГјndГјr'); return; }
  const T = S.atirTov || {};
  const hiss = (T.hiss || '').trim();
  if (!hiss) { showToast('ZЙҷhmЙҷt olmasa hissinizi yazДұn'); return; }

  S.atirTov = {...(S.atirTov||{}), loading: true, result: null};
  render();

  // Filter candidate blends
  const candidates = XLSX_BLENDLER.filter(b => {
    if ((T.tip||'HamДұsДұ') !== 'HamДұsДұ' && b.tip !== T.tip) return false;
    if ((T.cins||'HamДұsДұ') !== 'HamДұsДұ' && b.cins !== T.cins) return false;
    return true;
  });

  // Send compact blend list to AI
  const blendList = candidates.map((b, i) =>
    `${i+1}. [${b.tip}|${b.cins}|${b.profil}] ${b.ad} вҖ” ${b.acДұqlama}`
  ).join('\n');

  const systemPromptTov = `SЙҷn Lavannelle brendinin Йҷtir tГ¶vsiyЙҷГ§isisЙҷn. Д°stifadЙҷГ§inin hissini/atmosferini oxuyub Йҷn uyДҹun hazДұr blendlЙҷri tГ¶vsiyЙҷ edirsЙҷn. YalnДұz JSON cavab ver.\n\nвҡ пёҸ SABUN QAYDASI: Sabun blendlЙҷrini tГ¶vsiyЙҷ edЙҷrkЙҷn yalnДұz "FO USA" ЙҷtirlЙҷri olan blendlЙҷr tГ¶vsiyЙҷ et.\n\nHazДұr blendlЙҷr kataloqu:\n${blendList}`;

  const prompt = `Д°stifadЙҷГ§i bu hissi/atmosferi tЙҷsvir etdi: "${hiss}"

YuxarДұdakДұ blend kataloqunda Йҷn uyДҹun 3-5 blendi tap. HЙҷr biri ГјГ§Гјn niyЙҷ uyДҹun olduДҹunu AzЙҷrbaycanca izah et.

YALNIZ JSON ver:
{"tovsiyeler":[{"nomre":1,"ad":"Blend adДұ","tip":"Sabun/ЖҸriyЙҷn Mum/Tablet","profil":"profil","uygunluq":"niyЙҷ bu blend bu hissЙҷ uyДҹundur вҖ” 1-2 cГјmlЙҷ","atirlЙҷr":"Йҷtir resepti"}]}`;

  try {
    const resp = await fetch(GS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'ai_blend', prompt, systemPrompt: systemPromptTov })
    });
    const data = await resp.json();
    if (data.error) { S.atirTov = {...S.atirTov, loading:false}; render(); showToast('API xЙҷtasДұ'); return; }
    const text = data.content.map(i => i.text||'').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    S.atirTov = {...S.atirTov, loading: false, result: parsed};
    render();
  } catch(e) {
    S.atirTov = {...S.atirTov, loading: false};
    render();
    showToast('XЙҷta baЕҹ verdi');
  }
}

function mkAtirTovResult(result) {
  const wrap = ce('div');
  const sec = ce('div'); sec.style.cssText = 'font-size:11px;font-weight:700;color:#b5b5b5;letter-spacing:.8px;text-transform:uppercase;margin:16px 0 10px';
  sec.textContent = 'AI TГ¶vsiyЙҷlЙҷri';
  wrap.appendChild(sec);

  (result.tovsiyeler || []).forEach((t, i) => {
    const card = ce('div', 'result-box'); card.style.marginBottom = '10px';

    const badge = ce('div'); badge.style.cssText = 'display:inline-block;padding:2px 8px;border-radius:8px;background:rgba(167,139,250,.2);color:#a78bfa;font-size:10px;font-weight:700;margin-bottom:6px';
    badge.textContent = '#' + (i+1) + ' В· ' + (t.tip||'') + ' В· ' + (t.profil||'');
    card.appendChild(badge);

    const adEl = ce('div'); adEl.style.cssText = 'font-size:14px;font-weight:700;color:#fff;margin-bottom:5px';
    adEl.textContent = t.ad || '';
    card.appendChild(adEl);

    const uyEl = ce('div'); uyEl.style.cssText = 'font-size:12px;color:#8090b0;margin-bottom:8px;line-height:1.5;font-style:italic';
    uyEl.textContent = t.uygunluq || '';
    card.appendChild(uyEl);

    const atEl = ce('div'); atEl.style.cssText = 'font-size:11px;color:#c0c8d8;margin-bottom:10px;line-height:1.6;font-family:monospace;background:rgba(0,0,0,.2);padding:8px;border-radius:6px';
    atEl.textContent = t.atirlЙҷr || '';
    card.appendChild(atEl);

    const useBtn = ce('button', 'sec-btn'); useBtn.style.cssText = 'width:100%;font-size:12px;padding:7px';
    useBtn.textContent = 'рҹ§Ә Blend HesablayДұcДұya kГ¶Г§Гјr';
    useBtn.onclick = () => { S.aBlend = t.atirlЙҷr; set({ atirSub: 'blend' }); };
    card.appendChild(useBtn);

    wrap.appendChild(card);
  });

  return wrap;
}
